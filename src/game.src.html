<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Academic Battle Cards — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F2E6C6; --cream-hi:#FBF3DD; --paper-ed:#E7D4A6;
  --ink:#241F1B; --ink-2:#3a322b;
  --red:#B53A2C; --red-dk:#8C2A20;
  --teal:#1F6A6A; --teal-dk:#13474A;
  --gold:#E3A92B; --gold-dk:#C2861A;
  --felt:#143b3d;
  --disp:'Alfa Slab One',Georgia,serif;
  --cond:'Anton',Impact,sans-serif;
  --body:'Spectral',Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--body); color:var(--ink);
  background-color:#e7d9b4;
  background-image:
    repeating-linear-gradient(0deg, rgba(74,56,34,.045) 0 1px, transparent 1px 25px),
    linear-gradient(90deg, transparent 0 46%, rgba(60,40,22,.10) 49%, rgba(45,30,16,.22) 50%, rgba(60,40,22,.10) 51%, transparent 54%),
    radial-gradient(115% 80% at 50% -10%, rgba(255,250,236,.65), transparent 55%),
    radial-gradient(150% 130% at 50% 50%, #f1e7ca 0%, #e6d6ac 55%, #c9b485 100%);
  background-attachment:fixed;
  min-height:100%; overflow-x:hidden;
}

/* ===== UI redesign (demo_11_12): shared paper backdrop on framed screens ===== */
:root{ --abc-bg:none; --deckbg-gatsby:url("data:image/png;base64,__ABCASSET_900__"); --deckbg-hamlet:url("data:image/png;base64,__ABCASSET_902__"); --deckbg-frankenstein:url("data:image/png;base64,__ABCASSET_903__"); --deckbg-sherlock:url("data:image/png;base64,__ABCASSET_904__"); --deckbg-othello:url("data:image/png;base64,__ABCASSET_905__"); --deckbg-macbeth:url("data:image/png;base64,__ABCASSET_906__"); --deckbg-wonderland:url("data:image/png;base64,__ABCASSET_907__"); --deckbg-oz:url("data:image/png;base64,__ABCASSET_908__"); --deckbg-crucible:url("data:image/png;base64,__ABCASSET_901__"); }
body::before{ content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:var(--abc-bg) center/cover no-repeat; }
/* gameplay surfaces keep their own playfield/ink look */
body[data-screen="play"]::before,
body[data-screen="scrim"]::before{ display:none; }
/* ...but the two Scrimmage MENUS get the shared paper */
body[data-screen="scrim"][data-scrimview="intro"]::before,
body[data-screen="scrim"][data-scrimview="kit"]::before{ display:block; }
body[data-screen="scrim"][data-scrimview="intro"] .scrim-ink,
body[data-screen="scrim"][data-scrimview="kit"] .scrim-ink{ background:transparent; }
/* flat off-white card buttons — Scrimmage menus (scoped) */
.scrim-menu .bigbtn{ background:#faf7ef; color:var(--ink); border:1px solid rgba(40,25,12,.16);
  border-radius:12px; box-shadow:0 2px 5px rgba(40,25,12,.10), 0 6px 16px rgba(40,25,12,.07);
  transition:transform .12s, box-shadow .12s; }
.scrim-menu .bigbtn:hover{ transform:translateY(-2px);
  box-shadow:0 4px 9px rgba(40,25,12,.13), 0 10px 22px rgba(40,25,12,.10); }
.scrim-menu .bigbtn:active{ transform:translateY(1px);
  box-shadow:0 1px 2px rgba(40,25,12,.12); }
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
#game{max-width:1080px;margin:0 auto;padding:10px 12px 24px;position:relative}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 12px;margin-bottom:8px;border-radius:12px;
  background:linear-gradient(#1a4547,#15393b);border:2px solid #0c2426;
  box-shadow:0 2px 0 #0c2426, inset 0 0 0 2px rgba(227,169,43,.25)}
.brand{display:flex;align-items:baseline;gap:2px;font-family:var(--disp);font-size:26px;letter-spacing:.5px}
.brand .bk{display:inline-grid;place-items:center;width:30px;height:34px;border-radius:6px;color:var(--cream-hi);
  border:2px solid var(--ink);transform:rotate(-3deg);text-shadow:1px 1px 0 rgba(0,0,0,.35)}
.brand .b1{background:var(--teal)} .brand .b2{background:var(--red);transform:rotate(2deg)} .brand .b3{background:var(--gold);color:var(--ink);transform:rotate(-2deg)}
.brand i{color:var(--gold);font-style:italic;margin-left:2px}
.brand small{font-family:var(--cond);font-weight:400;font-size:12px;letter-spacing:2px;color:#bfe3d8;text-transform:uppercase;margin-left:8px;align-self:center}
.score{display:flex;gap:8px;margin-left:auto}
.kos{font-family:var(--cond);font-size:13px;letter-spacing:1px;padding:5px 10px;border-radius:8px;border:2px solid var(--ink);color:var(--cream-hi);text-transform:uppercase}
.kos.you{background:var(--teal)} .kos.opp{background:var(--red)}
.tb-btns{display:flex;gap:6px}
.tb-btns button{font-family:var(--cond);letter-spacing:1px;font-size:13px;color:var(--ink);background:var(--gold);
  padding:7px 11px;border-radius:8px;border:2px solid var(--ink);box-shadow:0 2px 0 var(--gold-dk)}
.tb-btns button:active{transform:translateY(2px);box-shadow:none}

/* ---------- board ---------- */
.board{display:flex;flex-direction:column;gap:8px}
.side{padding:8px;border-radius:14px}
.opp-side{background:linear-gradient(#3a1c1c55,#2a141455);border:1px dashed #b53a2c66}
.you-side{background:linear-gradient(#13474a55,#0f3a3d55);border:1px dashed #1f6a6a88}
.side-meta{font-family:var(--cond);letter-spacing:1px;font-size:11px;text-transform:uppercase;color:#cfe7df;opacity:.8;padding:2px 4px}
.row{display:flex;align-items:center;gap:12px;justify-content:center;position:relative}
.deckpile{position:relative;font-size:34px;line-height:1;color:#0a1f20;filter:drop-shadow(0 2px 0 #000)}
.deckpile span{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--cond);font-size:13px;color:var(--gold)}

/* character card */
.char{width:236px;background:var(--paper,var(--cream));border:3px solid var(--frame,var(--ink));border-radius:14px;padding:7px;
  box-shadow:0 6px 0 #0c2426, 0 8px 18px rgba(0,0,0,.35);position:relative}
.char.dead{filter:grayscale(.8) brightness(.7);opacity:.55}
.pc-plate{display:flex;align-items:stretch;gap:5px;margin-bottom:5px}
.pc-name{flex:1;min-width:0;font-family:var(--disp);font-size:15px;letter-spacing:.3px;line-height:1.15;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--plate,#fff);color:var(--plate-ink,var(--ink));border:2px solid var(--frame,var(--ink));border-radius:7px;padding:2px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-hp{position:relative;flex:0 0 auto;min-width:58px;display:grid;place-items:center;border:2px solid var(--frame,var(--ink));border-radius:7px;overflow:hidden;background:#2a2a2a}
.pc-hp i{position:absolute;left:0;top:0;bottom:0;width:100%;background:var(--hp,#4f9fe0);transition:width .35s}
.pc-hp b{position:relative;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.5px;color:var(--hp-ink,#fff);text-shadow:0 1px 1px rgba(0,0,0,.35);padding:2px 7px}
.char.dead .pc-hp i{background:#8a8a8a}
.pc-art{position:relative;height:132px;border:2px solid var(--frame,var(--ink));border-radius:8px;display:grid;place-items:center;overflow:hidden;background:var(--ground,linear-gradient(160deg,var(--accent),#1b1714))}
.pc-art .mono{font-family:var(--disp);font-size:44px;color:rgba(255,255,255,.92);text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.pc-art .port-img{width:100%;height:100%;object-fit:cover;display:block}
.pc-flip{position:absolute;right:5px;bottom:5px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:rgba(12,12,14,.72);color:#fff;font-family:var(--disp);font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0;box-shadow:0 2px 5px rgba(0,0,0,.4);z-index:3}
.pc-flip:hover{background:var(--red)}
.pcb-close{align-self:center;margin-top:auto;font-family:var(--cond);font-size:11px;letter-spacing:.5px;padding:4px 12px;border:2px solid var(--frame,var(--ink));border-radius:6px;background:#fff;cursor:pointer}
.bench-view{width:min(92vw,340px)!important;max-height:90vh;overflow:auto;display:flex;flex-direction:column;gap:7px}
.bench-view .pc-name{font-size:18px}
.bv-art{height:clamp(150px,42vh,290px);border:2px solid var(--frame,var(--ink));border-radius:8px;overflow:hidden;display:grid;place-items:center;background:var(--ground,linear-gradient(160deg,var(--accent),#1b1714))}
.bv-art img{width:100%;height:100%;object-fit:cover;display:block}
.bv-art .mono{font-family:var(--disp);font-size:56px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.bv-move{border:2px solid var(--frame,var(--ink));border-radius:8px;padding:7px 9px;font-family:var(--cond)}
.bv-move.atk{background:#f3c7bf} .bv-move.blk{background:#bfe0e0}
.bv-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.bv-h b{font-size:14px;letter-spacing:.5px}
.bv-move p{margin:0;font-size:12.5px;line-height:1.32;color:#241f1b}
.pips{min-height:20px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:5px}
.pip{font-size:14px;line-height:18px;width:20px;height:20px;display:grid;place-items:center;border-radius:5px;border:1.5px solid var(--ink)}
.pip.atk{background:var(--red);color:var(--gold)} .pip.blk{background:var(--teal);color:var(--cream-hi)}
.pip.iron{background:var(--ink);color:var(--gold)} .pip.none{border:none;color:#a98}
.pc-moves{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.pc-move{display:flex;align-items:center;gap:6px;text-align:left;padding:5px 6px;border-radius:8px;border:2px solid var(--frame,var(--ink));line-height:1.1;width:100%}
.pc-mn{flex:1;min-width:0;font-family:var(--cond);font-weight:700;letter-spacing:.4px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-mc{font-family:var(--cond);font-size:10px;letter-spacing:.3px;opacity:.85;white-space:nowrap}
.pc-chip{flex:0 0 auto;font-family:var(--disp);font-size:13px;line-height:1;color:#fff;padding:4px 7px;border-radius:6px;border:2px solid rgba(0,0,0,.35);min-width:34px;text-align:center}
.pc-chip.red{background:var(--red)} .pc-chip.blue{background:#3f7fd6}
.pc-chip.sm{font-size:11px;padding:2px 6px;min-width:0}
.pc-move.atk{background:#f3c7bf;color:var(--red-dk)}
.pc-move.atk.ready{background:var(--red);color:var(--cream-hi);box-shadow:0 0 0 3px var(--gold),0 3px 0 var(--red-dk);animation:pulse 1.3s infinite}
.pc-move.atk[disabled]{opacity:.62;cursor:not-allowed}
.pc-move.blk{background:#bfe0e0;color:var(--teal-dk);cursor:default}
/* ---- per-deck themes (frame & palette per novel; red/blue move chips kept for game consistency) ---- */
.char[data-deck="hamlet"]{--frame:#0b0b0d;--paper:#f5f6fb;--plate:#ffffff;--plate-ink:#0b0b0d;--hp:#4f9fe0;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#1a2440,#0a0e1c 70%);background:var(--paper) var(--deckbg-hamlet) center/cover;padding:9px}
.char[data-deck="gatsby"]{--frame:#0e0e0e;--paper:#f7efd6;--plate:linear-gradient(#f6d97a,#d4af37);--plate-ink:#241a06;--hp:#d4af37;--hp-ink:#241a06;--ground:linear-gradient(150deg,#2b2416,#0c0a06);background:var(--paper) var(--deckbg-gatsby) center/cover;padding:9px}
.char[data-deck="crucible"]{--frame:#2a2018;--paper:#efe6d1;--plate:#e7dabb;--plate-ink:#3a2a1a;--hp:#8f2d2d;--hp-ink:#ffffff;--ground:linear-gradient(160deg,#3b3025,#140f0a);background:var(--paper) var(--deckbg-crucible) center/cover;padding:9px}
.char[data-deck="frankenstein"]{--frame:#0e1519;--paper:#e6eef1;--plate:#17222a;--plate-ink:#d6f4ff;--hp:#27c2d4;--hp-ink:#04222a;--ground:linear-gradient(160deg,#163a44,#080d10);background:var(--paper) var(--deckbg-frankenstein) center/cover;padding:9px}
.char[data-deck="sherlock"]{--frame:#22301f;--paper:#ece1c4;--plate:#d8ca9f;--plate-ink:#2a2016;--hp:#b08d3c;--hp-ink:#241a08;--ground:linear-gradient(160deg,#2d3326,#11150e);background:var(--paper) var(--deckbg-sherlock) center/cover;padding:9px}
.char[data-deck="oz"]{--frame:#0f2a1e;--paper:#eaf3e6;--plate:linear-gradient(#ffe38f,#e6c34d);--plate-ink:#123322;--hp:#2f9d63;--hp-ink:#04140c;--ground:radial-gradient(circle at 30% 20%,#12503a,#06170f 70%);background:var(--paper) var(--deckbg-oz) center/cover;padding:9px}
.char[data-deck="othello"]{--frame:#141821;--paper:#e7ecf3;--plate:#1b2634;--plate-ink:#cfe4ff;--hp:#d94b3a;--hp-ink:#1a0a08;--ground:linear-gradient(160deg,#1d2733,#080b12);background:var(--paper) var(--deckbg-othello) center/cover;padding:9px}
.char[data-deck="macbeth"]{--frame:#1a0e10;--paper:#efe1de;--plate:#2a1418;--plate-ink:#f0d8d0;--hp:#9c2b2b;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#3a1418,#110507 70%);background:var(--paper) var(--deckbg-macbeth) center/cover;padding:9px}
.char[data-deck="wonderland"]{--frame:#2a0f1e;--paper:#f6eef2;--plate:linear-gradient(#f7d6e0,#e6a6c0);--plate-ink:#3a1020;--hp:#c0223f;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#5a1a3a,#180612 70%);background:var(--paper) var(--deckbg-wonderland) center/cover;padding:9px}
.char[data-deck="gatsby"] .pc-name,.char[data-deck="crucible"] .pc-name,.char[data-deck="sherlock"] .pc-name,.char[data-deck="oz"] .pc-name{font-family:var(--disp)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--gold),0 3px 0 var(--red-dk)}50%{box-shadow:0 0 0 5px var(--gold),0 3px 0 var(--red-dk)}}
.char.hit{animation:hit .45s}
@keyframes hit{0%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(6px,-2px);box-shadow:0 0 0 4px var(--red),0 6px 0 #0c2426}60%{transform:translate(-4px,1px)}100%{transform:translate(0,0)}}

/* bench */
.bench{display:flex;flex-direction:column;gap:5px;width:62px}
.bench-mini{background:var(--cream);border:2px solid var(--ink);border-radius:9px;padding:4px;text-align:center;box-shadow:0 3px 0 #0c2426}
.bench-mini.dead{filter:grayscale(.8);opacity:.5}
.bm-init{display:grid;place-items:center;height:26px;border-radius:6px;color:#fff;font-family:var(--disp);font-size:16px;border:1.5px solid var(--ink);overflow:hidden}
.bm-img{width:100%;height:100%;object-fit:cover;display:block}
.bm-hp{height:6px;background:#e0cfa6;border:1px solid var(--ink);border-radius:4px;margin:3px 0;overflow:hidden}
.bm-hp div{height:100%;background:#3e8e57}
.bm-name{font-family:var(--cond);font-size:10px;letter-spacing:.5px;text-transform:uppercase}

/* mid line / phases */
.midline{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0}
.phasehud{display:flex;align-items:center;gap:6px}
.ph{font-family:var(--cond);letter-spacing:2px;text-transform:uppercase;font-size:14px;color:#9fc4bd;
  background:#0e2c2e;border:2px solid #0a2123;border-radius:8px;padding:7px 14px}
.ph.on{background:var(--gold);color:var(--ink);border-color:var(--ink);box-shadow:0 0 14px rgba(227,169,43,.6),0 3px 0 var(--gold-dk)}
.ph.dim{opacity:.45}
.ph-arrow{color:var(--gold);font-size:18px}
.actions{display:flex;align-items:center;gap:12px;min-height:44px}
.bigbtn{font-family:var(--disp);font-size:16px;color:var(--ink);background:var(--gold);padding:10px 20px;border-radius:10px;border:3px solid var(--ink);box-shadow:0 4px 0 var(--gold-dk)}
.bigbtn:active{transform:translateY(3px);box-shadow:none}
.bigbtn.end{background:var(--red);color:var(--cream-hi);box-shadow:0 4px 0 var(--red-dk)}
.hint{font-family:var(--cond);letter-spacing:1px;font-size:12px;color:#cfe7df;text-transform:uppercase}
.thinking{font-family:var(--cond);letter-spacing:2px;color:var(--gold);text-transform:uppercase;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}

/* hand */
.hand-wrap{position:fixed;left:0;right:0;bottom:0;padding:6px 10px 10px;background:linear-gradient(transparent,#0a2123 22%);z-index:30}
.hand-label{font-family:var(--cond);letter-spacing:2px;text-transform:uppercase;font-size:11px;color:#cfe7df;text-align:center;margin-bottom:2px}
.hand{display:flex;gap:8px;justify-content:center;align-items:flex-end;overflow-x:auto;padding:6px 4px 2px;scrollbar-width:thin}
.hand-toggle{display:none;width:100%;justify-content:center;align-items:center;gap:8px;font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;padding:9px 12px;border:none;border-top:2px solid #1c4a4a;background:#0c2426;color:#dff3ec;cursor:pointer}
.hand .empty{color:#9fc4bd;font-family:var(--cond);letter-spacing:1px}
.hc{flex:0 0 152px;height:150px;background:var(--cream);border:2.5px solid var(--ink);border-radius:11px;overflow:hidden;
  display:flex;flex-direction:column;box-shadow:0 5px 0 #0c2426;transition:transform .14s, box-shadow .14s;position:relative}
.hc.playable{cursor:pointer}
.hc.spent{opacity:.45;filter:saturate(.55)}
.hc.playable:hover{transform:translateY(-12px);box-shadow:0 12px 0 #0c2426,0 0 0 3px var(--gold)}
.hc-top{font-family:var(--cond);letter-spacing:1px;font-size:12px;color:var(--cream-hi);padding:5px 8px;display:flex;justify-content:space-between;align-items:center}
.hc.attack .hc-top{background:var(--red)} .hc.block .hc-top{background:var(--teal)} .hc-top.bmk{background:var(--ink);color:var(--gold)}
.hc .pw{background:var(--gold);color:var(--ink);width:18px;height:18px;display:grid;place-items:center;border-radius:50%;font-size:12px;border:1.5px solid var(--ink)}
.hc-q{font-size:11.5px;line-height:1.25;padding:6px 8px;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}
.hc-foot{font-family:var(--cond);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:#7a6a52;padding:4px 8px;border-top:1px dashed #c9b58a}
.hc-name{font-family:var(--disp);font-size:15px;padding:6px 8px 2px}
.hc-text{font-size:11px;line-height:1.25;padding:0 8px 6px;flex:1;overflow:hidden}

/* ---- crit (Critical Lens) hand cards ---- */
.hc.crit{display:flex;flex-direction:column}
.hc-top.crt{background:linear-gradient(90deg,var(--gold-dk),var(--gold));color:var(--ink);letter-spacing:1.5px}
.hcc-port{flex:1;overflow:hidden;border-bottom:2px solid var(--ink);background:#1b1714}
.hcc-img{width:100%;height:100%;object-fit:cover;object-position:50% 28%;display:block}
.hcc-mono{display:grid;place-items:center;height:100%;font-family:var(--disp);font-size:30px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.hcc-nm{font-family:var(--cond);letter-spacing:.5px;font-size:12.5px;text-align:center;padding:4px 6px 2px;line-height:1.05}
.hcc-foot{font-family:var(--cond);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:#7a6a52;text-align:center;padding:0 6px 5px}
/* ---- active lens chip on the board ---- */
.lenschip{display:flex;gap:8px;align-items:stretch;background:var(--cream);border:2.5px solid var(--ink);border-left:7px solid var(--lc,#7a5c2c);border-radius:11px;padding:6px;margin:6px 0;max-width:560px;box-shadow:0 3px 0 #0c2426}
.lenschip.bar{padding:3px 6px;align-items:center}
.lenschip.bar .lc-port{width:26px;height:26px;flex-basis:26px}
.lenschip.bar .lc-mono{font-size:11px}
.lenschip.bar .lc-body{flex-direction:row;align-items:center;gap:8px}
.lenschip.bar .lc-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lenschip.bar .lc-thesis{margin:0;padding:3px 9px;font-size:10.5px}
.lc-metdot{color:#2e9e52;font-size:13px}
.lc-toggle{flex:0 0 auto;align-self:center;width:22px;height:22px;border:2px solid var(--ink);border-radius:6px;background:#fff;cursor:pointer;font-size:11px;line-height:1;display:grid;place-items:center;padding:0}
.lenschip.empty{justify-content:center;align-items:center;border-left-color:#6b6257;opacity:.6;min-height:34px}
.lc-none{font-family:var(--cond);letter-spacing:1.5px;text-transform:uppercase;font-size:11px;color:#7a6a52}
.lc-port{flex:0 0 52px;width:52px;height:52px;border:2px solid var(--ink);border-radius:8px;overflow:hidden;background:#1b1714;align-self:center}
.lc-img{width:100%;height:100%;object-fit:cover;object-position:50% 26%;display:block}

/* toast */

/* ---------- deck tools + code on title ---------- */
.deck-tools{margin-top:14px}
.toolbtn{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;background:var(--cream);color:var(--ink);
  border:2px solid var(--ink);border-radius:9px;padding:9px 14px;box-shadow:0 3px 0 #0c2426;cursor:pointer}
.toolbtn:hover{background:var(--gold)}
.code-load{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.code-input{font-family:var(--cond);font-size:13px;padding:8px 11px;border:2px solid var(--ink);border-radius:9px;background:#fff;color:var(--ink);min-width:240px}
.code-msg{min-height:18px;font-family:var(--cond);letter-spacing:.5px;font-size:13px;margin:8px 0 0}
.code-msg.ok{color:#bfe3a8} .code-msg.bad{color:#ff9d8c}
.custom-banner{margin-top:12px;display:inline-flex;gap:8px;align-items:center;background:var(--ink);color:var(--gold);border:2px solid var(--gold);
  border-radius:10px;padding:7px 13px;font-family:var(--cond);letter-spacing:.5px;font-size:13px}
.custom-banner button{background:var(--red);color:var(--cream-hi);border:none;border-radius:6px;padding:3px 9px;font-family:var(--cond);cursor:pointer}

/* ---------- deck builder ---------- */
.builder{max-width:860px;margin:0 auto;padding:14px 14px 70px;color:var(--cream-hi)}
.bd-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bd-top h1{font-family:var(--disp);font-size:26px;margin:0;flex:1;color:var(--cream-hi)}
.bd-setpick{display:flex;gap:6px}
.bd-set{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;background:var(--cream);color:var(--ink);border:2px solid var(--ink);border-radius:8px;padding:7px 13px;cursor:pointer}
.bd-set.on{background:var(--gold);box-shadow:0 0 0 2px var(--gold-dk)}
.bd-totals{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;justify-content:center}
.bd-totals span{font-family:var(--cond);letter-spacing:.5px;font-size:13px;background:var(--cream);color:var(--ink);border:2px solid var(--ink);border-radius:8px;padding:5px 11px}
.bd-totals span.over{background:var(--red);color:var(--cream-hi);border-color:var(--red-dk)}
.bd-totals span.locked{opacity:.7}
.bd-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.bd-codebox{display:flex;gap:8px;justify-content:center;margin:8px 0 4px}
.bd-codebox .code-input{min-width:320px}
.bd-sec{background:rgba(242,230,198,.06);border:1px solid rgba(227,169,43,.25);border-radius:12px;padding:12px 14px;margin-top:14px}
.bd-sec h3{font-family:var(--disp);font-size:18px;margin:0 0 10px;color:var(--gold)}
.bd-sec h3 small{font-family:var(--cond);font-weight:400;letter-spacing:.5px;text-transform:uppercase;font-size:11px;color:#bfe3d8;margin-left:8px}
.bd-grid{display:grid;gap:8px}
.bd-grid.ch{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.bd-grid.ab{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.bd-chip{position:relative;text-align:left;background:var(--cream);color:var(--ink);border:2px solid var(--ink);border-radius:10px;padding:8px 30px 8px 8px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 0 #0c2426}
.bd-chip.on{box-shadow:0 2px 0 #0c2426,0 0 0 3px var(--gold)}
.bd-chip .bd-av{width:38px;height:38px;border-radius:7px;object-fit:cover;border:1.5px solid var(--ink);flex:none}
.bd-av.mono-av{display:grid;place-items:center;font-family:var(--disp);font-size:14px;color:#fff}
.bd-nm{font-family:var(--cond);letter-spacing:.5px;font-size:14px;font-weight:600}
.bd-chip.ab{flex-direction:column;align-items:flex-start;gap:4px;border-top:6px solid var(--ink)}
.bd-chip.ab.attack{border-top-color:var(--red)} .bd-chip.ab.block{border-top-color:var(--teal)}
.bd-ty{font-family:var(--cond);font-size:12px;letter-spacing:1px;color:var(--ink-2)}
.bd-q{font-family:var(--body);font-size:13px;line-height:1.25}
.bd-mk{position:absolute;top:7px;right:9px;font-family:var(--disp);font-size:15px;color:var(--teal-dk)}
.bd-chip.on .bd-mk{color:var(--red)}
.bd-bmgrid{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.bd-bm{background:var(--cream);color:var(--ink);border:2px solid var(--ink);border-radius:10px;padding:8px 10px;box-shadow:0 2px 0 #0c2426}
.bd-bmname{font-family:var(--disp);font-size:14px;display:block}
.bd-bmtext{font-size:11.5px;color:var(--ink-2);display:block;margin-top:3px}
.bd-step{float:right;display:inline-flex;align-items:center;gap:8px}
.bd-step button{width:24px;height:24px;border:2px solid var(--ink);border-radius:6px;background:#fff;font-family:var(--disp);cursor:pointer;line-height:1}
.bd-step b{min-width:14px;text-align:center;font-family:var(--cond)}
.bd-crit{font-family:var(--cond);letter-spacing:.5px;color:#bfe3d8;background:rgba(0,0,0,.18);border:1px dashed #2a5a5c;border-radius:9px;padding:12px;text-align:center}

/* ---------- deck stack + discard ---------- */
.piles{display:flex;flex-direction:column;gap:12px;align-items:center}
.deckstack{position:relative;width:64px;height:90px}
.deckstack .cardback{position:absolute;inset:0}
.cardback{border-radius:9px;background:repeating-linear-gradient(45deg,#14484b 0 7px,#0f3c3e 7px 14px);
  border:2px solid var(--ink);box-shadow:inset 0 0 0 3px var(--gold-dk),inset 0 0 0 5px #0e2c2e;display:grid;place-items:center;overflow:hidden}
.cb-rim{position:absolute;inset:7px;border:2px solid var(--gold);border-radius:7px;opacity:.65}
.cb-disc{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,#1c595b,#0e2c2e);border:3px solid var(--gold);
  display:grid;place-items:center;font-family:var(--disp);font-size:15px;color:var(--gold);box-shadow:0 0 0 2px var(--ink);line-height:1}
.cb-disc i{font-size:9px;color:var(--cream-hi);font-style:italic}
.cb-tag{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-family:var(--cond);font-size:7px;letter-spacing:1px;color:var(--gold);opacity:.85}
.cardback.empty{background:#0e2c2e;border:2px dashed #2a5a5c;box-shadow:none}
.deck-ct{position:absolute;bottom:-7px;right:-7px;z-index:9;background:var(--ink);color:var(--gold);border:2px solid var(--gold);
  font-family:var(--cond);font-size:13px;border-radius:8px;padding:1px 7px;box-shadow:0 2px 0 #000}
.discardpile{position:relative;width:84px;height:66px;border-radius:9px;background:#2a1414;border:2px solid var(--ink);
  box-shadow:0 3px 0 #0c2426;display:grid;place-items:center;cursor:pointer;color:var(--cream-hi)}
.discardpile:hover{box-shadow:0 3px 0 #0c2426,0 0 0 3px var(--gold)}
.dp-face{font-size:26px;opacity:.8}
.dp-ct{position:absolute;bottom:3px;right:6px;font-family:var(--cond);font-size:12px;color:var(--gold)}
.discardpile em{position:absolute;top:2px;left:5px;font-style:normal;font-family:var(--cond);font-size:10px;color:#ff8e7a}
.deckstack.shuffling{animation:shuffle .8s ease-in-out}
@keyframes shuffle{0%{transform:translateY(0) rotate(0)}15%{transform:translateY(-7px) rotate(-5deg)}30%{transform:translateX(6px) rotate(4deg)}45%{transform:translateY(-5px) rotate(-3deg)}60%{transform:translateX(-6px) rotate(4deg)}75%{transform:translateY(-3px) rotate(-2deg)}100%{transform:translateY(0) rotate(0)}}

/* ---------- card motion ---------- */
.hc.deal-in{animation:dealin .46s cubic-bezier(.2,.8,.3,1.15) both}
@keyframes dealin{0%{transform:translate(150px,-280px) rotate(20deg) scale(.7);opacity:0}55%{opacity:1}100%{transform:translate(0,0) rotate(0) scale(1);opacity:1}}
.fly-card{position:fixed;z-index:55;pointer-events:none;perspective:600px}
.fly-card .fc-inner{position:absolute;inset:0;animation:flycard .55s ease-out both}
@keyframes flycard{0%{transform:translateY(0) rotateZ(0) scale(1);opacity:1}100%{transform:translateY(-46px) translateX(10px) rotateZ(26deg) scale(.58);opacity:0}}

/* ---------- KO tombstone ---------- */
.ko-fx{position:fixed;z-index:60;pointer-events:none}
.ko-card{position:absolute;inset:0;border-radius:12px;border:3px solid var(--red);box-shadow:0 0 0 3px var(--gold),0 0 30px rgba(181,58,44,.6);animation:koshake .55s linear both}
@keyframes koshake{0%,100%{transform:translateX(0) rotate(0)}10%{transform:translateX(-8px) rotate(-3deg)}20%{transform:translateX(8px) rotate(3deg)}30%{transform:translateX(-7px) rotate(-2deg)}40%{transform:translateX(7px) rotate(2deg)}55%{transform:translateX(-4px);opacity:1}100%{opacity:0;transform:scale(.6)}}
.ko-stone{position:absolute;left:50%;top:54%;width:74%;padding:16px 8px 12px;border-radius:46px 46px 8px 8px;
  background:linear-gradient(#a4aab0,#717880);border:3px solid #3a3d42;box-shadow:0 7px 0 #2a2c30,inset 0 5px 9px rgba(255,255,255,.35);
  text-align:center;color:#2a2c30;font-family:var(--disp);animation:kostone 1.7s ease-out both}
.ko-stone b{display:block;font-size:20px;letter-spacing:2px}
.ko-stone span{display:block;font-family:var(--cond);font-size:11px;letter-spacing:.5px;margin-top:3px}
@keyframes kostone{0%,22%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}22.1%{opacity:1}38%{transform:translate(-50%,-50%) scale(1.14) rotate(4deg)}50%{transform:translate(-50%,-50%) scale(1) rotate(0)}82%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-62%) scale(.95);opacity:0}}

/* ---------- combat / status / heal fx ---------- */
.cfx{position:fixed;z-index:58;pointer-events:none}
.cfx-ring{position:absolute;inset:0;border-radius:12px;animation:cfxring .5s ease-out both}
.cfx-ring.atk{border:3px solid var(--red);box-shadow:0 0 20px rgba(181,58,44,.7),inset 0 0 14px rgba(181,58,44,.5)}
.cfx-ring.blk{border:3px solid var(--teal);box-shadow:0 0 20px rgba(31,106,106,.7),inset 0 0 14px rgba(31,106,106,.45)}
.cfx-ring.heal{border:3px solid #54b35e;box-shadow:0 0 20px rgba(84,179,94,.7),inset 0 0 14px rgba(84,179,94,.45)}
@keyframes cfxring{0%{transform:scale(.84);opacity:0}28%{opacity:1}100%{transform:scale(1.05);opacity:0}}
.cfx-slash{position:absolute;left:50%;top:50%;width:5px;height:130%;background:linear-gradient(var(--red),#fff);transform:translate(-50%,-50%) rotate(38deg);border-radius:3px;box-shadow:0 0 12px #fff;animation:cfxslash .42s ease-out both}
@keyframes cfxslash{0%{opacity:0;transform:translate(-50%,-50%) rotate(38deg) scaleY(.2)}30%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) rotate(38deg) scaleY(1.1)}}
.cfx-float{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);font-family:var(--disp);font-weight:800;font-size:23px;letter-spacing:1px;white-space:nowrap;text-shadow:0 2px 5px rgba(0,0,0,.6),0 0 3px #000;animation:cfxfloat 1s ease-out both}
.cfx-float.atk{color:#ffd6cd}
.cfx-float.blk{color:#c2e7dc}
.cfx-float.heal{color:#cdf0cc}
.cfx-float.status{font-size:14px;font-family:var(--cond);font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:11px;border:2px solid #C99B57;background:rgba(22,17,12,.86);color:#F0DFB3;text-shadow:none;animation:cfxbadge 1.05s ease-out both}
.cfx-float.status.neg{border-color:#d8714f;color:#ffd9c9}
.cfx-float.status.pos{border-color:#6bbf6b;color:#d6f0d0}
@keyframes cfxfloat{0%{transform:translate(-50%,-30%) scale(.7);opacity:0}24%{opacity:1;transform:translate(-50%,-58%) scale(1.06)}68%{opacity:1}100%{transform:translate(-50%,-118%) scale(1);opacity:0}}
@keyframes cfxbadge{0%{transform:translate(-50%,-20%) scale(.6);opacity:0}22%{opacity:1;transform:translate(-50%,-70%) scale(1.05)}70%{opacity:1}100%{transform:translate(-50%,-120%) scale(1);opacity:0}}

.title-emblem{display:flex;justify-content:center;gap:4px;margin-top:10px}
.title-emblem .bk{width:64px;height:74px;font-size:52px}
.title-emblem i{font-family:var(--disp);font-style:italic;color:var(--gold);font-size:40px;align-self:flex-end}
.title-main{font-family:var(--disp);font-size:clamp(30px,7vw,52px);line-height:1.02;margin:14px 0 4px;color:var(--cream-hi);text-shadow:3px 3px 0 #0c2426}
.title-sub{font-family:var(--cond);letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:0 0 18px;font-size:14px}
.rules{background:var(--cream);color:var(--ink);border:3px solid var(--ink);border-radius:14px;padding:16px 18px;text-align:left;box-shadow:0 6px 0 #0c2426}
.rules h2,.deck-pick-wrap h2{font-family:var(--disp);font-size:20px;margin:0 0 8px}
.rules ol{margin:0;padding-left:20px}
.rules li{margin:7px 0;line-height:1.4;font-size:14.5px}
.ic{font-family:var(--cond);font-size:12px;letter-spacing:.5px;padding:1px 7px;border-radius:6px;border:1.5px solid var(--ink);white-space:nowrap}
.ic.atk{background:var(--red);color:var(--cream-hi)} .ic.blk{background:var(--teal);color:var(--cream-hi)} .ic.bmk{background:var(--ink);color:var(--gold)}
.deck-pick-wrap{margin-top:20px}
.deck-pick{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.deck-opt{flex:1 1 220px;max-width:300px;background:var(--cream);color:var(--ink);border:3px solid var(--ink);border-radius:14px;padding:14px;text-align:center;box-shadow:0 6px 0 #0c2426;transition:transform .12s,box-shadow .12s;border-top:8px solid var(--da)}
.deck-opt:hover{transform:translateY(-4px)}
.deck-opt.sel{box-shadow:0 6px 0 #0c2426,0 0 0 4px var(--gold);transform:translateY(-4px)}
.deck-emblem{font-size:40px}
.deck-avatars{display:flex;justify-content:center;gap:-6px;margin-bottom:4px}
.deck-av{width:52px;height:52px;border-radius:50%;border:3px solid var(--ink);object-fit:cover;margin-left:-10px;box-shadow:0 2px 0 #0c2426;background:#1b1714}
.deck-av:first-child{margin-left:0}
.deck-av.mono-av{display:grid;place-items:center;font-family:var(--disp);font-size:18px;color:#fff}
.deck-nm{font-family:var(--disp);font-size:18px;margin:4px 0}
.deck-ch{font-size:12px;color:var(--ink-2);min-height:30px}
.deck-tag{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:12px;margin-top:8px;color:var(--da)}
.deck-opt.sel .deck-tag{color:var(--teal-dk)}
.facing{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:12px;color:#bfe3d8;margin-top:10px}
.bigbtn.start{margin-top:22px;font-size:20px;padding:14px 30px}
.title-foot{font-size:12px;color:#9fc4bd;margin-top:16px}

/* ---------- piles ---------- */
.piles{display:flex;flex-direction:column;gap:8px}
.pile{position:relative;width:46px;height:54px;border-radius:8px;display:grid;place-items:center;font-size:24px;
  border:2px solid var(--ink);box-shadow:0 3px 0 #0c2426;color:var(--cream-hi)}
.pile.deck{background:#0e2c2e} .pile.discard{background:#2a1414;cursor:pointer}
.pile.discard:hover{box-shadow:0 3px 0 #0c2426,0 0 0 3px var(--gold)}
.pile span{position:absolute;bottom:2px;right:5px;font-family:var(--cond);font-size:12px;color:var(--gold)}
.pile em{position:absolute;top:1px;left:3px;font-style:normal;font-family:var(--cond);font-size:10px;color:#ff8e7a}

/* ---------- defend / picker / viewer modals ---------- */
.defend,.picker,.viewer{width:min(440px,94vw);background:var(--cream);border:4px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:0 14px 0 #0c2426}
.def-head{font-family:var(--disp);font-size:20px;color:var(--cream-hi);background:var(--red);padding:12px 16px}
.def-body{padding:14px 16px;font-size:15px;line-height:1.4}
.def-opts{display:flex;flex-direction:column;gap:10px;padding:0 16px 16px}
.def-opts .bigbtn{display:flex;flex-direction:column;align-items:flex-start;font-size:16px;padding:12px 16px}
.def-opts .bigbtn span{font-family:var(--cond);font-weight:400;letter-spacing:.5px;font-size:12px;text-transform:uppercase;opacity:.9;margin-top:2px}
.picker{padding:18px}
.pick-title{font-family:var(--disp);font-size:20px;text-align:center;margin-bottom:12px}
.pick-opts{display:flex;flex-direction:column;gap:9px}
.pick-opt{text-align:left;background:#fff;border:2px solid var(--ink);border-radius:9px;padding:11px 13px;font-family:var(--cond);letter-spacing:.5px;font-size:14px;transition:transform .1s,background .1s}
.pick-opt:hover{background:var(--gold);transform:translateX(4px)}
.viewer{padding:18px;text-align:left}
.vw-title{font-family:var(--disp);font-size:20px;text-align:center;margin-bottom:8px}
.vw-sec{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:12px;color:var(--ink-2);margin:12px 0 6px;border-bottom:1px dashed #c9b58a;padding-bottom:3px}
.vw-list{display:flex;flex-wrap:wrap;gap:6px;min-height:22px}
.vw-list i{color:#9a8a6a;font-size:13px}
.pl{font-family:var(--cond);letter-spacing:.5px;font-size:12px;padding:3px 9px;border-radius:6px;border:1.5px solid var(--ink);color:var(--cream-hi)}
.pl.attack{background:var(--red)} .pl.block{background:var(--teal)} .pl.bmk{background:var(--ink);color:var(--gold)} .pl.ko{background:#4a4a4a}
.vw-close{display:block;margin:16px auto 0;font-family:var(--cond);letter-spacing:1px;padding:9px 16px;border:2px solid var(--ink);border-radius:9px;background:#fff;text-transform:uppercase;font-size:13px}
/* ---- drag-to-charge (ABC → character) ---- */
.hc.abc.drag-src{ touch-action:none; cursor:grab; }
.hand-hint{ font-weight:400; opacity:.6; font-size:.7rem; }
body.dragging-abc{ cursor:grabbing; user-select:none; }
body.dragging-abc .drop-zone{ outline:2px dashed rgba(212,175,110,.55); outline-offset:2px; border-radius:10px; transition:outline-color .15s; }
body.dragging-abc .drop-zone.dragover{ outline:3px solid #E6B85C; box-shadow:0 0 18px rgba(230,184,92,.5); }
.bench-mini.drop-zone{ cursor:copy; }
.drag-ghost{ position:fixed; z-index:9999; transform:translate(-50%,-130%); pointer-events:none;
  background:linear-gradient(160deg,#3a2f25,#241c16); color:#F3E4C4; border:1px solid #C99B57;
  padding:8px 12px; border-radius:9px; font-weight:800; font-size:1rem; box-shadow:0 8px 22px rgba(0,0,0,.5); white-space:nowrap; }
/* ---- deck-builder card preview ---- */
.bd-pv{ cursor:zoom-in; opacity:.55; font-size:.82rem; padding:0 4px; transition:opacity .15s,transform .15s; }
.bd-pv:hover{ opacity:1; transform:scale(1.15); }
.bd-pv.inline{ margin-left:6px; }
.cardpv-scrim{ position:fixed; inset:0; z-index:9998; display:none; align-items:center; justify-content:center;
  background:rgba(12,9,7,.78); backdrop-filter:blur(3px); padding:20px; }
.cardpv-scrim.show{ display:flex; }
.cardpv{ position:relative; max-width:340px; width:100%; animation:pvpop .18s ease; }
@keyframes pvpop{ from{ transform:scale(.9); opacity:0 } to{ transform:scale(1); opacity:1 } }
.cardpv-x{ position:absolute; top:-12px; right:-12px; width:34px; height:34px; border-radius:50%;
  background:#2A211A; color:#F3E4C4; border:1px solid #C99B57; font-size:1rem; cursor:pointer; z-index:2; }
.pv-card{ border-radius:14px; padding:16px; background:linear-gradient(165deg,#211a14,#171210); border:1px solid #5a4636; box-shadow:0 14px 40px rgba(0,0,0,.6); color:#EFE2C7; }
.pv-card.pvchar{ border:1px solid var(--accent); }
.pv-card.pvchar[data-deck="gatsby"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-gatsby) center/cover; }
.pv-card.pvchar[data-deck="hamlet"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-hamlet) center/cover; }
.pv-card.pvchar[data-deck="frankenstein"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-frankenstein) center/cover; }
.pv-card.pvchar[data-deck="sherlock"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-sherlock) center/cover; }
.pv-card.pvchar[data-deck="othello"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-othello) center/cover; }
.pv-card.pvchar[data-deck="macbeth"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-macbeth) center/cover; }
.pv-card.pvchar[data-deck="wonderland"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-wonderland) center/cover; }
.pv-card.pvchar[data-deck="oz"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-oz) center/cover; }
.pv-card.pvchar[data-deck="crucible"]{ background:linear-gradient(rgba(18,14,8,.82),rgba(9,7,3,.88)),var(--deckbg-crucible) center/cover; }
.pv-port{ height:170px; border-radius:10px; overflow:hidden; background:linear-gradient(160deg,var(--accent,#444),#1b1714); display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
.pv-port.small{ height:120px; }
.pv-port img{ width:100%; height:100%; object-fit:cover; }
.pvmono{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; font-weight:800; color:#fff; }
.pv-name{ font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:800; margin:2px 0 4px; }
.pv-hp{ font-size:.85rem; opacity:.85; margin-bottom:10px; }
.pv-hp em{ color:#E08A6A; font-style:normal; }
.pv-move{ border-radius:9px; padding:9px 11px; margin-top:8px; background:rgba(255,255,255,.04); border-left:4px solid #888; }
.pv-move.atk{ border-left-color:#C8443A; }
.pv-move.blk{ border-left-color:#4F86C6; }
.pv-mv-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
.pv-mv-top b{ font-size:.98rem; }
.pv-cost{ font-weight:800; font-size:.85rem; opacity:.9; }
.pv-mv-txt{ font-size:.82rem; opacity:.82; margin-top:3px; line-height:1.35; }
.pv-abc-top{ font-weight:800; letter-spacing:.04em; font-size:.8rem; opacity:.85; margin-bottom:8px; }
.pvabc.attack .pv-abc-top{ color:#E0796E; } .pvabc.block .pv-abc-top{ color:#6FA3DC; }
.pv-abc-q{ font-size:1.02rem; font-weight:700; line-height:1.35; margin-bottom:12px; }
.pv-opt{ font-size:.86rem; padding:7px 10px; border-radius:7px; margin-top:6px; background:rgba(255,255,255,.04); border:1px solid transparent; }
.pv-opt.correct{ background:rgba(90,160,90,.18); border-color:rgba(120,200,120,.5); color:#CFE9C4; font-weight:700; }
.pv-abc-foot{ font-size:.72rem; opacity:.6; margin-top:10px; }
.pv-sec{ font-size:.84rem; margin-top:9px; line-height:1.4; }
.pv-sec span{ display:block; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; opacity:.6; margin-bottom:2px; }
.pv-sec.reward{ color:#E6C77A; }
.pv-bm-top{ font-weight:800; font-size:.8rem; opacity:.85; margin-bottom:6px; }
.pv-bm-txt{ font-size:.9rem; line-height:1.4; opacity:.9; margin-top:4px; }
/* active bookmarks zone (effects in play, awaiting trigger) */
.abm-zone{ display:flex; flex-direction:column; gap:4px; max-width:124px; }
.abm-label{ font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; opacity:.62; font-weight:700; }
.abm-card{ background:linear-gradient(160deg,#2a2418,#1c1810); border:1px solid #6b5a33; border-left:3px solid #E0B24E; border-radius:6px; padding:3px 7px; cursor:help; }
.abm-nm{ display:block; font-size:.62rem; font-weight:800; color:#F0DFB3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; }
.abm-tag{ display:block; font-size:.55rem; opacity:.72; }
/* turn-timer clock */
.turnclock{ font-weight:800; font-size:.95rem; color:#E8D49A; background:rgba(0,0,0,.25); border:1px solid #6b5a33; border-radius:8px; padding:3px 10px; min-width:56px; text-align:center; }
.turnclock.low{ color:#fff; background:var(--red,#B53A2C); border-color:#E0796E; animation:tcpulse .8s ease-in-out infinite; }
@keyframes tcpulse{ 0%,100%{ opacity:1 } 50%{ opacity:.55 } }
/* bookshelf deck picker */
.bookshelf{ margin:10px auto 6px; max-width:760px; }
.shelf-row{ display:flex; gap:16px; justify-content:center; align-items:flex-end; flex-wrap:wrap; padding:14px 12px 0; }
.deckbox{ position:relative; width:120px; padding:0; border:none; background:none; cursor:pointer; transition:transform .16s ease; filter:drop-shadow(0 9px 11px rgba(0,0,0,.5)); }
.deckbox .db-img{ border-radius:5px; overflow:hidden; border:1px solid rgba(0,0,0,.45); }
.deckbox .db-img img{ display:block; width:100%; height:auto; }
.deckbox:hover{ transform:translateY(-12px) rotate(-1deg); }
.deckbox.sel{ transform:translateY(-14px); }
.deckbox.sel .db-img{ outline:3px solid #E6B85C; box-shadow:0 0 24px rgba(230,184,92,.6); }
.db-badge{ position:absolute; bottom:-11px; left:50%; transform:translateX(-50%); background:#2A211A; color:#E8D49A; border:1px solid #C99B57; font-weight:800; font-size:.6rem; padding:3px 9px; border-radius:11px; white-space:nowrap; transition:background .15s,color .15s; }
.deckbox.sel .db-badge{ background:#E6B85C; color:#241c10; }
.deckbox.soon{ cursor:not-allowed; filter:drop-shadow(0 9px 11px rgba(0,0,0,.5)) grayscale(.72) brightness(.66); }
.deckbox.soon:hover{ transform:none; }
.db-soon{ position:absolute; top:46%; left:50%; transform:translate(-50%,-50%) rotate(-8deg); background:rgba(20,16,12,.86); color:#F0DFB3; border:2px solid #C99B57; font-family:var(--disp); font-weight:800; font-size:.92rem; letter-spacing:.03em; padding:6px 12px; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,.55); white-space:nowrap; }
.shelf-plank{ height:20px; margin:0 6px; border-radius:3px; background:linear-gradient(180deg,#6b4a2c,#3d2917); box-shadow:0 7px 14px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.4); border:1px solid #2a1c10; }
/* ---------- opponent picker (title) ---------- */
.opp-pick{ margin-top:16px; }
.opp-pick-label{ display:block; font-family:var(--cond); letter-spacing:2px; text-transform:uppercase; font-size:11px; color:#bfe3d8; margin-bottom:8px; }
.opp-opts{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.opp-opt{ font-family:var(--cond); letter-spacing:.5px; font-size:13px; padding:7px 14px; border-radius:9px; border:2px solid var(--ink); background:var(--cream); color:var(--ink); cursor:pointer; box-shadow:0 2px 0 rgba(40,25,12,.4); transition:transform .12s; }
.opp-opt:hover{ transform:translateY(-2px); }
.opp-opt.on{ background:var(--gold); border-color:var(--gold-dk); box-shadow:0 0 0 2px var(--gold-dk); font-weight:700; }

/* ---------- responsive: battle fits the viewport (no scrolling) ---------- */
body[data-screen="play"]{ overflow:hidden; }
body[data-screen="play"] #game{
  height:100vh; height:100dvh; max-width:1080px; margin:0 auto;
  display:flex; flex-direction:column; gap:6px; padding:8px 12px; overflow:hidden;
}
body[data-screen="play"] .topbar{ flex:none; }
body[data-screen="play"] .board{
  flex:1 1 auto; min-height:0; display:flex; flex-direction:column;
  justify-content:safe center; gap:clamp(2px,1vh,8px); overflow:hidden;
}
body[data-screen="play"] .board-inner{ display:flex; flex-direction:column; justify-content:center; gap:clamp(2px,1vh,8px); }
body[data-screen="play"] .side{ min-height:0; }
body[data-screen="play"] .row{ min-height:0; }
body[data-screen="play"] .side{ padding:clamp(4px,1vh,8px); }
body[data-screen="play"] .side-meta{ font-size:clamp(9px,1.5vh,11px); }
body[data-screen="play"] .row{ gap:clamp(6px,2vw,12px); }
body[data-screen="play"] .char{ width:clamp(146px,40vw,236px); padding:clamp(4px,0.9vh,8px); }
body[data-screen="play"] .pc-name{ font-size:clamp(11px,2vh,15px); }
body[data-screen="play"] .pc-plate{ margin-bottom:clamp(2px,0.6vh,5px); }
body[data-screen="play"] .pc-hp b{ font-size:clamp(10px,1.6vh,12px); }
body[data-screen="play"] .pc-art{ height:clamp(50px,11vh,132px); }
body[data-screen="play"] .pips{ min-height:0; margin-bottom:clamp(2px,0.5vh,5px); }
body[data-screen="play"] .pc-moves{ gap:clamp(2px,0.6vh,5px); margin-top:clamp(2px,0.5vh,4px); }
body[data-screen="play"] .pc-move{ padding:clamp(3px,0.7vh,5px) 6px; }
body[data-screen="play"] .pc-mn{ font-size:clamp(11px,1.7vh,12.5px); }
body[data-screen="play"] .pc-mc{ font-size:clamp(8px,1.2vh,10px); }
body[data-screen="play"] .pc-chip{ font-size:clamp(11px,1.7vh,13px); padding:clamp(2px,0.5vh,4px) clamp(4px,1vw,7px); }
body[data-screen="play"] .lenschip{ padding:clamp(3px,0.7vh,6px); margin:clamp(2px,0.6vh,6px) 0; }
body[data-screen="play"] .lenschip.empty{ min-height:0; padding:clamp(2px,0.5vh,6px); }
body[data-screen="play"] .midline{ gap:clamp(3px,0.9vh,8px); padding:clamp(1px,0.4vh,4px) 0; }
body[data-screen="play"] .actions{ min-height:0; }
body[data-screen="play"] .bench{ width:clamp(54px,12vw,78px); gap:clamp(3px,0.8vh,6px); }
body[data-screen="play"] .deckstack{ width:clamp(52px,9vw,84px); height:clamp(70px,12vh,118px); }
body[data-screen="play"] .piles{ gap:clamp(4px,1vh,12px); }
body[data-screen="play"] .abm-zone{ max-width:clamp(70px,14vw,124px); }
body[data-screen="play"] .hand-wrap{ position:relative; flex:none; left:auto; right:auto; bottom:auto; padding:4px 10px 6px; }
body[data-screen="play"] .hand-label{ margin-bottom:1px; }
body[data-screen="play"] .hc{ flex-basis:clamp(104px,15vh,152px); height:clamp(92px,17vh,150px); }
body[data-screen="play"] .hc-q{ -webkit-line-clamp:4; font-size:clamp(10px,1.5vh,11.5px); }
@media (max-height:700px){
  body[data-screen="play"] .hand-hint{ display:none; }
  body[data-screen="play"] .hc-q{ -webkit-line-clamp:3; }
}
@media (max-height:560px){
  body[data-screen="play"] .side-meta{ display:none; }
  body[data-screen="play"] .lenschip.empty{ display:none; }
}
@media (max-width:560px){
  body[data-screen="play"] #game{ padding:6px 8px; gap:4px; }
  body[data-screen="play"] .hand-hint{ display:none; }
  body[data-screen="play"] .row{ gap:8px; }
  body[data-screen="play"] .topbar small{ display:none; }
  body[data-screen="play"] .lenschip{ max-width:none; }
  /* stack the two battlefields into a vertical swipe pager (opponent over you) */
  body[data-screen="play"] .board{
    flex-direction:column; overflow-y:auto; overflow-x:hidden;
    scroll-snap-type:y mandatory; justify-content:flex-start; gap:0;
    padding-bottom:82px; -webkit-overflow-scrolling:touch;
  }
  body[data-screen="play"] .board-inner{ display:contents; }
  body[data-screen="play"] .board .side{
    min-height:calc(100dvh - 132px); scroll-snap-align:center; scroll-snap-stop:always;
    display:flex; flex-direction:column; justify-content:center;
  }
  body[data-screen="play"] .char{ width:clamp(150px,60vw,220px); }
  body[data-screen="play"] .pc-art{ height:clamp(100px,20vh,150px); }
  body[data-screen="play"] .side-meta{ display:block !important; text-align:center; font-size:12px; opacity:.9; }
  body[data-screen="play"] .board::after{
    content:"\2195 swipe between boards"; position:fixed; top:50px; left:50%; transform:translateX(-50%);
    font-family:var(--cond); font-size:10px; letter-spacing:1px; color:#bfe3d8; opacity:.7; z-index:20; pointer-events:none;
  }
  /* pin the phase / turn / action strip so it stays reachable while swiping */
  body[data-screen="play"] .midline{
    position:fixed; left:0; right:0; bottom:40px; z-index:26;
    flex-direction:row; flex-wrap:wrap; justify-content:center; gap:6px;
    background:#0c2426f2; padding:4px 8px; box-shadow:0 -3px 10px rgba(0,0,0,.4);
  }
  /* hand collapses to a tap-to-open tray */
  body[data-screen="play"] .hand-wrap{
    position:fixed; left:0; right:0; bottom:0; top:auto; padding:0; z-index:32;
    display:flex; flex-direction:column-reverse; background:none;
  }
  body[data-screen="play"] .hand-toggle{ display:flex; }
  body[data-screen="play"] .hand-label{ display:none; }
  body[data-screen="play"] .hand-wrap .hand{ display:none; }
  body[data-screen="play"] .hand-wrap.open .hand{
    display:flex; max-height:48vh; overflow-x:auto; overflow-y:hidden;
    background:#0a2123f7; padding:10px; border-top:2px solid #1c4a4a; box-shadow:0 -6px 16px rgba(0,0,0,.5);
  }
}
/* topbar, crit-chip readability, and finer vertical fit */
body[data-screen="play"] .topbar{ flex-wrap:wrap; gap:6px 10px; }
