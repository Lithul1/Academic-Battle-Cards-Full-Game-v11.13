/* ---------------- target picker ---------------- */
function askPick(title,options,cb){ S.picker={title,options}; pickCb=cb; busy=true; render(); }
function resolvePick(val){ const cb=pickCb; S.picker=null; pickCb=null; busy=false; if(cb) cb(val); render(); }

/* ---------------- damage ---------------- */
function calcDamage(ch,ab){
  let d=ab.dmg||0;
  if(ab.dmgType==='perTurn') d=(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay);
  else if(ab.dmgType==='perABC') d=(ab.step||10)*ch.atkCharge.length;
  return Math.max(0,Math.round(d));
}
function calcBlock(ch,ab,incoming){
  if(!ab) return {amt:0};
  if(typeof symbolsOff==='function' && symbolsOff()) return {amt:ab.block||0};
  if(ab.blockType==='negate') return {amt:incoming,negate:true};
  if(ab.blockType==='capto') return {amt:Math.max(0,incoming-(ab.cap||10))};
  if(ab.blockType==='perTurn') return {amt:(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay)};
  return {amt:ab.block||0};
}
function spend(charge,n){ const out=[]; for(let i=0;i<n&&charge.length;i++) out.push(charge.shift()); return out; }

/* ---------------- 1st Edition (Commander) passive engine ---------------- */
function feOnField(p){ return p?p.team.filter(c=>c.fe&&c.hp>0):[]; }
function pHasPassive(p,flag){ return feOnField(p).some(c=>c.passive&&c.passive[flag]); }
function pPassiveChar(p,flag){ return feOnField(p).find(c=>c.passive&&c.passive[flag])||null; }
function isSoloAlive(p){ return p.team.filter(c=>c.hp>0).length<=1; }
function doSwitch(p, newIdx, opts){
  opts=opts||{}; const oldIdx=p.activeIdx; if(newIdx==null||newIdx===oldIdx) return;
  const leaving=p.team[oldIdx]; p.activeIdx=newIdx; const entering=p.team[newIdx];
  if(leaving && leaving.status && leaving.status.rip){ delete leaving.status.rip; if(!opts.silent) pushLog(`${leaving.name} leaves the front line — its Rip mends.`); }
  if(!opts.silent && leaving&&leaving.hp>0&&leaving.fe&&leaving.passive&&leaving.passive.onSwitchInflict&&entering&&entering.hp>0){
    if(inflict(entering, leaving.passive.onSwitchInflict)) pushLog(`${leaving.name} steps aside — ${entering.name} is ${statusName(leaving.passive.onSwitchInflict)}.`);
  }
  if(entering&&entering.fe&&entering.passive){
    if(entering.passive.forcedActiveSelfRip && entering.hp>0){ entering.status.rip=true; pushLog(`${entering.name} is forced Active — Ripped (attack disabled).`); }
    if(entering.passive.forcedActiveStripBlocks){ p.team.forEach(c=>{ delete c.status.hardcover; delete c.status.laminate; delete c.status.ironcurtain; }); pushLog('The curtain falls — active defensive buffs are stripped.'); }
  }
}
function performAttack(side,abilKey){           // == beginAttack
  const A=S[side], att=active(A), ab=att[abilKey];
  if(!A.critTurn) A.critTurn={};
  if(abilKey==='atk' && A.flags.skipAttack){ A.flags.skipAttack=false; if(side==='you') toast("Hamlet's hesitation — attack skipped."); pushLog(`${who(A)} must skip the attack declaration (Anticipatory Madness).`); return false; }
  if(abilKey==='atk' && att.status.rip){ if(side==='you') toast(`${att.name}'s attack is Ripped — unusable until it leaves play.`); return false; }
  let cost=attackCostFor(side,ab);
  if(att.status.costUp) cost+=1;
  const pool=()=> hasCrit(side,'queer') ? (att.atkCharge.length+att.blkCharge.length) : att.atkCharge.length;
  if(cost!=null && pool()<cost){ toast(`Need ${cost} ATTACK ABCs (have ${pool()}).`); return false; }
  const D=foeOf(side), dKey=(D===S.you?'you':'opp'), def=active(D);
  if(!def||def.hp<=0){ toast('No target.'); return false; }
  if(ab.cleanseAlly){ const ally=A.team.find(c=>c.hp>0 && c.status[ab.cleanseAlly]); if(ally){ delete ally.status[ab.cleanseAlly]; pushLog(`${att.name} clears ${statusName(ab.cleanseAlly)} from ${ally.name}.`); } }
  let dmg=calcDamage(att,ab);
  if(hasCrit(side,'russian')){ dmg=att.hp; pushLog(`Russian Formalism: ${att.name}'s damage equals its HP (${dmg}).`); }
  let condPierce=false, condInflict=null, condFoeDiscard=0;
  if(ab.koScale){ const n=(S[side].grave||[]).length; if(n){ dmg+=ab.koScale*n; pushLog(`${att.name}: +${ab.koScale*n} damage from ${n} fallen.`); } }
  if(ab.cond){ ab.cond.forEach(r=>{ if(condMatch(r,A,D,def)){ const t=r.then||{}; if(t.dmgSet!=null)dmg=t.dmgSet; if(t.dmgAdd)dmg+=t.dmgAdd; if(t.dmgMult)dmg=Math.round(dmg*t.dmgMult); if(t.pierce)condPierce=true; if(t.inflict)condInflict=t.inflict; if(t.foeDiscard)condFoeDiscard+=t.foeDiscard; if(r.log)pushLog(r.log); } }); }
  // 1E passive & ability damage
  if(att.fe&&att.passive&&att.passive.soloBonus&&isSoloAlive(A)){ dmg+=att.passive.soloBonus; pushLog(`${att.name} stands alone — +${att.passive.soloBonus} damage.`); }
  if(att.fe&&att.passive&&att.passive.statusDmgBonus&&STATUS_NEG.some(x=>def.status[x])){ dmg+=att.passive.statusDmgBonus; pushLog(`${att.name}: +${att.passive.statusDmgBonus} against an afflicted target.`); }
  if(ab.bmDiscardBonus){ const n=(A.discard||[]).filter(c=>c.cat==='bookmark').length; const add=Math.min(ab.bmDiscardCap||9999, ab.bmDiscardBonus*n); if(add>0){ dmg+=add; pushLog(`${ab.n}: +${add} from ${n} Bookmark(s) in the discard.`); } }
  if(ab.guessTopFoe){ const top=D.deck[0]; const types=['ATTACK','BLOCK','BOOKMARK']; const guess=types[rnd(3)]; const actual=top?(top.cat==='abc'?top.type:'BOOKMARK'):null; if(actual&&guess===actual){ dmg+=ab.guessTopFoe.bonus||0; if(ab.guessTopFoe.inflict)condInflict=ab.guessTopFoe.inflict; pushLog(`The Mousetrap calls ${guess} — correct! +${ab.guessTopFoe.bonus} and Tear.`); } else pushLog(`The Mousetrap calls ${guess} — wrong.`); }
  if(ab.condPierceVillain && (def.tags||[]).includes('villain')){ condPierce=true; pushLog(`${ab.n} sees through the monstrous nature — Pierce.`); }
  if(ab.dmgPerFoeBookmark){ const n=(D.hand||[]).filter(c=>c.cat==='bookmark').length; if(n){ dmg+=ab.dmgPerFoeBookmark*n; pushLog(`${ab.n}: +${ab.dmgPerFoeBookmark*n} from ${n} Bookmark(s) in hand.`); } }
  let spentAtk=spend(att.atkCharge,cost);
  if(spentAtk.length<cost && hasCrit(side,'queer')){ const more=spend(att.blkCharge,cost-spentAtk.length); if(more.length) A.critTurn.queerMismatch=true; spentAtk.push(...more); }
  if(ab.selfDiscardBlk){ for(let i=0;i<ab.selfDiscardBlk;i++){ if(att.blkCharge.length) A.discard.push(att.blkCharge.shift()); } pushLog(`${att.name} discards ${ab.selfDiscardBlk} Block ABC.`); }
  if(ab.selfDiscardAtk){ for(let i=0;i<ab.selfDiscardAtk;i++){ if(att.atkCharge.length) A.discard.push(att.atkCharge.shift()); } pushLog(`${att.name} discards ${ab.selfDiscardAtk} Attack ABC.`); }
  if(S.settings.powerAdds) dmg+=spentAtk.reduce((s,c)=>s+(c.power||0),0);
  if(S.scrim && side==='you' && scrimHas('gutenberg')){ dmg+=5; pushLog('The Gutenberg Press — +5 base damage.'); }
  if(hasCrit(side,'marxist') && (ab.cost===1||ab.cost===2) && def.atk && (def.atk.cost===3||def.atk.cost===4)){ dmg+=10; pushLog('Marxist Lens: +10 class-struggle damage.'); }
  if(A.flags.supercharge){ dmg*=2; A.flags.supercharge=false; pushLog('Supercharger: damage doubled!'); }
  if(att.status.highlight){ dmg+=20; delete att.status.highlight; pushLog(`${att.name} is Highlighted — +20 damage.`); }
  if(def.status.tear){ dmg+=10; pushLog(`${def.name} is Torn — +10 incoming damage.`); }
  if(att.status.weaken){ dmg=Math.max(0,dmg-att.status.weaken); pushLog(`${att.name} was weakened — -${att.status.weaken} damage.`); delete att.status.weaken; }
  if(def.status.exposed){ dmg=Math.round(dmg*2); pushLog(`${def.name} is Exposed — damage doubled!`); delete def.status.exposed; }
  if(att.status.costUp){ delete att.status.costUp; }
  if(A.flags.dogear){ att.atkCharge.unshift(...spentAtk.filter(c=>!c._wild)); A.flags.dogear=false; pushLog(`Dog-Eared Strategy: ${att.name}'s Attack ABC stay attached.`); }
  else A.discard.push(...spentAtk.filter(c=>!c._wild));
  if(side==='you') A.flags.attacked=true;
  let pierce=(ab.flags||[]).includes('pierce') || condPierce;
  if(hasCrit(side,'psycho') && def.blkCharge.length===0){ pierce=true; }
  if(symbolsOff()) pierce=false;
  if(S.scrim && S.scrim.ruleShift==='pintendo' && side==='opp'){ const bb=def.blk; const full=bb && bb.cost!=null && def.blkCharge.length>=bb.cost; if(!full){ pierce=true; } }
  atkCtx={side,A,att,ab,D,dKey,def,dmg,pierce,condInflict,condFoeDiscard};
  if(def.status.ecoNegate){ def.status.ecoNegate=false; pushLog(`${def.name} negates the attack (Ecocriticism)!`); return finishAttack(dmg,true); }
  if(def.status.ironcurtain && !pierce && !ab.ignoreDefBuffs){ def.status.ironcurtain=false; pushLog(`${def.name}'s Iron Curtain absorbs the blow!`); return finishAttack(dmg,true); }
  const bb=def.blk, canBlock=(!pierce||deconOn()) && !def.status.glue && bb && bb.cost!=null && def.blkCharge.length>=bb.cost;
  if(def.status.glue && bb && def.blkCharge.length>=bb.cost) pushLog(`${def.name} is Glued — cannot block.`);
  if(canBlock){
    if(dKey==='you' && !S.settings.autoBlock){ S.defend=true; busy=true; render(); return; }   // player chooses
    const willBlock=(dKey==='opp')?(dmg>=8):true;
    if(willBlock) return doBlock();
  }
  finishAttack(0,false);
}
function doBlock(){
  const {A,att,def,D,dmg,dKey}=atkCtx, b=def.blk;
  let spentBlk=spend(def.blkCharge,b.cost);
  if(spentBlk.length<b.cost && hasCrit(dKey,'queer')){ spentBlk.push(...spend(def.atkCharge,b.cost-spentBlk.length)); }
  const res=calcBlock(def,b,dmg); let amt=res.amt; let neg=!!res.negate; let failDouble=false;
  if(b.blkCleanse){ [].concat(b.blkCleanse).forEach(function(_st){ if(def.status[_st]){ delete def.status[_st]; pushLog(`${def.name} shrugs off ${statusName(_st)} while blocking.`); } }); }
    if(b.cleanseAlly){ const _al=D.team.find(c=>c.hp>0 && c!==def && c.status[b.cleanseAlly]); if(_al){ delete _al.status[b.cleanseAlly]; pushLog(`${def.name} clears ${statusName(b.cleanseAlly)} from ${_al.name}.`); } }
    if(b.cleanseAllyAny){ const NEG=['tear','rip','glue','spill','smudge','burn','weaken']; const _al=D.team.find(c=>c.hp>0 && NEG.some(s=>c.status[s])); if(_al){ const s=NEG.find(x=>_al.status[x]); delete _al.status[s]; pushLog(`${def.name} clears ${statusName(s)} from ${_al.name}.`); } }
    if(b.teamShield){ D._teamShield=Math.max(D._teamShield||0, b.teamShield); pushLog(`${who(D)}'s allies brace together — incoming damage reduced by ${b.teamShield} until their next turn.`); }
    if(b.recoverBookmark){ for(let _i=D.discard.length-1;_i>=0;_i--){ const _c=D.discard[_i]; if(_c && _c.effect && _c.kind){ D.discard.splice(_i,1); D.hand.push(_c); pushLog(`${def.name} recovers ${_c.name} from the discard pile.`); break; } } }
    if(b.immuneNext){ def.wardNext=[].concat(b.immuneNext); pushLog(`${def.name} is shielded against the next ${b.immuneNext.map(statusName).join(" or ")}.`); }
  if(b.cond){ b.cond.forEach(r=>{ if(condMatch(r,D,A,att)){ const t=r.then||{};
      if(t.negate){ neg=true; amt=dmg; }
      if(t.blockSet!=null) amt=t.blockSet;
      if(t.blockAdd) amt+=t.blockAdd;
      if(t.blockMult) amt=Math.round(amt*t.blockMult);
      if(t.blockHalf) amt=Math.ceil(dmg/2);
      if(t.blockFailDouble) failDouble=true;
      if(r.log) pushLog(r.log);
  } }); }
  if(S.settings.powerAdds && !neg) amt+=spentBlk.reduce((s,c)=>s+(c.power||0),0);
  if(hasCrit(dKey,'newhist') && !neg){ amt+=10; pushLog('New Historicism: block reduces an extra 10.'); }
  D.discard.push(...spentBlk.filter(c=>!c._wild));
  if(!symbolsOff()){
    if(b.grant){ grant(def,b.grant); pushLog(`${def.name} gains ${b.grant}.`); }
    if(b.inflictAtt && att.hp>0){ if(inflict(att,b.inflictAtt)) pushLog(`${att.name} is afflicted with ${b.inflictAtt.charAt(0).toUpperCase()+b.inflictAtt.slice(1)}.`); }
    if(b.selfStatus){ def.status[b.selfStatus]=true; pushLog(`${def.name} suffers ${b.selfStatus}.`); }
    if(b.selfDamage){ def.hp=Math.max(0,def.hp-b.selfDamage); pushLog(`${def.name} loses ${b.selfDamage} HP.`); }
    if(b.onBlockDraw){ for(let i=0;i<b.onBlockDraw;i++){ if(!D.deck.length&&D.discard.length)D.deck=shuffle(D.discard.splice(0)); if(D.deck.length)D.hand.push(D.deck.shift()); } pushLog(`${def.name} draws ${b.onBlockDraw} after blocking.`); }
    if(b.selfDiscardHand){ for(let i=0;i<b.selfDiscardHand;i++){ if(D.hand.length) D.discard.push(D.hand.splice(rnd(D.hand.length),1)[0]); } pushLog(`${def.name} discards ${b.selfDiscardHand} card from hand.`); }
    if(att.fe&&att.passive&&att.passive.blockerTear&&def.hp>0){ if(inflict(def,'tear')) pushLog(`Off With Their Heads! — ${def.name} is Torn for daring to block.`); }
    if(b.postDiscardBlk){ for(let i=0;i<b.postDiscardBlk;i++){ if(def.blkCharge.length) D.discard.push(def.blkCharge.shift()); } pushLog(`${def.name} discards a Block ABC.`); }
    if(b.selfCleanse){ cleanseNeg(def); pushLog(`${def.name} shrugs off its afflictions.`); }
  }
  if(failDouble){ pushLog(`${def.name}'s guard fails — incoming damage doubled!`); return finishAttack(0,false,dmg*2); }
  if(neg && deconOn()){ pushLog('Deconstruction inverts the Negate — incoming damage doubled!'); return finishAttack(0,false,dmg*2); }
  if(neg || amt>=dmg) atkCtx._fullBlock=true;
  if(b.forceSwitchSelf==='bench'){ const alt=D.team.map((c,i)=>({c,i})).filter(o=>o.i!==D.activeIdx&&o.c.hp>0); if(alt.length){ doSwitch(D, alt[0].i); pushLog(`${def.name} slips to Backstage.`); } }
  pushLog(`${def.name} blocks with ${b.n} (${neg?'all damage negated':'-'+amt}).`);
  finishAttack(neg?dmg:amt,neg);
}
function resolveDefense(useBlock){
  if(!atkCtx) return; S.defend=false;
  if(useBlock) doBlock(); else finishAttack(0,false);
}
function finishAttack(blocked,negated,forceNet){
  const {side,A,att,ab,D,dKey,def,dmg,pierce}=atkCtx;
  let net=(forceNet!=null)?forceNet:(negated?0:Math.max(0,dmg-(pierce?0:blocked)));
  if(def.status.hardcover && !pierce && !ab.ignoreDefBuffs && net>0 && !(def.fe&&def.passive&&def.passive.noDamageReduction)){ net=Math.max(0,net-10); pushLog(`${def.name}'s Hardcover reduces 10 damage.`); }
  if(def.fe&&def.passive&&def.passive.nakedVuln&&def.blkCharge.length===0&&net>0){ net+=def.passive.nakedVuln; pushLog(`${def.name} is exposed (no Block ABC) — +${def.passive.nakedVuln} damage.`); }
  if(ab.sacrifice && hasCrit(dKey,'feminist') && !symbolsOff() && net>30){ net=30; pushLog('Feminist Lens caps the Sacrifice attack at 30.'); }
  if(D._teamShield && net>0){ const _r=Math.min(net,D._teamShield); net-=_r; pushLog(`${who(D)}'s allies stand together — ${_r} damage reduced.`); }
  def.hp=Math.max(0,def.hp-net);
  pushLog(`${att.name} uses ${ab.n}: ${net} damage to ${def.name}. (${def.hp}/${def.maxHp} HP)`);
  if(pierce) pushLog(`${ab.n} pierced the defense!`);
  if(ab.sacrifice && !symbolsOff()){ att.hp=Math.max(0,att.hp-ab.sacrifice); pushLog(`${att.name} sacrifices ${ab.sacrifice} HP.`); }
  if(ab.stripBlocks && def.blkCharge.length){ const n=def.blkCharge.length; D.discard.push(...def.blkCharge.splice(0)); pushLog(`Quick-Sand Crash buries ${def.name}'s defense — ${n} Block ABC lost.`); }
  if(!symbolsOff()){
    if(ab.inflict && def.hp>0){ [].concat(ab.inflict).forEach(function(_st){ if(inflict(def,_st,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(_st)}.`); }); }
    if(atkCtx&&atkCtx.condInflict && def.hp>0){ if(inflict(def,atkCtx.condInflict,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(atkCtx.condInflict)}.`); }
    if(ab.inflictChoice && ab.inflictChoice.length && def.hp>0){ const opts=ab.inflictChoice; const pick=opts.find(s=>!def.status[s])||opts[rnd(opts.length)]; if(inflict(def,pick,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(pick)}.`); }
    if(ab.stripPos && def.hp>0 && def.status[ab.stripPos]){ delete def.status[ab.stripPos]; pushLog(`${def.name} loses ${statusName(ab.stripPos)}.`); }
    if(atkCtx&&atkCtx.condFoeDiscard){ for(let i=0;i<atkCtx.condFoeDiscard;i++){ if(D.hand.length) D.discard.push(D.hand.splice(rnd(D.hand.length),1)[0]); } pushLog(`${who(D)} is forced to discard ${atkCtx.condFoeDiscard} card.`); }
    if(ab.grant){ grant(att,ab.grant); pushLog(`${att.name} gains ${ab.grant}.`); }
    if(ab.weaken!=null && def.hp>0){ def.status.weaken=ab.weaken; pushLog(`${def.name} is weakened — its next attack deals ${ab.weaken} less.`); }
    if(ab.selfStatus){ att.status[ab.selfStatus]=true; pushLog(`${att.name} suffers ${ab.selfStatus}.`); }
    if(ab.selfDamage){ att.hp=Math.max(0,att.hp-ab.selfDamage); pushLog(`${att.name} loses ${ab.selfDamage} HP.`); }
    if(ab.drawAfter){ drawN(side,ab.drawAfter); pushLog(`${who(A)} draws ${ab.drawAfter}.`); }
    if(ab.heal){ const _b0=att.hp; att.hp=Math.min(att.maxHp,att.hp+ab.heal); if(att.hp>_b0){ try{fxHeal(sideOfChar(att));}catch(e){} pushLog(`${att.name} heals ${att.hp-_b0} HP.`); } }
    if(ab.grantAlly){ const _al=A.team.find(c=>c.hp>0 && c!==att); if(_al){ grant(_al,ab.grantAlly); pushLog(`${att.name} grants ${statusName(ab.grantAlly)} to ${_al.name}.`); } }
    if(ab.teamCleanse){ const NEG=['tear','rip','glue','spill','smudge','burn','weaken']; A.team.forEach(c=>{ if(c.hp>0){ const s=NEG.find(x=>c.status[x]); if(s) delete c.status[s]; } }); pushLog(`${ab.n} lifts a burden from every ally.`); }
    if(ab.splashBench){ D.team.forEach(c=>{ if(c!==def && c.hp>0) c.hp=Math.max(0,c.hp-ab.splashBench); }); pushLog(`${ab.n} splashes ${ab.splashBench} to the bench.`); checkKO(D,dKey); }
    if(ab.forceFoeSwap){ const bench=D.team.map((c,i)=>({c,i})).filter(o=>o.i!==D.activeIdx && o.c.hp>0); if(bench.length){ const pk=bench[rnd(bench.length)]; doSwitch(D,pk.i); pushLog(`${ab.n} force-swaps ${who(D)}'s Active!`); } }
    if(ab.blankFoeRatings){ if(dKey==='you') S.you._ratingsBlank=true; pushLog(`${who(D)}'s Power Ratings are blanked by the flash!`); }
  }
  flash(dKey);
  if(negated || (blocked>0 && net<=0)){ fxBlock(dKey, negated?0:blocked); }
  else if(blocked>0){ fxBlock(dKey, blocked); fxDmgNum(dKey, net); }
  else if(net>0){ fxAttack(dKey, net); }
  // ---- crit thesis auto-tracking (events observable at combat resolution) ----
  A.critTurn=A.critTurn||{}; D.critTurn=D.critTurn||{}; A.critEver=A.critEver||{}; D.critEver=D.critEver||{};
  const koed = def.hp<=0;
  if(koed && ab.onKO && ab.onKO.selfStatus && att.hp>0){ att.status[ab.onKO.selfStatus]=true; pushLog(`${att.name} gains ${statusName(ab.onKO.selfStatus)}.`); }
  const noKeywords = !ab.flags && !ab.sacrifice && !ab.inflict && !ab.grant && ab.weaken==null && !pierce;
  const printedAtk = (ab.dmg!=null?ab.dmg:(ab.base!=null?ab.base:null));
  if(koed){
    if(ab.cost===1) A.critTurn.koCost1=true;                       // marxist
    if(noKeywords) A.critTurn.koPlain=true;                        // formalism
    if(printedAtk!=null && printedAtk<=20) A.critTurn.koLowAtk=true; // russian
  }
  if(negated || (blocked>0 && net<=0)) D.critEver.blockedToZero=true;             // feminist
  if(blocked>0 && !negated && dmg===blocked){ A.critEver.atkEqBlk=true; D.critEver.atkEqBlk=true; } // archetypal
  if(def.hp===10) D.critEver.survivedAt10=true;                    // ecocrit
  if(def.hp<=0 && att.fe&&att.passive&&att.passive.killWorsen){ A.flags.doubleTrivia=true; pushLog(`${att.name}'s guilt deepens — from now your attaches need two correct answers.`); }
  checkKO(D,dKey); checkKO(A,side);
  const wasOpp=(side==='opp');
  atkCtx=null; S.defend=false; busy=false; render();
  if(wasOpp && !S.over) endAiTurn();
}
function checkKO(p,side){
  const a=active(p);
  if(a && a.hp<=0){
    spawnKO(side, a.name);
    if(!p.grave.includes(a)) p.grave.push(a);
    const attacker=foeOf(side); attacker.kos++;
    pushLog(`${a.name} is knocked out!`);
    if(attacker.kos>=S.settings.koTarget){ S.over=true; S.winner=(attacker===S.you)?'you':'opp'; pushLog(`${who(attacker)} reached ${S.settings.koTarget} knockouts — match over!`); }
    const next=p.team.findIndex(c=>c.hp>0);
    if(next>=0){ doSwitch(p,next); pushLog(`${p.team[next].name} steps up.`); }
  }
  if(!p.team.some(c=>c.hp>0)){ S.over=true; if(!S.winner) S.winner=(side==='you')?'opp':'you'; pushLog(`${who(foeOf(side))} wins the match!`); }
  if(S.over) stopTurnTimer();
}

/* ---------------- AI ---------------- */
function aiTurn(){
  if(!S||S.over) return; busy=true; armAiWatch(); doDraw();
  setTimeout(()=>{
    if(!S||S.over){ busy=false; return; }
    const p=S.opp; let guard=0;
    // deploy a Critical Lens if the AI is holding one and has none active
    if(!p.crit){ const ci=p.hand.findIndex(c=>c.cat==='crit'); if(ci>=0) playCrit('opp',ci); }
    // bring a 1st Edition anchor Active when it makes sense (once/turn)
    if(!p.flags.swapped && !active(p).status.glue){ const a=active(p); const feIdx=p.team.findIndex((c,i)=>i!==p.activeIdx && c.fe && c.hp>0 && !c.status.rip && !(c.passive&&c.passive.benchCostAura)); if(feIdx>=0 && (!a.fe) && (a.hp<=a.maxHp*0.5)){ doSwitch(p,feIdx); p.flags.swapped=true; pushLog(`Opponent brings ${p.team[feIdx].name} (1st Edition) to the front.`); } }
    const step=()=>{
      if(!S||S.over){ busy=false; return; }
      const act=active(p);
      // play a supercharger if it has a ready attack
      const sc=p.hand.findIndex(c=>c.cat==='bookmark'&&c.effect==='supercharge');
      if(sc>=0 && act.atkCharge.length>=act.atk.cost && !p.flags.supercharge){ playBookmark('opp',sc); }
      const needAtk=act.atkCharge.length<=act.blkCharge.length;
      let pick=p.hand.findIndex(c=>c.cat==='abc' && (needAtk?c.type==='ATTACK':c.type==='BLOCK'));
      if(pick<0) pick=p.hand.findIndex(c=>c.cat==='abc');
      if(p.attachesLeft>0 && pick>=0 && guard<9){ guard++;
        const useFree=(p.flags.feFree||0)>0 && p.hand[pick] && p.hand[pick].cat==='abc'; if(useFree) p.flags.feFree--;
        const ok=useFree?true:(Math.random()<S.settings.aiAccuracy);
        attach('opp',pick,ok||!S.settings.triviaOn); setTimeout(step,400);
      } else {
        const heal=p.hand.findIndex(c=>c.cat==='bookmark'&&c.effect==='heal');
        if(act.hp<act.maxHp*0.4 && heal>=0) playBookmark('opp',heal);
        setTimeout(aiEngage,400);
      }
    }; step();
  },400);
}
function aiEngage(){
  if(!S||S.over){ busy=false; return; }
  S.phase='engage'; render();
  const p=S.opp, act=active(p);
  setTimeout(()=>{
    if(!S||S.over){ busy=false; return; }
    if(p.flags.truce){ p.flags.truce=false; pushLog('Opponent is under Truce — attack skipped.'); endAiTurn(); }
    else if(act.atkCharge.length>=act.atk.cost){ if(performAttack('opp','atk')===false){ pushLog('Opponent could not attack — passes.'); endAiTurn(); } }  // else finishAttack -> endAiTurn
    else { pushLog('Opponent has no charged attack — passes.'); endAiTurn(); }
  },500);
}
function armAiWatch(){ clearTimeout(aiWatch); aiWatch=setTimeout(function tick(){ if(!S||S.over||S.turn!=='opp') return; if(S.defend||S.pending){ aiWatch=setTimeout(tick,4000); return; } pushLog('Opponent stalled — safeguard ends the turn.'); busy=false; endAiTurn(); },9000); }
function endAiTurn(){ clearTimeout(aiWatch); setTimeout(()=>{ if(!S) return; busy=false; if(!S.over){ S.turn='you'; startTurn(); } },700); }

/* ---------------- trivia ---------------- */
function openTrivia(card,handIdx,targetUid){ busy=true; S.pending={card,handIdx,target:targetUid}; try{SFX.card('book_flip',0.7);}catch(e){} render(); }
function answerTrivia(choice){
  const pend=S.pending; if(!pend) return;
  const correct=choice===pend.card.ans; S.pending=null; busy=false;
  try{SFX.card(correct?'card_place':'card_shove',0.7);}catch(e){}
  toast(correct?'Correct! Card attached.':'Wrong — card discarded.', correct?'good':'bad');
  if(!correct && S.scrim && S.scrim.ruleShift==='hexbox'){ S.you.hand.push({cat:'hex',name:'Hex',_hex:true,_new:true}); pushLog('Hexbox injects a Hex — purge it with a Bookmark or take 10 at end of turn.'); }
  attach('you',pend.handIdx,correct,pend.target);
}

function render(){
  const root=$('#game'); if(!root) return;
  try{ if(APP.screen==='play'&&S){ SFX.contextTrack(S.scrim?((S.scrim.node&&S.scrim.node.boss)?'boss':'hiphop9'):null); } else { SFX.contextTrack(null); } }catch(e){}
  if(APP.screen==='play' && S){ document.body.setAttribute('data-screen','play'); sweepActiveBm(S.you); sweepActiveBm(S.opp); renderGame(root); return; }
  if(APP.screen==='scrim'){ document.body.setAttribute('data-screen','scrim'); document.body.setAttribute('data-scrimview',(SCRIM&&SCRIM.view)||''); root.innerHTML=scrimScreen(); scrimAfterRender&&scrimAfterRender(); return; }
  if(APP.screen==='builder'){ document.body.setAttribute('data-screen','builder'); root.innerHTML=builderScreen(); return; }
  document.body.setAttribute('data-screen','menu');
  document.body.setAttribute('data-menuscreen',APP.screen);

}

function critChip(p,side){
  const c=p.crit; if(!c) return '<div class="lenschip empty"><span class="lc-none">No Lens active</span></div>';

  const canFulfill = side==='you' && S.turn==='you' && !S.over && !busy && (S.phase==='strategize'||S.phase==='engage');
  const met = (side==='you' && p.crit) ? thesisMet(side).ok : false;
  const btn = (side==='you') ? `<button class="lc-thesis ${canFulfill?'':'off'} ${met?'met':'unmet'}" data-do="thesis" ${canFulfill?'':'disabled'}>${met?'Fulfil thesis ▸':'Thesis not met yet'}</button>` : '';
  const open = !!p._lensOpen;
  return `<div class="lenschip ${open?'':'bar'}" style="--lc:${c.accent||'#7a5c2c'}">
    <div class="lc-port">${img}</div>
    <div class="lc-body">
      <div class="lc-nm">◆ ${c.name}${c.declared?` · <b>${c.declared==='ATTACK'?'⚔':'⛊'}</b>`:''}${met&&side==='you'?' <span class="lc-metdot" title="Thesis met">●</span>':''}</div>
      ${open?`<div class="lc-pf"><b>Passive:</b> ${c.passive||''}</div>
      <div class="lc-th"><b>Thesis:</b> ${c.thesis||''} <i>→ ${c.reward||''}</i></div>`:''}
      ${btn}
    </div>
    <button class="lc-toggle" data-do="lens:${side}" title="${open?'Collapse':'Details'}">${open?'&#9662;':'&#9656;'}</button></div>`;
}
function charTile(p,side){

  function lofiBar(){
    const spb=60/70, barDur=spb*4, sw=0.58, t=nextT, C=CHORDS[bar%CHORDS.length];
    C.voice.forEach((f,i)=> piano(f, t+i*0.012, barDur*0.92, 0.07));
    bass(C.root, t, spb*1.3); bass(C.root, t+spb*2, spb*0.7); bass(C.fifth, t+spb*2.5, spb*0.6);
    kick(t); kick(t+spb*2.5);
    snare(t+spb*1); snare(t+spb*3);
    for(let b=0;b<4;b++){ hat(t+b*spb,0.045); hat(t+(b+sw)*spb,0.03); }
    if(bar%2===0){ const m=MEL[(Math.floor(bar/2))%MEL.length]; lead(m[0], t+spb*1, spb*1.2); if(m[1]) lead(m[1], t+spb*2.5, spb*1.3); }
    queueNext(barDur);
  }
  function cityBar(){
    const spb=60/96, barDur=spb*4, t=nextT, C=CITY[bar%CITY.length];
    C.voice.forEach((f,i)=> piano(f, t+i*0.008, barDur*0.9, 0.05));
    [0.5,1.5,2.5,3.5,3.75].forEach(off=> guitarStab(C.gtr, t+off*spb));
    bass(C.root,t,spb*0.5); bass(C.root*2,t+spb*0.75,spb*0.4); bass(C.fifth,t+spb*2,spb*0.5); bass(C.root,t+spb*2.75,spb*0.4); bass(C.root*2,t+spb*3.5,spb*0.4);
    for(let b=0;b<4;b++) kick(t+b*spb);
    snare(t+spb*1); snare(t+spb*3);
    for(let sc=0;sc<8;sc++) shaker(t+sc*(spb/2), sc%2?0.04:0.025);
    hat(t+spb*0.5,0.05); hat(t+spb*1.5,0.05); hat(t+spb*2.5,0.05); hat(t+spb*3.5,0.05);

    musGain.gain.cancelScheduledValues(ctx.currentTime); musGain.gain.setValueAtTime(Math.max(0.0001,musGain.gain.value),ctx.currentTime); musGain.gain.linearRampToValueAtTime(Math.max(0.0001,musLevel()),ctx.currentTime+2);

  function playTrack(name){

    if(!proc && !isFileTrack(name)) return;
    var toFile=isFileTrack(name), fromFile=isFileTrack(musicTrack);

    stopFile(); stopVinyl(); if(musTimer){ clearTimeout(musTimer); musTimer=null; }
    musicTrack=name; bar=0;
    if(ctx&&procGain){ try{ procGain.gain.cancelScheduledValues(ctx.currentTime); procGain.gain.setValueAtTime(toFile?0.0001:1, ctx.currentTime); }catch(e){} }
    if(musicPlaying){ if(toFile){ startFile(name); } else { if(name==='lofi') startVinyl(); nextT=ctx.currentTime+0.12; scheduleBar(); } }
  }
  function setTrack(name){ userTrack=name; playTrack(name); }
  function contextTrack(name){ playTrack(name||userTrack); }
  function setMusicVol(v){ musicVol=Math.max(0,Math.min(1,v)); if(ctx&&musicPlaying){ musGain.gain.cancelScheduledValues(ctx.currentTime); musGain.gain.setValueAtTime(Math.max(0.0001,musGain.gain.value),ctx.currentTime); musGain.gain.linearRampToValueAtTime(Math.max(0.0001,musLevel()),ctx.currentTime+0.15); } }
  function setSfxVol(v){ sfxVol=Math.max(0,Math.min(1,v)); if(sfxGain) sfxGain.gain.value=0.75*sfxVol; }
  function toggleMusic(){ musicOn=!musicOn; if(musicOn){ unlock(); startMusic(); } else stopMusic(); return musicOn; }
  function toggleSfx(){ sfxOn=!sfxOn; return sfxOn; }
  return { unlock, attack, block, heal, status, ko, toggleMusic, toggleSfx, isMusicOn:()=>musicOn, isSfxOn:()=>sfxOn,

// Uniformly scale the board so both sides + controls always fit the play area (no overlap, no scroll)
function fitBoard(){
  const board=document.querySelector('body[data-screen="play"] .board');
  const inner=board&&board.querySelector('.board-inner');
  if(!board||!inner) return;
  if(window.matchMedia && window.matchMedia('(max-width:560px)').matches) { inner.style.transform=''; inner.style.width=''; return; } // pager mode scrolls by design
  inner.style.transform=''; inner.style.width='';
  const availH=board.clientHeight, availW=board.clientWidth;
  const needH=inner.scrollHeight, needW=inner.scrollWidth;
  if(!availH||!needH) return;
  const k=Math.min(1, availH/needH, availW/needW);
  if(k<0.999){
    inner.style.transformOrigin='top center';
    inner.style.transform=`scale(${k})`;
    inner.style.width=(100/k)+'%';           // let content keep its natural width, then shrink uniformly
    inner.style.marginLeft=((1-1/k)*50)+'%'; // recenter the widened box
  } else { inner.style.marginLeft=''; }
}
window.addEventListener('resize',()=>{ if(S&&APP.screen==='play'){ fitNames(); fitBoard(); } });

function deckForPlay(){
  if(APP.customDeck) return clone(APP.customDeck);
  if(APP.mode==='quick') return randomDeck(APP.youDeck);            // quickplay: fresh composition every battle
  if(APP.youDeck==='surprise'){ const k=DECK_ORDER[rnd(DECK_ORDER.length)]; return randomDeck(k); }  // custom-play randomizer
  return defaultDeck(APP.youDeck);
}
const DIFFICULTY = {
  passfail:     { key:'passfail',     name:'Pass / Fail',   tag:'Easy',   ai:0.80, timer:60, ur:0.0, epic:0, legend:0, accent:'#3E6E50', blurb:'80% AI · 60s turns · all-common opponent bookmarks' },
  honorroll:    { key:'honorroll',    name:'Honor Roll',    tag:'Normal', ai:0.85, timer:45, ur:0.5, epic:0, legend:0, accent:'#1F6A6A', blurb:'85% AI · 45s turns · 50% Uncommon/Rare opponent bookmarks' },
  deanslist:    { key:'deanslist',    name:"Dean's List",   tag:'Hard',   ai:0.95, timer:35, ur:0.7, epic:1, legend:0, accent:'#C08A2E', blurb:'95% AI · 35s turns · 70% U/R + 1 Epic opponent bookmark' },
  valedictorian:{ key:'valedictorian',name:'Valedictorian', tag:'Expert', ai:1.00, timer:30, ur:0.7, epic:2, legend:1, accent:'#B53A2C', blurb:'100% AI · 30s turns · 70% U/R + 2 Epic + 1 Legendary' },
};
const DIFF_ORDER = ['passfail','honorroll','deanslist','valedictorian'];
function bmRarity(b){ return b.rarity||'C'; }
function bmIdxByRarity(rs){ const o=[]; DATA.bookmarks.forEach((b,i)=>{ if(rs.includes(bmRarity(b))) o.push(i); }); return o; }
function buildOppBookmarks(diff){
  const commons=bmIdxByRarity(['C']), ur=bmIdxByRarity(['U','R']), epics=bmIdxByRarity(['E']), legends=bmIdxByRarity(['L']);
  const N=LIMITS.bm, out=[], pick=a=>a[rnd(a.length)];
  for(let k=0;k<(diff.legend||0)&&legends.length;k++) out.push(pick(legends));
  for(let k=0;k<(diff.epic||0)&&epics.length;k++) out.push(pick(epics));
  let need=Math.round(N*(diff.ur||0)), got=0;
  while(got<need && out.length<N && ur.length){ out.push(pick(ur)); got++; }
  while(out.length<N) out.push(pick(commons.length?commons:DATA.bookmarks.map((_,i)=>i)));
  return out.slice(0,N);
}
function applyDifficultyToSettings(key){
  const d=DIFFICULTY[key]||DIFFICULTY.honorroll;
  APP.difficulty=d.key; APP.settings.aiAccuracy=d.ai; APP.settings.turnTimer=d.timer;
}
function pickOpponent(youKey){
  const keys=Object.keys(DATA.characters);
  if(APP.oppDeck && APP.oppDeck!=='random' && keys.includes(APP.oppDeck)) return APP.oppDeck;
  const pool=keys.filter(x=>x!==youKey); const src=pool.length?pool:keys;
  return src[Math.floor(Math.random()*src.length)];
}
function beginBattle(stIn){

  const oppDef=(APP.mode==='quick'||APP.youDeck==='surprise')?randomDeck(st.oppSet):defaultDeck(st.oppSet);

}

function handleBuilder(cmd){

  else if(op==='edcycle'){ var order=['base','modern','all']; var cur=B.edFilter||'all';
    var nx=order[(order.indexOf(cur)+1)%3]; handleBuilder('edfilter:'+nx); return; }
  else if(op==='ch'){ const i=def.ch.indexOf(arg); if(i>=0) def.ch.splice(i,1); else if(def.ch.length<LIMITS.ch) def.ch.push(arg); B.code=''; }
  else if(op==='ab'){ const n=+arg, i=def.ab.indexOf(n); if(i>=0) def.ab.splice(i,1); else if(def.ab.length<LIMITS.ab) def.ab.push(n); B.code=''; }
  else if(op==='edbase'){ if(def.ed) delete def.ed[arg]; B.code=''; }
  else if(op==='edmod'){ def.ed=def.ed||{}; def.ed[arg]='modern'; B.code=''; }
  else if(op==='edab'){ const cid=arg.replace(/;/g,':'); def.edab=def.edab||[]; const i=def.edab.indexOf(cid); if(i>=0) def.edab.splice(i,1); else if(deckCounts(def).ab<LIMITS.ab) def.edab.push(cid); B.code=''; }
  else if(op==='edbm+'){ const cid=arg.replace(/;/g,':'); def.edbm=def.edbm||{}; if(deckCounts(def).bm<LIMITS.bm) def.edbm[cid]=(def.edbm[cid]||0)+1; B.code=''; }
  else if(op==='edbm-'){ const cid=arg.replace(/;/g,':'); def.edbm=def.edbm||{}; if(def.edbm[cid]){ def.edbm[cid]--; if(!def.edbm[cid]) delete def.edbm[cid]; } B.code=''; }
  else if(op==='edfilter'){ APP.builder.edFilter=arg;
    def.ed=def.ed||{};
    if(arg==='modern'){ (DATA.characters[def.d]||[]).forEach(function(ch){ if(edCharFor(def.d,ch.id)) def.ed[ch.id]='modern'; }); }
    else if(arg==='base'){ def.ed={}; }
    B.code=''; }
  else if(op==='cr'){ const n=+arg, i=def.cr.indexOf(n); if(i>=0) def.cr.splice(i,1); else if(def.cr.length<LIMITS.cr && ownCrit(n)) def.cr.push(n); B.code=''; }
  else if(op==='fe'){ if(!def.fe)def.fe=[]; const i=def.fe.indexOf(arg); if(i>=0) def.fe.splice(i,1); else if(def.fe.length<LIMITS.fe) def.fe.push(arg); B.code=''; }
  else if(op==='bm+'){ const n=+arg; const have=def.bm.filter(x=>x===n).length; if(def.bm.length<LIMITS.bm && have<bmOwned(n)) def.bm.push(n); B.code=''; }
  else if(op==='bm-'){ const i=def.bm.indexOf(+arg); if(i>=0) def.bm.splice(i,1); B.code=''; }
  else if(op==='reset'){ B.def=defaultDeck(def.d); B.code=''; }
  else if(op==='fill'){ fillGaps(def); clampDeck(def); B.code=''; toast('Filled gaps with random cards.'); }
  else if(op==='gencode'){ clampDeck(def); B.code=encodeDeck(def); }
  else if(op==='use'){ clampDeck(def); APP.customDeck=clone(def); APP.youDeck=def.d; APP.codeMsg={text:'Custom deck ready — choose Custom Play to take it into a match.',ok:true}; APP.screen='menu'; }
  else if(op==='copycode'){ const el=document.getElementById('bd-codeout'); if(el){ el.select&&el.select(); try{ navigator.clipboard&&navigator.clipboard.writeText(el.value); }catch(e){} } toast('Code copied'); return; }
  else if(op==='prevch'){
    const em=(def.ed&&def.ed[arg]==='modern')?edCharFor(def.d,arg):null;
    if(em){ showPreview(buildCharPreview(em.c, def.d).replace('pv-card pvchar','pv-card pvchar ed-pv')); }
    else { showPreview(buildCharPreview(DATA.characters[def.d].find(x=>x.id===arg), def.d)); }
    return; }
  else if(op==='edprevab'){ const cid=arg.replace(/;/g,':'); if(edHas(cid)){ const a=edAbcByCid(def.d,cid); if(a) showPreview(buildAbcPreview(a).replace('pv-card pvabc','pv-card pvabc ed-pv')); } return; }
  else if(op==='edprevbm'){ const cid=arg.replace(/;/g,':'); if(edHas(cid)){ const b=edBmByCid(def.d,cid); if(b) showPreview(buildBmPreview(b).replace('pv-card','pv-card ed-pv')); } return; }
  else if(op==='prevab'){ showPreview(buildAbcPreview(DATA.abcs[def.d][+arg])); return; }
  else if(op==='prevcr'){ showPreview(buildCritPreview(DATA.crits[+arg])); return; }
  else if(op==='prevfe'){ const f=firstedById(arg); if(!f) return; const isEd=!!f.cid;
    showPreview(isEd?buildFePreview(f).replace('pv-card','pv-card ed-pv'):buildFePreview(f)); return; }
  else if(op==='prevbm'){ showPreview(buildBmPreview(DATA.bookmarks[+arg])); return; }
  render();
}

    else if(d==='thesis'){ if(S.you.crit){ const m=thesisMet('you'); if(m.ok){ fulfillThesis('you'); } else { toast(m.why); pushLog('◆ '+S.you.crit.name+' — '+m.why); render(); } } }

/* Roll a 5-card pack: slots 1-3 IP bundles, slot 4 Standing Order (gold guaranteed; silver ~70%),
   slot 5 feature (gold guaranteed Commander; silver 60% + pity every 3rd). Empty pools fall back to IP. */
function scrimRollPack(type){
  const picked=[];
  const cmdPool=()=>(DATA.firsteds||[]).map(f=>f.id).filter(id=>(META.commanders||[]).indexOf(id)<0 && picked.indexOf(id)<0);
  const perkPool=()=>Object.keys(SCRIM_PERKS).filter(id=>(META.perks||[]).indexOf(id)<0 && picked.indexOf(id)<0);
  const rollIP=(amt)=>({t:'ip', amt:(amt||PACK_IP_COMMON[rnd(PACK_IP_COMMON.length)])});
  const rollSO=()=>{ const pool=perkPool(); if(!pool.length) return rollIP(20); const id=pool[rnd(pool.length)]; picked.push(id); const p=SCRIM_PERKS[id]; return {t:'so',id,name:p.name,ic:p.ic,text:p.text}; };
  const rollCmd=()=>{ const pool=cmdPool(); if(!pool.length) return (perkPool().length?rollSO():rollIP(30)); const id=pool[rnd(pool.length)]; picked.push(id); const f=firstedById(id); return {t:'cmd',id,name:f?f.name:id,fd:f}; };
  const cards=[];
  for(let i=0;i<3;i++) cards.push(rollIP());
  cards.push( (type==='gold'||Math.random()<0.7) ? rollSO() : rollIP(20) );
  const pity=((META.packs||0)%3===0);
  if(type==='gold') cards.push(rollCmd());
  else if(pity || Math.random()<0.6) cards.push(rollCmd());
  else cards.push(perkPool().length?rollSO():rollIP(25));
  return cards;
}
function scrimApplyPack(cards){
  cards.forEach(c=>{
    if(c.t==='ip') META.ip=(META.ip||0)+c.amt;
    else if(c.t==='so'){ if((META.perks||[]).indexOf(c.id)<0) META.perks.push(c.id); }
    else if(c.t==='cmd'){ if((META.commanders||[]).indexOf(c.id)<0) META.commanders.push(c.id); }
  });
}

window.START_BM={0:4,1:2,2:3,3:2,4:3,5:1,7:1,8:2,10:2};        /* 9 types, 20 copies */

  silver:{name:'Silver',cost:100,slots:['C','C','U','U',{R:0.45,U:0.55}],   reach:['C','U','R'], ic:'\uD83E\uDD48'},
  gold:  {name:'Gold',  cost:300,slots:['C','U','U','R','R',{R:0.5,U:0.5}], reach:['C','U','R'], ic:'\uD83C\uDFC6'}
};
function collInit(){
  META.crits=META.crits||null; META.bmCopies=META.bmCopies||null;
  if(!META.crits){ META.crits=(window.START_CR||[]).slice(); }
  if(!META.bmCopies){ META.bmCopies={}; for(var k in window.START_BM) META.bmCopies[k]=window.START_BM[k]; }
  META.editionCards=META.editionCards||[]; META.foils=META.foils||0; META.packs=META.packs||0;
}
function ownCrit(i){ return (META.crits||[]).indexOf(+i)>=0; }
function bmOwned(i){ return (META.bmCopies||{})[i]||0; }
/* ---- generic set pools: every set has C / U / R ---- */
function setPool(setId){
  if(setId==='base'){
    var perks=Object.keys(SCRIM_PERKS||{});
    return {
      C:DATA.bookmarks.map(function(b,i){return {k:'bm',id:i,name:b.name};}),
      U:DATA.crits.map(function(c,i){return {k:'cr',id:i,name:c.name};}).filter(function(o){return (window.START_CR||[]).indexOf(o.id)<0;})
         .concat(perks.map(function(p){return {k:'so',id:p,name:(SCRIM_PERKS[p]||{}).name||p};})),
      R:(DATA.firsteds||[]).map(function(f){return {k:'cmd',id:f.id,name:f.name};})
    };
  }
  var E=(window.EXPANSIONS||{})[setId];
  if(E&&E.battle) return {
    C:(E.battle.abcs||[]).map(function(a){return {k:'ed',cid:a.cid,name:a.word,sub:a.type};}),
    U:(E.battle.chars||[]).map(function(c){return {k:'ed',cid:c.cid,name:c.name};})
       .concat((E.battle.bookmarks||[]).map(function(b){return {k:'ed',cid:b.cid,name:b.name};})),
    R:(E.battle.commanders||[]).map(function(f){return {k:'ed',cid:f.cid,name:f.name};})
  };
  return {C:[],U:[],R:[]};
}
/* have we got it? */
function hasCard(o){
  if(o.k==='bm') return bmOwned(o.id)>=window.BM_MAX_COPIES;      /* "complete" only at max copies */
  if(o.k==='cr') return ownCrit(o.id);
  if(o.k==='so') return (META.perks||[]).indexOf(o.id)>=0;
  if(o.k==='cmd') return (META.commanders||[]).indexOf(o.id)>=0;
  return edHas(o.cid);
}
function grantCard(o){
  if(o.k==='bm'){ META.bmCopies[o.id]=Math.min(window.BM_MAX_COPIES,(META.bmCopies[o.id]||0)+1); return true; }
  if(o.k==='cr'){ if(!ownCrit(o.id)){ META.crits.push(+o.id); return true; } return false; }
  if(o.k==='so'){ if((META.perks||[]).indexOf(o.id)<0){ META.perks.push(o.id); return true; } return false; }
  if(o.k==='cmd'){ if((META.commanders||[]).indexOf(o.id)<0){ META.commanders.push(o.id); return true; } return false; }
  if((META.editionCards||[]).indexOf(o.cid)<0){ META.editionCards.push(o.cid); return true; }
  return false;
}
function setProgress(setId){
  var p=setPool(setId), all=p.C.concat(p.U,p.R), got=0;
  all.forEach(function(o){ if(hasCard(o)) got++; });
  return {got:got,total:all.length};
}
/* ---- roll a pack: setId + tier ---- */
function rollTierPack(setId,tier){
  var T=window.PACK_TIERS[tier], pool=setPool(setId), taken=[], out=[];
  function avail(r){ return (pool[r]||[]).filter(function(o){
      var key=o.cid||(o.k+':'+o.id);
      /* bookmarks: pullable while below max copies; prefer NEW types first */
      if(o.k==='bm') return taken.indexOf(key)<0 && bmOwned(o.id)<window.BM_MAX_COPIES;
      return taken.indexOf(key)<0 && !hasCard(o);
    }); }
  function pull(r){
    if(T.reach.indexOf(r)<0) return null;
    var a=avail(r); if(!a.length) return null;
    if(r==='C'){ var fresh=a.filter(function(o){ return o.k!=='bm'||bmOwned(o.id)===0; }); if(fresh.length) a=fresh; }
    var x=a[rnd(a.length)]; taken.push(x.cid||(x.k+':'+x.id)); return x;
  }
  function slot(s){
    var r=(typeof s==='string')?s:(function(){var q=Math.random(),acc=0; for(var k in s){acc+=s[k]; if(q<acc) return k;} return 'U';})();
    var order=['C','U','R'], x=null, n=0;
    while(!x && n<3){ x=pull(r); if(!x){ r=order[(order.indexOf(r)+1)%3]; n++; } }
    if(!x) return {t:'foil'};
    return {t:'card',o:x,r:r};
  }
  T.slots.forEach(function(s){ out.push(slot(s)); });
  META.packs=(META.packs||0)+1;
  if(META.packs%20===0 && Math.random()<0.5) out.push({t:'ip',amt:100});   /* kindness bundle */
  return out;
}
function applyTierPack(cards){
  cards.forEach(function(c){
    if(c.t==='card') grantCard(c.o);
    else if(c.t==='ip') META.ip=(META.ip||0)+c.amt;
    else if(c.t==='foil') META.foils=(META.foils||0)+1;
  });
}

    if(kind==='abc'){ var aa=(b.abcs||[]).find(function(x){return x.cid===o.cid;})||{};
      return {t:'edcard',kind:'abc',cid:o.cid,word:aa.word,atype:aa.type,power:aa.power}; }
    if(kind==='bm'){ var bb=(b.bookmarks||[]).find(function(x){return x.cid===o.cid;})||{};

    var ff=(b.commanders||[]).find(function(x){return x.cid===o.cid;})||{};
    return {t:'edcard',kind:'cmd',cid:o.cid,name:ff.name};
  }));

function scrimRollMhPack(){
  var E=window.EXPANSIONS.modern_hamlet, owned=META.editionCards||[], taken=[];
  function av(a){return a.filter(function(x){return owned.indexOf(x.cid)<0&&taken.indexOf(x.cid)<0;});}
  function pull(a){var p=av(a); if(!p.length)return null; var x=p[rnd(p.length)]; taken.push(x.cid); return x;}
  var common=E.abcs, uncommon=E.roster.concat(E.bookmarks), rare=E.commanders;
  function entry(x){ if(!x) return {t:'ip',amt:15};
    if(x.kind==='abc') return {t:'edcard',kind:'abc',cid:x.cid,word:x.word,atype:x.type,power:x.power};
    if(x.kind==='char') return {t:'edcard',kind:'char',cid:x.cid,id:x.id,name:x.name,move:x.atk.n,label:x.atk.label};
    if(x.kind==='bookmark') return {t:'edcard',kind:'bookmark',cid:x.cid,name:x.name,text:x.text};
    return {t:'edcard',kind:'cmd',cid:x.cid,name:x.name}; }
  var cards=[],i;
  for(i=0;i<3;i++) cards.push(entry(pull(common)||pull(uncommon)||pull(rare)));
  cards.push(entry(pull(uncommon)||pull(common)||pull(rare)));
  var pity=((META.mhPacks||0)%3===2);
  var chase=(pity||Math.random()<0.4)?(pull(rare)||pull(uncommon)||pull(common)):(pull(uncommon)||pull(rare)||pull(common));
  cards.push(entry(chase));
  return cards;
}

function packTear(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const pack=o.querySelector('.pkr-pack'); if(!pack||pack.classList.contains('torn')) return;
  pack.classList.add('torn');
  setTimeout(()=>{ const fan=o.querySelector('.pkr-fan'); if(fan) fan.classList.add('spread'); pack.classList.add('gone');
    const h=o.querySelector('.pkr-hint'); if(h) h.textContent='Tap each card to flip \u00b7 chase card is last';
    const fa=o.querySelector('.pkr-flipall'); if(fa) fa.classList.add('show'); }, 420);
}
function packFlip(i){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const fan=o.querySelector('.pkr-fan'); if(!fan||!fan.classList.contains('spread')) return;
  const rc=o.querySelector('.pkr-card[data-scrim="packflip:'+i+'"]'); if(!rc||rc.classList.contains('flipped')) return;
  rc.classList.add('flipped'); try{SFX.card('pack_take',0.7);}catch(e){}
  packCheckDone();
}
function packFlipAll(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const cards=[...o.querySelectorAll('.pkr-card')];
  cards.forEach((rc,k)=>setTimeout(()=>{ if(!rc.classList.contains('flipped')){ rc.classList.add('flipped'); if(k===0){ try{SFX.card('pack_take',0.7);}catch(e){} } } if(k===cards.length-1) packCheckDone(); }, k*170));
}
function packCheckDone(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const all=[...o.querySelectorAll('.pkr-card')].every(rc=>rc.classList.contains('flipped'));
  if(all){ const h=o.querySelector('.pkr-hint'); if(h) h.style.display='none';
    const fa=o.querySelector('.pkr-flipall'); if(fa) fa.classList.remove('show');
    const d=o.querySelector('.pkr-done'); if(d) d.classList.add('show'); }
}
function packClose(){
  const o=document.getElementById('packOverlay'); if(o){ o.classList.remove('show'); setTimeout(()=>{ if(o&&o.parentNode) o.parentNode.removeChild(o); }, 250); }

function scrimRollBosses(){

    let choice = pool.length ? pool[rnd(pool.length)] : (SCRIM_BOSS_RANK.filter(id=>picked.indexOf(id)<0)[0]);

function scrimStartKit(kitId){
  const kit=SCRIM_KITS[kitId]; if(!kit) return;
  SCRIM.active=true; SCRIM.kit=kitId; SCRIM.artifacts=[]; SCRIM.cleared=0; SCRIM.act=1; SCRIM.bosses=scrimRollBosses(); SCRIM.lf=0; SCRIM.t0=Date.now(); SCRIM.honors=Math.min(META.honorsMax||0, SCRIM._honorsSel||0);
  META.stats=META.stats||{runs:0,wins:0,bossKills:0,bestAct:0,fastestMs:0};
  META.stats.runs=(META.stats.runs||0)+1; metaSave();
  const dk=kit.deck;
  SCRIM.team = kit.chars.map(id=>{ const def=DATA.characters[dk].find(c=>c.id===id); const mx=def?def.hp:80; return { deck:dk, id:id, curHp:mx, maxHp:mx, fe:false }; });
  // Balanced starter: guarantee both ATTACK and BLOCK are drawable. Some decks are ordered
  // lopsided (Macbeth's leading cards are block-heavy; Othello/Wonderland's are all attack),
  // so a naive "first 8" slice could leave a kit unable to attack or block. Pull 4 of each.
  const _src=DATA.abcs[dk]||[]; const _atk=[], _blk=[];
  _src.forEach((c,i)=>{ (c.type==='ATTACK'?_atk:_blk).push(i); });
  const ab=[]; for(let i=0;i<4;i++){ if(_atk[i]!=null) ab.push({d:dk,i:_atk[i]}); if(_blk[i]!=null) ab.push({d:dk,i:_blk[i]}); }
  for(let i=0; ab.length<8 && i<_src.length; i++){ if(!ab.some(x=>x.i===i)) ab.push({d:dk,i:i}); }
  const bm=[0,1,2,3,4].filter(i=>i<DATA.bookmarks.length);
  SCRIM.deck = { ab:ab, bm:bm, cr:[] };
  // Standing Orders (equipped perks) apply at run start:
  if(perkOn('hardy')) SCRIM.team.forEach(rec=>{ rec.maxHp+=10; rec.curHp+=10; });
  if(perkOn('chair')){ scrimGrantArtifact(); scrimGrantArtifact(); }
  else if(perkOn('endowment')){ scrimGrantArtifact(); }
  SCRIM.map = scrimGenMap(1);
  SCRIM.view='map'; render(); scrimSave();
}

/* ---- map generation (branching DAG, StS-style) ---- */
function scrimGenMap(act){
  act=act||SCRIM.act||1;
  const N=(act>=3?8:(act>=2?7:6)), cols=[];
  cols.push([{type:'start',done:true}]);
  for(let c=1;c<N-1;c++){ const rows=2+rnd(2); const arr=[]; for(let r=0;r<rows;r++) arr.push({type:scrimNodeType(c,N)}); cols.push(arr); }
  const bossId=(SCRIM.bosses&&SCRIM.bosses[act-1]) || (Math.random()<0.5?'sandroid':'dyefone');
  cols.push([{type:'boss',boss:bossId}]);
  for(let c=0;c<cols.length-1;c++){
    const nx=cols[c+1];
    cols[c].forEach(node=>{ node.next=[]; const k=1+rnd(Math.min(2,nx.length)); const idxs=shuffle(nx.map((_,i)=>i)).slice(0,k); node.next=idxs.sort((a,b)=>a-b); });
    const covered={}; cols[c].forEach(n=>n.next.forEach(i=>covered[i]=1));
    nx.forEach((_,i)=>{ if(!covered[i]){ const src=cols[c][rnd(cols[c].length)]; if(src.next.indexOf(i)<0){ src.next.push(i); src.next.sort((a,b)=>a-b); } } });
  }
  return { cols, pos:{c:0,r:0} };
}
function scrimNodeType(c,N){
  if(c===N-2) return Math.random()<0.6?'rest':'scrim';
  const roll=Math.random();
  if(c<=1) return roll<0.8?'scrim':'archives';
  if(roll<0.55) return 'scrim';
  if(roll<0.70) return 'archives';
  if(roll<0.80) return 'rest';
  if(roll<0.88) return 'fair';
  return 'elite';
}
function scrimReachable(c,r){ const m=SCRIM.map; if(!m) return false; const cur=m.cols[m.pos.c][m.pos.r]; return c===m.pos.c+1 && cur.next && cur.next.indexOf(r)>=0 && !m.cols[c][r].done; }
function scrimAdvanceTo(c,r){ if(!SCRIM.map || !SCRIM.map.cols[c] || !SCRIM.map.cols[c][r]) return; SCRIM.map.pos={c,r}; SCRIM.map.cols[c][r].done=true; SCRIM.cleared++; }

/* ---- deck / character builders for a run battle ---- */
function scrimPlayerShell(name,setKey,team,deck){ const ai=team.findIndex(c=>c.hp>0); return { name,setKey,team,activeIdx:ai>=0?ai:0,deck,hand:[],discard:[],grave:[],kos:0,attachesLeft:0,crit:null,critTurn:{},critEver:{},flags:{},activeBm:[],_lastDrawn:null }; }
function buildRunDeck(rd){ const deck=[];
  (rd.ab||[]).forEach((r,n)=>{ const a=DATA.abcs[r.d]&&DATA.abcs[r.d][r.i]; if(a) deck.push({cat:'abc',...clone(a),cid:'a'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.bm||[]).forEach((i,n)=>{ const b=DATA.bookmarks[i]; if(b) deck.push({cat:'bookmark',...clone(b),cid:'b'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.cr||[]).forEach((i,n)=>{ const c=DATA.crits[i]; if(c) deck.push({cat:'crit',...clone(c),cid:'c'+n+Math.random().toString(36).slice(2,5)}); });
  return deck; }
function buildScrimChar(rec){ let def; if(rec.fe) def=firstedById(rec.id); else def=(DATA.characters[rec.deck]||[]).find(c=>c.id===rec.id); if(!def) return null; const c=makeChar(def,1.0); if(rec.maxHp) c.maxHp=rec.maxHp; c.hp=Math.max(0,Math.min(rec.curHp!=null?rec.curHp:c.maxHp,c.maxHp)); c._scrimIdx=rec._i; return c; }
function scrimYouPlayer(){ const team=[]; SCRIM.team.forEach((rec,i)=>{ rec._i=i; const c=buildScrimChar(rec); if(c) team.push(c); }); const deck=shuffle(buildRunDeck(SCRIM.deck)); return scrimPlayerShell('You',SCRIM.kit,team,deck); }
function scrimNoHeal(bmIdxs){ return bmIdxs.filter(i=>!(DATA.bookmarks[i] && DATA.bookmarks[i].effect==='heal')); }
function scrimBossDeck(b){ const dk=b.deck||scrimRandomDeck(); const def=defaultDeck(dk); return { ab:def.ab.map(i=>({d:dk,i})).slice(0,16), bm:scrimNoHeal(def.bm).slice(0,8), cr:[] }; }
function scrimOppPlayer(node){
  if(node.boss){ const b=SCRIM_BOSSES[node.boss]; const mul=scrimActMul();
    const bAtk=clone(b.atk); if(bAtk.dmg!=null) bAtk.dmg=Math.round(bAtk.dmg*mul);
    const bimg=((typeof window!=='undefined'&&window.ABC_BOSS_IMG)||{})[node.boss]||'';
    const bc=makeChar({id:'boss_'+node.boss,name:b.name,hp:Math.round(b.hp*mul),accent:b.accent,img:bimg,tags:['villain'],atk:bAtk,blk:clone(b.blk)},1.0); bc._boss=true; bc.sub=b.sub;
    bc.imgpos=((typeof window!=='undefined'&&window.ABC_BOSS_IMGPOS)||{})[node.boss]||'50% 40%';
    return scrimPlayerShell(b.name,'boss',[bc],shuffle(buildRunDeck(scrimBossDeck(b)))); }
  const dk=node.oppDeck||scrimRandomDeck();
  const ids=shuffle(DATA.characters[dk].map(c=>c.id)).slice(0, node.type==='elite'?3:2);
  const depth=SCRIM.pending?SCRIM.pending.c:1;
  const scale=(node.type==='elite'?0.95:Math.min(0.9,0.55+0.06*depth))*scrimActMul();
  const team=ids.map(id=>{ const c=makeChar(DATA.characters[dk].find(x=>x.id===id),1.0); c.maxHp=Math.max(20,Math.round(c.maxHp*scale/10)*10); c.hp=c.maxHp; return c; });
  const def=defaultDeck(dk);
  const rd={ ab:def.ab.map(i=>({d:dk,i})).slice(0,14), bm:scrimNoHeal(def.bm).slice(0,10), cr:node.type==='elite'?def.cr.slice(0,2):[] };
  return scrimPlayerShell('Opponent',dk,team,shuffle(buildRunDeck(rd)));
}

/* ---- launch a battle node ---- */
function scrimStartBattle(node){
  stopTurnTimer();
  const st=clone(APP.settings); st.koTarget=99; st.hpScale=1.0;
  st.aiAccuracy = node.boss?Math.min(0.98,SCRIM_BOSSES[node.boss].acc+honorsMods().acc):(node.type==='elite'?Math.min(0.96,scrimAccFloor()+0.06):scrimAccFloor());
  if(node.boss==='sicsoc') st.turnTimer=15;
  st.handMin = (DEFAULTS.handMin||4) + (scrimHas('librarycard')?1:0);
  st.handSize = (DEFAULTS.handSize||5) + (scrimHas('librarycard')?1:0);

  APP.screen='play';
  pushLog(node.boss?('\u26a0 ALGORITHM CORE \u2014 '+SCRIM_BOSSES[node.boss].name+'!'):(node.type==='elite'?'\ud83c\udf93 Thesis Defense \u2014 an elite fight!':'\u2694 A Scrimmage begins.'));

function scrimGrantArtifact(){

function scrimEndRun(victory){
  const gained = Math.round((SCRIM.cleared*5 + (victory?60:0)) * honorsMods().ipMul);
  META.stats.bestAct=Math.max(META.stats.bestAct||0, victory?4:(SCRIM.act||1));
  if(victory){ const h=SCRIM.honors||0; META.honorsCleared=Math.max(META.honorsCleared||0,h); META.honorsMax=Math.min(HONORS.length-1, Math.max(META.honorsMax||0, h+1)); metaSave(); }

    if(el>30000) META.stats.fastestMs=META.stats.fastestMs?Math.min(META.stats.fastestMs,el):el; }

function scrimRollDraft(n){ const out=[]; const decks=Object.keys(DATA.characters);

    if(roll<0.6){ const d=decks[rnd(decks.length)]; out.push({t:'ab',d,i:rnd(DATA.abcs[d].length)}); }
    else if(roll<0.85){ out.push({t:'bm',i:rnd(DATA.bookmarks.length)}); }
    else { out.push({t:'cr',i:rnd(DATA.crits.length)}); } }
  return out; }

/* ---- action router ---- */
function handleScrim(cmd){
  const [op,a,b]=cmd.split(':');
  if(op==='back'){ stopTurnTimer(); APP.screen='menu'; APP.mode=null; render(); return; }
  if(op==='new'){ SCRIM.view='kit'; render(); return; }
  if(op==='honsel'){ SCRIM._honorsSel=Math.min(META.honorsMax||0, +a); render(); return; }
  if(op==='kit'){ scrimStartKit(a); return; }
  if(op==='resume'){ if(scrimLoadSave()){ APP.mode='scrim'; APP.screen='scrim'; render(); } else toast('No saved run found.'); return; }
  if(op==='shop'){ SCRIM.view='shop'; render(); return; }
  if(op==='tomap'){ SCRIM.view='map'; render(); return; }
  if(op==='endrun'){ scrimSave(); SCRIM.view='intro'; APP.screen='scrim'; render(); return; }
  if(op==='node'){ const c=+a, r=+b; if(!scrimReachable(c,r)){ toast('That node is not reachable yet.'); return; } scrimResolveNode(c,r); return; }
  if(op==='fairbuy'){ const lf=SCRIM.lf||0;
    if(a==='healall'){ if(lf<3) return; SCRIM.lf=lf-3; const _h=Math.round(25*honorsMods().healMul); SCRIM.team.forEach(t=>{ if(t.curHp>0) t.curHp=Math.min(t.maxHp,t.curHp+_h); }); toast('The team refuels +'+_h+'. (−3 Late Fees)'); }
    else if(a==='draft'){ if(lf<5) return; SCRIM.lf=lf-5; SCRIM.draft=scrimRollDraft(Math.max(2,(perkOn('officehours')?4:3)+honorsMods().draftDelta)); SCRIM.view='archives'; try{SFX.card('pack_open',0.7);}catch(e){} render(); scrimSave(); return; }
    else if(a==='revive'){ if(lf<6) return; const dead=SCRIM.team.filter(t=>t.curHp<=0); if(!dead.length) return; SCRIM.lf=lf-6; dead[0].curHp=Math.round(dead[0].maxHp*0.5); toast('Back on the roster. (−6 Late Fees)'); }
    else if(a==='ip'){ if(lf<4) return; SCRIM.lf=lf-4; META.ip=(META.ip||0)+10; metaSave(); toast('+10 Intellect Points. (−4 Late Fees)'); }
    render(); scrimSave(); return; }
  if(op==='rest'){ const cur=S===null?null:null; // rest resolves on run team
    if(a==='heal1'){ const alive=SCRIM.team.filter(t=>t.curHp>0); if(alive.length){ let t=alive.sort((x,y)=>(x.curHp/x.maxHp)-(y.curHp/y.maxHp))[0]; t.curHp=t.maxHp; } }
    else if(a==='healall'){ const _h=Math.round(20*honorsMods().healMul); SCRIM.team.forEach(t=>{ if(t.curHp>0) t.curHp=Math.min(t.maxHp,t.curHp+_h); }); }
    else if(a==='revive'){ const dead=SCRIM.team.filter(t=>t.curHp<=0); if(dead.length){ dead[0].curHp=Math.round(dead[0].maxHp*0.5); } }
    SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='draftpick'){ try{SFX.card('pack_take',0.75);}catch(e){} const k=+a; const ref=SCRIM.draft&&SCRIM.draft[k]; if(ref){ if(ref.t==='ab') SCRIM.deck.ab.push({d:ref.d,i:ref.i}); else if(ref.t==='bm') SCRIM.deck.bm.push(ref.i); else SCRIM.deck.cr.push(ref.i); } SCRIM.draft=null; SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='draftskip'){ SCRIM.draft=null; SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='bossrewardpick'){ const k=+a; const feid=SCRIM.bossReward&&SCRIM.bossReward[k]; if(feid){ const fd=firstedById(feid); if(fd){ const mx=fd.hp||90; SCRIM.team.push({fe:true,id:feid,deck:fd.deck,curHp:mx,maxHp:mx}); if((META.commanders||[]).indexOf(feid)<0){ META.commanders.push(feid); metaSave(); toast('Commander recruited & added to your Library: '+fd.name); } else toast('Commander recruited: '+fd.name); try{SFX.card('pack_take',0.75);}catch(e){} } } scrimAdvanceAct(); return; }
  if(op==='bossrewardskip'){ scrimAdvanceAct(); return; }
  if(op==='vault'){ scrimBuyUnlock(a); return; }
  if(op==='pack'){ if(a==='mhamlet') scrimOpenMhPack(); else scrimOpenPack(a||'silver'); return; }
  if(op==='shopset'){ APP.shopSet=a; render(); return; }
  if(op==='buy'){ var p=(a||'').split('|'); if(p.length===2) openTierPack(p[0],p[1]); return; }
  if(op==='packtear'){ packTear(); return; }
  if(op==='packflip'){ packFlip(+a); return; }
  if(op==='packflipall'){ packFlipAll(); return; }
  if(op==='packdone'){ packClose(); return; }
  if(op==='perkinfo'){ SCRIM._perkInfo=(SCRIM._perkInfo===a?null:a); render(); return; }
  if(op==='fecard'){ const f=firstedById(a); if(f) showPreview(buildFePreview(f)); return; }
  if(op==='bestiary'){ if(SCRIM_BOSSES[a] && (META.bossSeen||[]).indexOf(a)>=0) showPreview(bestiaryCard(a)); return; }
  if(op==='mhcard'){ if((META.editionCards||[]).indexOf('mh:char:'+a)>=0) showPreview(mhCardFull(a)); else toast('Not collected yet \u2014 open a Modern Hamlet Portfolio.'); return; }
  if(op==='mhunlock'){ var Eb=(window.EXPANSIONS.modern_hamlet.battle)||{}; var s={}; (META.editionCards||[]).forEach(function(x){s[x]=1;}); ['chars','abcs','bookmarks','commanders'].forEach(function(kk){ (Eb[kk]||[]).forEach(function(o){ s[o.cid]=1; }); }); META.editionCards=Object.keys(s); metaSave(); toast('Modern Hamlet: all '+META.editionCards.length+' cards unlocked (testing).'); render(); return; }
  if(op==='perk'){ const id=a;
    if((META.loadout||[]).indexOf(id)>=0){ META.loadout.splice(META.loadout.indexOf(id),1); }
    else { if((META.perks||[]).indexOf(id)<0) return;
           if(SCRIM_PERKS[id].tenured && !tenuredUnlocked()){ toast('Locked — graduate an Honors I run to equip tenured Standing Orders.'); return; }
           if(META.loadout.length>=perkSlots()){ toast('All Order slots are full — unequip one first.'); return; }
           META.loadout.push(id); }
    metaSave(); render(); return; }
  if(op==='rosetta'){ if(S&&S.pending&&S.scrim&&!S.scrim.rosettaUsed){ const type=S.pending.card.type; const decks=Object.keys(DATA.abcs); let pick=null,g=0; while(!pick&&g++<40){ const d=decks[rnd(decks.length)]; const x=DATA.abcs[d][rnd(DATA.abcs[d].length)]; if(x&&x.type===type) pick=x; } if(pick){ const c=S.pending.card; c.q=pick.q; c.opts=pick.opts.slice(); c.ans=pick.ans; S.scrim.rosettaUsed=true; pushLog('Rosetta Stone \u2014 the question is swapped.'); render(); } } return; }
  if(op==='afterbattle'){ scrimAfterBattle(); return; }
}
function scrimResolveNode(c,r){
  const node=SCRIM.map.cols[c][r]; SCRIM.pending={c,r};
  if(node.type==='scrim'||node.type==='elite'||node.type==='boss'){ scrimStartBattle(node); }
  else if(node.type==='archives'){ scrimAdvanceTo(c,r); SCRIM.pending=null; SCRIM.draft=scrimRollDraft(Math.max(2,(perkOn('officehours')?4:3)+honorsMods().draftDelta)); SCRIM.view='archives'; try{SFX.card('pack_open',0.7);}catch(e){} render(); scrimSave(); }
  else if(node.type==='rest'){ scrimAdvanceTo(c,r); SCRIM.pending=null; SCRIM.view='rest'; render(); scrimSave(); }
  else if(node.type==='fair'){ scrimAdvanceTo(c,r); SCRIM.pending=null; SCRIM.view='fair'; try{SFX.card('card_fan',0.6);}catch(e){} render(); scrimSave(); }
}
function scrimAfterBattle(){
  if(!S) { SCRIM.view='map'; render(); return; }
  S.you.team.forEach(c=>{ if(c._scrimIdx!=null && SCRIM.team[c._scrimIdx]) SCRIM.team[c._scrimIdx].curHp=Math.max(0,c.hp); });
  const won = !S.opp.team.some(x=>x.hp>0);
  const node=S.scrim.node;
  if(!won){
    if(honorsMods().permadeath){ scrimEndRun(false); return; }
    // Non-permadeath: regroup — team revives at 40% and returns to the map to retry.
    SCRIM.team.forEach(t=>{ t.curHp=Math.max(1,Math.round(t.maxHp*0.4)); });
    if(node&&SCRIM.map){ const cell=SCRIM.map.cols?.[node.c]?.[node.r]; if(cell) cell.done=false; }
    S=null; stopTurnTimer(); APP.screen='scrim'; SCRIM.pending=null; SCRIM.view='map';
    toast('The sector overwhelms you \u2014 your scholars regroup at 40% HP.','bad'); render(); scrimSave(); return;
  }
  const _lf = (node.boss?6:(node.type==='elite'?4:2)) + (perkOn('adjunct')?2:0);
  SCRIM.lf=(SCRIM.lf||0)+_lf; SCRIM._lfGain=_lf;
  if(SCRIM.pending){ scrimAdvanceTo(SCRIM.pending.c,SCRIM.pending.r); }
  let art=null;
  if(node.type==='elite'||node.boss) art=scrimGrantArtifact();
  SCRIM._gainedArt=art;
  if(node.boss){
    META.stats.bossKills=(META.stats.bossKills||0)+1; if((META.bossKilled||[]).indexOf(node.boss)<0) META.bossKilled.push(node.boss); if((META.bossSeen||[]).indexOf(node.boss)<0) META.bossSeen.push(node.boss); metaSave();
    S=null; stopTurnTimer(); APP.screen='scrim';
    if((SCRIM.act||1)>=3){ scrimEndRun(true); return; }
    const ipGain=Math.round(40*honorsMods().ipMul); META.ip=(META.ip||0)+ipGain; metaSave(); SCRIM._bossIP=ipGain;
    SCRIM.bossReward=scrimRollFirstEds(3); SCRIM.pending=null;
    SCRIM.view='bossreward'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave(); return;
  }
  S=null; stopTurnTimer(); APP.screen='scrim';
  SCRIM.pending=null; SCRIM.draft=scrimRollDraft(Math.max(2,(perkOn('officehours')?4:3)+honorsMods().draftDelta)); SCRIM.view='reward'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave();
}
function scrimBuyUnlock(id){
  const U={ hp:{cost:40,name:'Hardy Scholars (+10 starting Max HP)'}, kit:{cost:60,name:'Extra kit slot (cosmetic)'} };
  const u=U[id]; if(!u) return;
  if((META.ip||0)<u.cost){ toast('Not enough Intellect Points.'); return; }

}

function scrimDrawConnectors(){
  if(typeof document==='undefined') return;
  const smap=document.getElementById('smap'), svg=document.getElementById('smapLines'); if(!smap||!svg) return;
  const wrap=smap.getBoundingClientRect(); if(!wrap.width) return;
  const m=SCRIM.map; let paths='';
  const cols=smap.querySelectorAll('.smap-col');
  m.cols.forEach((col,c)=>{ if(c>=m.cols.length-1) return;
    col.forEach((node,r)=>{ (node.next||[]).forEach(ni=>{
      const a=cols[c]&&cols[c].children[r], bnode=cols[c+1]&&cols[c+1].children[ni]; if(!a||!bnode) return;
      const ra=a.getBoundingClientRect(), rb=bnode.getBoundingClientRect();
      const x1=ra.left+ra.width/2-wrap.left, y1=ra.top+ra.height/2-wrap.top, x2=rb.left+rb.width/2-wrap.left, y2=rb.top+rb.height/2-wrap.top;
      const on=(m.pos.c===c&&m.pos.r===r);
      paths+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${on?'#caa53a':'#6a5a3a'}" stroke-width="2.4" stroke-dasharray="7 5" stroke-linecap="round" />`;
    }); });
  });
  svg.setAttribute('width',wrap.width); svg.setAttribute('height',wrap.height);
  svg.style.width=wrap.width+'px'; svg.style.height=wrap.height+'px';
  svg.innerHTML=paths;
}

function scrimSpineAbbrev(name){
  let n=name.replace(' (1E)','').replace(/^(The|A)\s+/i,'');
  const w=n.split(/\s+/).filter(x=>!/^(of|the|a)$/i.test(x));
  if(w.length===1) return w[0].toUpperCase();
  return w[0][0].toUpperCase()+'. '+w[w.length-1].toUpperCase();
}
