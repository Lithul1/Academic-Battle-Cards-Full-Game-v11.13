<script>
/* ACADEMIC BATTLE CARDS — engine + UI (v2: title, deck pick, full bookmarks, defense, discard piles) */
(function(){
"use strict";
const DATA = window.DATA;
const $ = (s,r=document)=>r.querySelector(s);
const rnd = n => Math.floor(Math.random()*n);
const clone = o => JSON.parse(JSON.stringify(o));

/* ---------------- tunable settings ---------------- */
const DEFAULTS = {
  hpScale:1.0, maxAttaches:2, handSize:5, benchSize:2, aiAccuracy:0.8,
  powerAdds:true, triviaOn:true, autoBlock:false, youSet:'gatsby', oppSet:'crucible',
  koTarget:3, handMin:4, turnTimer:60,
};
let S = null;                 // game state (null until a battle starts)
let APP = { screen:'menu', mode:null, difficulty:'honorroll', youDeck:'gatsby', oppDeck:'random', settings:clone(DEFAULTS) };
let busy = false;
let aiWatch = null;           // safety net: force-ends a stalled AI turn
let atkCtx = null;            // in-flight attack context
let pickCb = null;            // callback for the target picker

/* ---------------- setup ---------------- */
function makeChar(def, scale){
  const c = clone(def);
  c.uid = def.id+'_'+Math.random().toString(36).slice(2,7);
  c.maxHp = Math.max(10, Math.round(def.hp*scale/10)*10);
  c.hp = c.maxHp; c.atkCharge=[]; c.blkCharge=[]; c.turnsInPlay=0; c.status={};
  if(c.fe && c.passive){ if(c.passive.spillLock){ c.status.spill=true; c.status._spillLock=true; } if(c.passive.smudgeLock){ c.status.smudge=true; c.status._smudgeLock=true; } }
  if(c.fe && !c.img && c.base){ const bd=DATA.characters[c.base[0]]; const bc=bd&&bd.find(x=>x.id===c.base[1]); if(bc&&bc.img){ c.img=bc.img; c.imgpos=bc.imgpos; } }
  return c;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
/* ---------- deck definitions ---------- */
const LIMITS = { ch:12, ab:24, bm:20, cr:4, fe:2, total:62 };
function feFor(k){ return (DATA.firsteds||[]).filter(f=>f.deck===k).map(f=>f.id).slice(0,LIMITS.fe); }
function firstedById(id){ return (DATA.firsteds||[]).find(f=>f.id===id)||null; }
function feImg(f){ if(!f) return null; if(f.img) return {img:f.img,pos:f.imgpos}; if(f.base){ const bd=DATA.characters[f.base[0]]; const bc=bd&&bd.find(x=>x.id===f.base[1]); if(bc&&bc.img) return {img:bc.img,pos:bc.imgpos}; } return null; }
function cardTypeLabel(c){ if(!c) return '\u2014'; if(c.cat==='abc') return c.type==='ATTACK'?'\u2694 Attack':'\u26ca Block'; if(c.cat==='bookmark') return '\u2726 Bookmark'; if(c.cat==='crit') return '\u25c6 Lens'; return '?'; }
function fePeekChips(p,sideKey){ if(sideKey!=='you'||!S) return ''; let out='';
  if(pHasPassive(p,'peekOwnDeck') && p.deck.length){ out+=`<div class="fe-peek own" title="Cold Logic \u2014 top of your deck">\ud83d\udd0d Top: <b>${cardTypeLabel(p.deck[0])}</b></div>`; }
  if(pHasPassive(p,'peekFoeDraw') && S.opp && S.opp._lastDrawn){ out+=`<div class="fe-peek foe" title="Anticipatory Madness \u2014 opponent's last draw">\ud83d\udc41 Foe drew: <b>${cardTypeLabel(S.opp._lastDrawn)}</b></div>`; }
  return out?`<div class="fe-peekwrap">${out}</div>`:''; }
function defaultBookmarks(){ const base=DATA.bookmarks.map((_,i)=>i); return base.concat([0,1,3,5,10,9]).slice(0,LIMITS.bm); }
function defaultDeck(k){
  return { d:k, ch:DATA.characters[k].map(c=>c.id), ab:DATA.abcs[k].map((_,i)=>i).slice(0,LIMITS.ab), bm:defaultBookmarks(), cr:[0,1,4,7].slice(0,LIMITS.cr), fe:feFor(k) };
}
function deckCounts(def){
  return { ch:def.ch.length, ab:def.ab.length, bm:def.bm.length, cr:def.cr.length, fe:(def.fe||[]).length,
           total:def.ch.length+def.ab.length+def.bm.length+def.cr.length+(def.fe||[]).length };
}
function clampDeck(def){
  const k=def.d;
  def.ch=(def.ch||[]).filter(id=>DATA.characters[k].some(c=>c.id===id)).slice(0,LIMITS.ch);
  def.ab=(def.ab||[]).filter(i=>i>=0&&i<DATA.abcs[k].length).slice(0,LIMITS.ab);
  def.bm=(def.bm||[]).filter(i=>i>=0&&i<DATA.bookmarks.length).slice(0,LIMITS.bm);
  def.cr=(def.cr||[]).filter(i=>i>=0&&i<DATA.crits.length).slice(0,LIMITS.cr);
  def.fe=(def.fe||[]).filter(id=>firstedById(id)).filter((id,i,a)=>a.indexOf(id)===i).slice(0,LIMITS.fe);
  return def;
}
function fillGaps(def){
  const k=def.d;
  const allCh=DATA.characters[k].map(c=>c.id);
  while(def.ch.length<LIMITS.ch){ const miss=allCh.filter(id=>!def.ch.includes(id)); if(!miss.length) break; def.ch.push(miss[rnd(miss.length)]); }
  const allAb=DATA.abcs[k].map((_,i)=>i);
  while(def.ab.length<LIMITS.ab){ const miss=allAb.filter(i=>!def.ab.includes(i)); if(!miss.length) break; def.ab.push(miss[rnd(miss.length)]); }
  const allCr=DATA.crits.map((_,i)=>i);
  while(def.cr.length<LIMITS.cr){ const miss=allCr.filter(i=>!def.cr.includes(i)); if(!miss.length) break; def.cr.push(miss[rnd(miss.length)]); }
  const allBm=DATA.bookmarks.map((_,i)=>i);
  while(def.bm.length<LIMITS.bm){ let miss=allBm.filter(i=>!def.bm.includes(i)); if(!miss.length) miss=allBm; def.bm.push(miss[rnd(miss.length)]); }
  return def;
}
function makeDeck(def){
  const deck=[];
  def.ab.forEach((i,n)=>{ const a=DATA.abcs[def.d][i]; if(a) deck.push({cat:'abc',...clone(a),cid:'a'+i+'_'+n+Math.random().toString(36).slice(2,5)}); });
  def.bm.forEach((i,n)=>{ const b=DATA.bookmarks[i]; if(b) deck.push({cat:'bookmark',...clone(b),cid:'b'+i+'_'+n+Math.random().toString(36).slice(2,5)}); });
  def.cr.forEach((i,n)=>{ const c=DATA.crits[i]; if(c) deck.push({cat:'crit',...clone(c),cid:'c'+i+'_'+n+Math.random().toString(36).slice(2,5)}); });
  return shuffle(deck);
}
function newPlayer(name,def,st){
  const ids=def.ch.length?def.ch:DATA.characters[def.d].map(c=>c.id);
  const defs=ids.map(id=>DATA.characters[def.d].find(c=>c.id===id)).filter(Boolean);
  const pool=shuffle(clone(defs));
  const team=pool.slice(0,1+st.benchSize).map(d=>makeChar(d,st.hpScale));
  (def.fe||[]).slice(0,LIMITS.fe).forEach(id=>{ const fd=firstedById(id); if(fd) team.push(makeChar(fd,st.hpScale)); });
  const deck=makeDeck(def);
  return { name,setKey:def.d,team,activeIdx:0,deck,hand:[],discard:[],grave:[],kos:0,attachesLeft:st.maxAttaches,crit:null,critTurn:{},critEver:{},flags:{},activeBm:[] };
}
function newGame(st,youDef,oppDef){
  stopTurnTimer();
  youDef=clampDeck(youDef||defaultDeck(st.youSet));
  oppDef=clampDeck(oppDef||defaultDeck(st.oppSet));
  S = { settings:clone(st), turn:'you', phase:'deal', over:false, winner:null,
        pending:null, defend:false, picker:null, viewPile:null, poison:0, _logopen:false, _settings:false, fxShuffle:false,
        you:newPlayer('You',youDef,st), opp:newPlayer('Opponent',oppDef,st), log:[] };
  APP.screen='play';
  pushLog(`New game — You (${setName(youDef.d)}) vs Opponent (${setName(oppDef.d)}).`);
  render();
  dealOpening();
}
/* ---------- shareable deck codes ---------- */
function encodeDeck(def){
  try{ const j=JSON.stringify({d:def.d,ch:def.ch,ab:def.ab,bm:def.bm,cr:def.cr,fe:def.fe||[]});
    return 'ABC-'+window.btoa(unescape(encodeURIComponent(j))).replace(/=+$/,''); }
  catch(e){ return ''; }
}
function decodeDeck(code){
  try{
    let s=(code||'').trim(); if(s.startsWith('ABC-')) s=s.slice(4);
    s=s.replace(/\s+/g,''); while(s.length%4) s+='=';
    const o=JSON.parse(decodeURIComponent(escape(window.atob(s))));
    if(!o||!o.d||!DATA.characters[o.d]) return null;
    return clampDeck({d:o.d,ch:o.ch||[],ab:o.ab||[],bm:o.bm||[],cr:o.cr||[],fe:o.fe||[]});
  }catch(e){ return null; }
}
function dealOne(side){ const p=S[side]; if(p.deck.length){ const c=p.deck.shift(); c._new=true; p.hand.push(c); p._lastDrawn=c; } }
function dealOpening(){
  busy=true; S.fxShuffle=true; try{SFX.card('card_shuffle',0.6);}catch(e){} pushLog('Shuffling decks…'); render();
  setTimeout(()=>{
    if(!S){ return; }
    S.fxShuffle=false; render();
    const n=S.settings.handSize; let i=0;
    const step=()=>{
      if(!S){ return; }
      if(i>=n){ busy=false; S.turn='you'; S.phase='draw'; pushLog('Cards dealt. Your turn — DRAW phase.'); render(); startTurnTimer(); return; }
      dealOne('you'); flickDeck('you'); render();
      setTimeout(()=>{ if(!S){ return; } dealOne('opp'); flickDeck('opp'); render(); i++; setTimeout(step,150); }, 170);
    };
    step();
  }, 800);
}
const setName = k => k==='gatsby'?'The Great Gatsby':k==='crucible'?'The Crucible':k==='hamlet'?'Hamlet':k==='frankenstein'?'Frankenstein':k==='sherlock'?'Sherlock Holmes':k==='othello'?'Othello':k==='oz'?'The Wonderful Wizard of Oz':k==='macbeth'?'Macbeth':k==='wonderland'?'Alice in Wonderland':k;
const otherDeck = k => (Object.keys(DATA.characters).find(x=>x!==k)) || k;
const me = ()=> S[S.turn];
const foeKey = ()=> S.turn==='you'?'opp':'you';
const foe = ()=> S[foeKey()];
const foeOf = side => side==='you'?S.opp:S.you;
const active = p => p.team[p.activeIdx];
const who = p => p===S.you?'You':'Opponent';
function pushLog(t){ if(!S) return; S.log.unshift(t); if(S.log.length>70) S.log.pop(); }

/* ---------------- crit-card (Critical Lens) engine ---------------- */
function critFx(side){ const c=S[side]&&S[side].crit; return c?c.fx:null; }
function hasCrit(side,fx){ return critFx(side)===fx; }
function symbolsOff(){ return critFx('you')==='formalism'||critFx('opp')==='formalism'; }
function deconOn(){ return critFx('you')==='deconstruct'||critFx('opp')==='deconstruct'; }
function affectiveOn(){ return critFx('you')==='affective'||critFx('opp')==='affective'; }
function attackCostFor(side,ab){
  let cost=ab.cost||0;
  if(hasCrit(side,'biographical') && S[side].grave.length>0) cost=Math.max(1,cost-1);
  const P=S[side]; if(P){ const act=active(P);
    if(act&&act.fe&&act.passive&&act.passive.costMod) cost+=act.passive.costMod;
    const wiz=P.team.find((c,i)=>i!==P.activeIdx&&c.fe&&c.hp>0&&c.passive&&c.passive.benchCostAura); if(wiz) cost+=wiz.passive.benchCostAura;
    cost=Math.max(1,cost);
  }
  return cost;
}
function playCrit(side,idx){
  const P=S[side], card=P.hand[idx]; if(!card||card.cat!=='crit') return;
  if(side==='you' && (S.turn!=='you'||S.phase!=='strategize'||busy)) return;
  const place=()=>{
    if(P.crit){ pushLog(`${who(P)} archives ${P.crit.name} (no reward).`); P.grave.push({name:P.crit.name,_critArchive:true}); P.discard.push(P.crit); }
    const i=P.hand.indexOf(card); if(i>=0) P.hand.splice(i,1);
    P.crit=card; P.critTurn={}; 
    pushLog(`${who(P)} deploys the ${card.name}. Passive Focus is now active.`);
    if(card.fx==='ecocrit'){ P.team.forEach(c=>{ if(c.kind==='nonhuman'&&!c._eco){ c._eco=true; c.maxHp+=20; c.hp+=20; } }); }
    render();
  };
  if(card.fx==='reader' && side==='you'){
    askPick('Reader-Response: name your type', [{label:'\u2694 Attack',val:'ATTACK'},{label:'\u26ca Block',val:'BLOCK'}], v=>{ card.declared=v; place(); });
    return;
  }
  if(card.fx==='reader') card.declared='ATTACK';
  place();
}
function critRewardText(fx){ const c=(DATA.crits.find(x=>x.fx===fx)); return c?c.reward:''; }
function thesisMet(side){
  const P=S[side]; const C=P&&P.crit; if(!C) return {ok:false,why:'No Lens deployed.'};
  const ct=P.critTurn||{}, ce=P.critEver||{}, act=active(P); let ok=false;
  switch(C.fx){
    case 'postcolonial': ok=(ct.correct||0)>=2; break;                                  // 2 correct ABC in a Main Phase
    case 'newhist': ok=!!(act&&((act.atkCharge&&act.atkCharge.length>=3)||(act.blkCharge&&act.blkCharge.length>=3))); break; // 3 matching charged
    case 'queer': ok=!!ct.queerMismatch; break;                                          // paid with mismatched colour
    case 'structuralism': ok=!!(ct.atk&&ct.blk&&ct.bm); break;                           // ⚔ + ⛊ + Bookmark this phase
    case 'reader': ok=(ct.readerStreak||0)>=2; break;                                    // 2 named-type in a row
    case 'biographical': ok=!!ct.bm; break;                                              // played a Bookmark (same-book roster)
    case 'ecocrit': ok=!!(act&&act.hp===10)||!!ce.survivedAt10; break;                   // Active at exactly 10 HP
    case 'marxist': ok=!!ct.koCost1; break;                                              // KO with a cost-1 attack
    case 'formalism': ok=!!ct.koPlain; break;                                            // KO with a keyword-free attack
    case 'russian': ok=!!ct.koLowAtk; break;                                             // KO with printed attack ≤20
    case 'feminist': ok=!!ce.blockedToZero; break;                                       // block reduced an attack to 0
    case 'archetypal': ok=!!ce.atkEqBlk; break;                                          // attack and block resolved equal
    case 'psycho': ok=!!ce.oppWrongBlk; break;                                           // opponent missed a Block trivia
    case 'affective': ok=(ct.oppWrong||0)>=2||!!ce.oppWrong2; break;                     // opponent 2 wrong in one turn
    case 'deconstruct': ok=!!ce.oppBmBlocked; break;                                     // opp Bookmark tried to skip/stop you
    default: ok=false;
  }
  return { ok, why: ok?'' : ('Thesis not met yet — '+(C.thesis||'')) };
}
function fulfillThesis(side){
  const P=S[side], C=P.crit; if(!C) return;
  const opp=foeOf(side), oppKey=(opp===S.you)?'you':'opp', act=active(P), oa=active(opp);
  const finishCrit=()=>{ P.discard.push(C); P.crit=null; render(); };
  pushLog(`${who(P)} fulfils the ${C.name} thesis! ${C.reward}`);
  switch(C.fx){
    case 'marxist': case 'formalism': drawN(side,2); break;
    case 'biographical': drawN(side,3); break;
    case 'archetypal': { const lim=S.settings.handSize; while(P.hand.length<lim && (P.deck.length||P.discard.length)){ if(!P.deck.length){P.deck=shuffle(P.discard.splice(0));} P.hand.push(P.deck.shift()); } break; }
    case 'feminist': case 'psycho': { if(opp.hand.length){ opp.discard.push(opp.hand.splice(rnd(opp.hand.length),1)[0]); pushLog(`${who(opp)} discards a card.`);} break; }
    case 'postcolonial': case 'deconstruct': { if(oa){ oa.hp=Math.max(0,oa.hp-20); pushLog(`${oa.name} takes 20 damage. (${oa.hp}/${oa.maxHp})`); flash(oppKey); fxAttack(oppKey,20); checkKO(opp,oppKey);} break; }
    case 'newhist': { const bi=P.deck.findIndex(c=>c.cat==='bookmark'); if(bi>=0){ P.hand.push(P.deck.splice(bi,1)[0]); pushLog(`${who(P)} tutors a Bookmark to hand.`);} else pushLog('No Bookmark left in deck.'); break; }
    case 'queer': if(act){ const b0=act.hp; act.hp=act.maxHp; fxHeal(sideOfChar(act),act.hp-b0); pushLog(`${act.name} fully healed.`);} break;
    case 'structuralism': opp.flags.noBookmarks=true; pushLog(`${who(opp)} cannot use Bookmarks next turn.`); break;
    case 'reader': if(act){ act.atkCharge.push({type:'ATTACK',power:0,_wild:true}); pushLog(`${act.name} gains a permanent wildcard charge.`);} break;
    case 'russian': { const bench=P.team.map((c,i)=>({c,i})).filter(o=>o.i!==P.activeIdx&&o.c.hp>0); if(bench.length){ doSwitch(P,bench[0].i); pushLog(`${P.team[P.activeIdx].name} steps up (free swap).`);} break; }
    case 'ecocrit': if(act){ act.status.ecoNegate=true; pushLog(`${act.name} will negate the next incoming attack.`);} break;
    case 'affective': { opp.deck.push(...opp.hand); opp.hand=[]; opp.deck=shuffle(opp.deck); for(let i=0;i<3;i++) if(opp.deck.length) opp.hand.push(opp.deck.shift()); pushLog(`${who(opp)} reshuffles and redraws 3.`); break; }
    default: break;
  }
  if(!S.over) finishCrit(); else render();
}
function drawN(side,n){ const P=S[side]; for(let i=0;i<n;i++){ if(!P.deck.length && P.discard.length) P.deck=shuffle(P.discard.splice(0)); if(P.deck.length){ const c=P.deck.shift(); c._new=true; P.hand.push(c);} } }


/* ---------------- phase flow ---------------- */
let turnTimerId=null;
function stopTurnTimer(){ if(turnTimerId){ clearInterval(turnTimerId); turnTimerId=null; } }
function startTurnTimer(){
  stopTurnTimer();
  if(!S || S.over || S.turn!=='you') return;
  S._timeLeft = +(S.settings.turnTimer||60);
  paintTimer();
  turnTimerId=setInterval(tickTurnTimer,1000);
}
function tickTurnTimer(){
  if(!S || S.over || S.turn!=='you'){ stopTurnTimer(); return; }
  if(busy || S._settings || S.viewPile){ paintTimer(); return; }   // pause during trivia / pickers / menus
  S._timeLeft--;
  paintTimer();
  if(S._timeLeft<=0){ stopTurnTimer(); pushLog('⏱ Time! Your turn ends automatically.'); toast('Time up — turn passed.','bad'); endTurn(); }
}
function paintTimer(){
  const el=document.getElementById('turnclock'); if(!el||!S) return;
  const t=Math.max(0,S._timeLeft|0); el.textContent='⏱ '+t+'s'; el.classList.toggle('low', t<=5);
}
function startTurn(){
  if(!S) return;
  const p = me();
  const _feFree = feOnField(p).reduce((n,c)=>n+((c.passive&&c.passive.freeAttach)||0),0);
  p.flags.feFree = _feFree;
  p.attachesLeft = S.settings.maxAttaches + _feFree;
  p.flags.attacked = false;
  p.flags.swapped = false;
  p.flags.bmCount = 0;
  S.phase='draw';
  pushLog(`— ${p===S.you?'Your':"Opponent's"} turn —`);
  // poison ticks at the start of each turn
  if(S.poison>0){
    ['you','opp'].forEach(k=>{ const a=active(S[k]); if(a&&a.hp>0){ a.hp=Math.max(0,a.hp-20); pushLog(`Poison: ${a.name} loses 20 HP.`);} });
    S.poison--; ['you','opp'].forEach(k=>checkKO(S[k],k));
  }
  // Burn / Spill tick (lose 10 HP); expire this player's timed statuses (Hardcover, Laminate, Glue, Tear cost-up)
  ['you','opp'].forEach(k=>{ S[k].team.forEach(c=>{
    if(c.hp>0 && (c.status.burn||c.status.spill)){ let loss=0; if(c.status.burn)loss=10; if(c.status.spill)loss=Math.max(loss,c.status.spillAmt||10); c.hp=Math.max(0,c.hp-loss); pushLog(`${c.status.burn?'Burn':'Spill'}: ${c.name} loses ${loss} HP.`); }
  }); checkKO(S[k],k); });
  p.team.forEach(c=>{ ['hardcover','laminate','glue','costUp'].forEach(s=>{ if(c.status[s]) delete c.status[s]; }); });
  p.team.forEach(c=>{ if(c.hp>0) c.turnsInPlay++; });
  feOnField(p).forEach(c=>{ if(c.passive&&c.passive.profileToggle && !c.status.highlight && !c.status.laminate){ grant(c,'highlight'); pushLog(`${c.name} shifts profile — Highlighted this turn.`); } });
  // crit per-turn tracking
  const foeP = (S.turn==='you')?S.opp:S.you;
  p.flags.oppBmLast = !!foeP.flags.bmThisTurn;
  p.flags.bmThisTurn = false;
  foeP.flags.noBookmarks = Math.max(0,(foeP.flags.noBookmarks||0)-1);
  p.critTurn = {correct:0,wrong:0,atk:false,blk:false,bm:false,readerStreak:0,queerMismatch:false};
  render();
  startTurnTimer();
  if(!S.over && S.turn==='opp') setTimeout(aiTurn,650);
}
function doDraw(){
  const p=me();
  let target=Math.max(S.settings.handMin, p.hand.length+1);  // normal +1, floored to handMin
  if(S.scrim && S.scrim.ruleShift==='sandroid' && me()===p) target+=2;  // Infinite Scroll
  let drawn=0;
  while(p.hand.length<target){
    if(p.deck.length===0 && p.discard.length){ p.deck=shuffle(p.discard.splice(0)); pushLog('Deck empty — discard reshuffled.'); }
    if(!p.deck.length) break;
    const c=p.deck.shift(); c._new=true; p.hand.push(c); p._lastDrawn=c; drawn++;
  }
  if(drawn>0) pushLog(`${who(p)} drew ${drawn} card${drawn>1?'s':''} (hand of ${p.hand.length}).`);
  else pushLog(`${who(p)} has no cards left to draw.`);
  try{if(drawn>0)SFX.card('card_slide',0.6);}catch(e){}
  flickDeck(S.turn);
  S.phase='strategize'; render();
}
function toEngage(){ S.phase='engage'; pushLog(`${who(me())}: ENGAGE phase.`); render(); }
function endTurn(){ if(S.over) return; if(S.scrim && S.scrim.ruleShift==='sandroid' && S.turn==='you' && S.you.hand.length){ const n=S.you.hand.length; S.you.discard.push(...S.you.hand.splice(0)); pushLog(`The Infinite Scroll — ${n} unused card${n>1?'s':''} crumble to sand.`); } S.turn=foeKey(); startTurn(); }

/* ---------------- attaching ABCs (trivia gate) ---------------- */
function tryPlayHandCard(idx,targetUid){
  if(busy || S.turn!=='you' || S.phase!=='strategize') return;
  const p=S.you, card=p.hand[idx]; if(!card) return;
  if(card.cat==='bookmark'){ playBookmark('you',idx); return; }
  if(card.cat==='crit'){ playCrit('you',idx); return; }
  if(p.attachesLeft<=0){ toast('No attaches left this turn.'); return; }
  const tgt=(targetUid && p.team.find(c=>c.uid===targetUid)) || active(p);
  if(!tgt || tgt.hp<=0){ toast('Choose a living character to charge.'); return; }
  if((p.flags.feFree||0)>0 && card.cat==='abc'){ p.flags.feFree--; pushLog('1st Edition auto-attach — no trivia needed.'); attach('you',idx,true,tgt.uid); return; }
  if(S.settings.triviaOn && !p.flags.skipTrivia){ openTrivia(card,idx,tgt.uid); }
  else { if(p.flags.skipTrivia){ p.flags.skipTrivia=false; pushLog('Cliffnotes: trivia skipped.'); } attach('you',idx,true,tgt.uid); }
}
function attach(side,handIdx,correct,targetUid){
  const p=S[side], card=p.hand[handIdx]; if(!card) return;
  const act=(targetUid && p.team.find(c=>c.uid===targetUid && c.hp>0)) || active(p);
  if(!p.critTurn) p.critTurn={};
  // Structuralism: charge only in ascending Power order
  if(correct && hasCrit(side,'structuralism')){
    const charged=act.atkCharge.concat(act.blkCharge).filter(c=>!c._wild);
    const lastPow=charged.length?Math.max(...charged.map(c=>c.power||0)):0;
    if((card.power||0)<lastPow){ if(side==='you') toast('Structuralism: charge in ascending Power order.'); return; }
  }
  if(correct && p.flags.doubleTrivia){
    if(!p.flags._dblHalf){ p.flags._dblHalf=true; p.attachesLeft--; p.hand.splice(handIdx,1); p.discard.push(card); pushLog("Macbeth's curse — one more correct answer is needed before an ABC will attach."); render(); return; }
    p.flags._dblHalf=false; pushLog('The curse is briefly sated — the card attaches.');
  }
  if(correct){
    if(act.status.smudge){
      if(!act.status._smudgeHalf){ act.status._smudgeHalf=true; p.attachesLeft--; p.hand.splice(handIdx,1); p.discard.push(card); pushLog(`${act.name} is Smudged — one more correct answer is needed before an ABC will attach.`); render(); return; }
      delete act.status.smudge; delete act.status._smudgeHalf; pushLog(`${act.name} clears the Smudge — the card attaches.`);
    }
    p.hand.splice(handIdx,1);
    const pile=(card.type==='ATTACK'?act.atkCharge:act.blkCharge);
    pile.push(card);
    if(hasCrit(side,'reader') && p.crit && p.crit.declared===card.type){
      pile.push({type:card.type,power:0,_wild:true});
      pushLog('Reader-Response: that answer counts as two charges.');
    }
    p.attachesLeft--;
    p.critTurn.correct=(p.critTurn.correct||0)+1;
    if(card.type==='ATTACK') p.critTurn.atk=true; else p.critTurn.blk=true;
    if(p.crit&&p.crit.fx==='reader'){ p.critTurn.readerStreak=(card.type===p.crit.declared)?(p.critTurn.readerStreak||0)+1:0; }
    pushLog(`${who(p)} attached ${card.type} (power ${card.power}) to ${act.name}.`);
    if(card.type==='BLOCK'){ const foe=(side==='you'?S.opp:S.you); const witch=feOnField(foe).find(c=>c.passive&&c.passive.spillOnFoeBlockAttach); if(witch){ witch.status.spill=true; witch.status._spillLock=true; witch.status.spillAmt=witch.passive.spillOnFoeBlockAttach; pushLog(`${witch.name} is doused — Spill (−${witch.status.spillAmt} HP/turn).`); } }
    if(act.status.marginNotes){ delete act.status.marginNotes; if(!p.deck.length&&p.discard.length)p.deck=shuffle(p.discard.splice(0)); if(p.deck.length){ p.hand.push(p.deck.shift()); pushLog(`${act.name}'s Margin Notes — drew a card.`); } }
  } else {
    p.critTurn.wrong=(p.critTurn.wrong||0)+1;
    const protect=hasCrit(side,'postcolonial') && p.flags.oppBmLast;
    if(protect){ p.attachesLeft--; pushLog(`${who(p)} missed — Postcolonial Lens keeps the ${card.type} card in hand.`); }
    else { p.hand.splice(handIdx,1); p.discard.push(card); p.attachesLeft--; pushLog(`${who(p)} missed the question — ${card.type} card discarded.`); }
    if(pHasPassive(p,'failDiscardRandom') && p.hand.length){ const d=p.hand.splice(rnd(p.hand.length),1)[0]; p.discard.push(d); pushLog('Cold Logic: the slip costs a random card from hand.'); }
    if(pHasPassive(p,'failSkipAttack')){ p.flags.skipAttack=true; pushLog('Anticipatory Madness: your next attack declaration will be skipped.'); }
    if(affectiveOn() && act && act.hp>0){ act.hp=Math.max(0,act.hp-10); pushLog(`Critical anxiety: ${act.name} takes 10 damage.`); checkKO(p,side); }
  }
  render();
}

/* ---------------- status effects (Tear, Rip, Glue, Spill, Smudge, Burn / Highlight, Laminate, Hardcover, Margin Notes) ---------------- */
const STATUS_NEG=['tear','rip','glue','spill','smudge','burn'];
const LAMINATE_BLOCKS=['tear','rip','glue','spill'];
function inflict(t,k,ignoreLam){
  if(!t||t.hp<=0) return false;
  if(!ignoreLam && t.status.laminate && LAMINATE_BLOCKS.includes(k)){ pushLog(`${t.name} is Laminated — ${k.charAt(0).toUpperCase()+k.slice(1)} prevented.`); return false; }
  t.status[k]=true; fxStatus(sideOfChar(t),statusName(k),'neg'); return true;
}
function grant(t,k){ if(t&&t.fe&&t.passive&&t.passive.immuneSelfBuff){ pushLog(`${t.name} is too isolated to gain ${statusName(k)}.`); return false; } if(t&&t.hp>0){ t.status[k]=true; fxStatus(sideOfChar(t),statusName(k),'pos'); return true; } return false; }
function cleanseNeg(t){ if(!t) return; ['tear','rip','glue','burn','_smudgeHalf','costUp'].forEach(k=>{ delete t.status[k]; }); if(!t.status._spillLock){ delete t.status.spill; delete t.status.spillAmt; } if(!t.status._smudgeLock){ delete t.status.smudge; } }
function clearAllStatus(t){ if(t) t.status={}; }
function statusLabel(c){
  const order=[['burn','🔥'],['spill','💧'],['tear','✂'],['rip','⊘'],['glue','🩹'],['smudge','▒'],['laminate','◈'],['highlight','✶'],['hardcover','▣'],['marginNotes','✎'],['rip','⊘']];
  let out=''; const seen={};
  order.forEach(([k,g])=>{ if(c.status[k]&&!seen[k]){ seen[k]=1; out+=g; } });
  return out;
}

/* ---------------- conditional effect evaluator (cross-character "if X in play / KO'd") ---------------- */
function aliveOn(pl,id){ return pl && pl.team.some(c=>c.id===id && c.hp>0); }
function koAnywhere(id){ return ['you','opp'].some(k=>S[k].grave.some(c=>c.id===id)); }
function condMatch(rule, own, other, otherChar){
  const ids=rule.ids||[];
  if(rule.test==='inPlay'){
    const f=id=> rule.scope==='foe'?aliveOn(other,id) : rule.scope==='either'?(aliveOn(own,id)||aliveOn(other,id)) : aliveOn(own,id);
    return rule.all? ids.every(f) : ids.some(f);
  }
  if(rule.test==='ko') return ids.some(koAnywhere);
  if(rule.test==='pileCount'){ const pl=(rule.scope==='foe')?other:own; return pl && ((pl.discard?pl.discard.length:0)+(pl.grave?pl.grave.length:0))>=(rule.n||0); }
  if(rule.test==='defenderIs' || rule.test==='attackerIs') return otherChar && ids.includes(otherChar.id);
  if(rule.test==='defenderHasStatus') return !!(otherChar && (rule.status? otherChar.status[rule.status] : STATUS_NEG.some(x=>otherChar.status[x])));
  if(rule.test==='selfHasStatus'){ const a=active(own); return !!(a && a.status[rule.status]); }
  if(rule.test==='selfHpBelow'){ const a=active(own); return !!(a && a.hp < (rule.n||0)); }
  if(rule.test==='incomingCostGTE'){ return !!(atkCtx && atkCtx.ab && (atkCtx.ab.cost||0) >= (rule.n||0)); }
  if(rule.test==='attackerDeckIn'){ return !!(other && (rule.decks||[]).includes(other.setKey)); }
  return false;
}

/* ---------------- bookmarks ---------------- */
function playBookmark(side,idx){
  const P=S[side];
  if((P.flags.noBookmarks||0)>0){ if(side==='you') toast('Structuralism locked your Bookmarks this turn.'); return; }
  if(P.flags.bmCount>=2){ if(side==='you') toast('Up to 2 bookmarks per turn.'); return; }
  const card=P.hand[idx], isYou=side==='you', act=active(P);
  const remove=()=>{ const i=P.hand.indexOf(card); if(i>=0) P.hand.splice(i,1); P.discard.push(card); };
  const hold=(tag,uid)=>{ const i=P.hand.indexOf(card); if(i>=0) P.hand.splice(i,1); card._tag=tag; card._uid=uid||null; (P.activeBm||(P.activeBm=[])).push(card); };
  const commit=()=>{ P.flags.bmCount=(P.flags.bmCount||0)+1; P.flags.bmThisTurn=true; if(!P.critTurn)P.critTurn={}; P.critTurn.bm=true; };
  switch(card.effect){
    case 'heal':{
      const living=P.team.filter(c=>c.hp>0);
      const go=t=>{ if(t&&t.fe&&t.passive&&t.passive.immuneSelfBuff){ toast&&toast(`${t.name} cannot be healed.`); pushLog(`${t.name} refuses aid — Total Isolation.`); remove(); commit(); render(); return; } const before=t.hp; t.hp=t.maxHp; pushLog(`${who(P)} used First Aid Kit — ${t.name} restored to full.`); fxHeal(sideOfChar(t),t.hp-before); remove(); commit(); render(); };
      if(isYou && living.length>1) askPick('Heal which character?', living.map(c=>({label:`${c.name}  ${c.hp}/${c.maxHp}`,val:c.uid})), uid=>go(living.find(c=>c.uid===uid)));
      else { const t=living.sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0]; t?go(t):remove(); }
      return;
    }
    case 'supercharge': P.flags.supercharge=true; pushLog(`${who(P)} used Supercharger — next attack doubled.`); hold('supercharge'); break;
    case 'ironcurtain': act.status.ironcurtain=true; pushLog(`${who(P)} raised an Iron Curtain on ${act.name}.`); hold('ironcurtain',act.uid); break;
    case 'cliffnotes': P.flags.skipTrivia=true; pushLog(`${who(P)} used Cliffnotes — next ABC needs no trivia.`); hold('cliffnotes'); break;
    case 'truce': foeOf(side).flags.truce=true; pushLog(`${who(P)} called a Truce — opponent's next attack is skipped.`); hold('truce'); break;
    case 'crown': P.attachesLeft+=3; pushLog(`${who(P)} claimed the Crown of Denmark — +3 attaches this turn.`); remove(); break;
    case 'poison': S.poison=2; pushLog(`${who(P)} smashed a Vial of Poison — both Actives take 20/turn for 2 turns.`); remove(); break;
    case 'papercut':{
      remove(); const n=Math.min(3,P.hand.length); const shed=P.hand.splice(0,n); P.discard.push(...shed);
      for(let k=0;k<n;k++){ if(!P.deck.length && P.discard.length) P.deck=shuffle(P.discard.splice(0)); if(P.deck.length) P.hand.push(P.deck.shift()); }
      pushLog(`${who(P)} used Papercut — cycled ${n} cards.`); break;
    }
    case 'peekaboo':{
      remove();
      ['you','opp'].forEach(k=>{ const pl=S[k]; pl.deck.push(...pl.hand); pl.hand=[]; pl.deck=shuffle(pl.deck); for(let i=0;i<5;i++) if(pl.deck.length) pl.hand.push(pl.deck.shift()); });
      pushLog(`${who(P)} played Peek-a-Boo — both hands reshuffled and redrawn.`); break;
    }
    case 'overexp':{
      remove(); const opp=foeOf(side); let c=0;
      for(let k=0;k<2 && opp.hand.length;k++){ opp.discard.push(opp.hand.splice(rnd(opp.hand.length),1)[0]); c++; }
      pushLog(`${who(P)} used Over Exposure — discarded ${c} of the opponent's cards.`); break;
    }
    case 'defib':{
      const others=P.hand.filter(c=>c!==card);
      if(P.grave.length===0 || others.length<3){ toast("Defibrillator needs a KO'd ally and 3 cards."); return; }
      const go=g=>{ remove();
        P.hand.filter(c=>c!==card).slice(0,3).forEach(c=>{ const i=P.hand.indexOf(c); if(i>=0){P.hand.splice(i,1);P.discard.push(c);} });
        const gi=P.grave.indexOf(g); if(gi>=0) P.grave.splice(gi,1);
        g.hp=Math.max(10,Math.round(g.maxHp/2)); g.atkCharge=[];g.blkCharge=[];g.status={};
        P.team.push(g); pushLog(`${who(P)} used Defibrillator — ${g.name} returns at ${g.hp} HP.`); commit(); render();
      };
      if(isYou && P.grave.length>1) askPick('Revive which character?', P.grave.map(g=>({label:g.name,val:g.uid})), uid=>go(P.grave.find(g=>g.uid===uid)));
      else go(P.grave[0]);
      return;
    }
    case 'trading':{
      const bench=P.team.map((c,i)=>({c,i})).filter(o=>o.i!==P.activeIdx && o.c.hp>0);
      if(!bench.length){ toast('No benched character to swap in.'); return; }
      const go=i=>{ doSwitch(P,i); pushLog(`${who(P)} used Trading Places — ${P.team[i].name} steps up.`); remove(); commit(); render(); };
      if(isYou && bench.length>1) askPick('Swap to which character?', bench.map(o=>({label:`${o.c.name}  ${o.c.hp}/${o.c.maxHp}`,val:o.i})), i=>go(i));
      else go(bench[0].i);
      return;
    }
    case 'tear':{ const F=foeOf(side); inflict(active(F),'tear'); pushLog(`${who(P)} tears ${active(F).name}'s chapter — +10 damage taken.`); remove(); break; }
    case 'loosebind':{ const F=foeOf(side),oa=active(F); inflict(oa,'tear'); if(oa)oa.status.costUp=true; pushLog(`${who(P)} loosens ${oa.name}'s binding — Tear, and its next attack costs +1 ABC.`); remove(); break; }
    case 'finaldraft':{ const F=foeOf(side),oa=active(F); const n=oa.atkCharge.length; if(n){ F.discard.push(...oa.atkCharge.splice(0)); } pushLog(`Final Draft: ${oa.name} loses ${n} charged Attack ABC.`); remove(); break; }
    case 'rip':{ const F=foeOf(side); inflict(active(F),'rip'); pushLog(`Missing Pages: ${active(F).name}'s attack is Ripped until it leaves play.`); remove(); break; }
    case 'spill':{ const F=foeOf(side); inflict(active(F),'spill'); pushLog(`${who(P)} spills on ${active(F).name} — 10 HP lost each turn.`); remove(); break; }
    case 'inkspill':{ const F=foeOf(side),oa=active(F); inflict(oa,'spill'); const piles=[]; oa.atkCharge.forEach((c,i)=>piles.push(['a',i])); oa.blkCharge.forEach((c,i)=>piles.push(['b',i])); if(piles.length){ const [pk,pi]=piles[rnd(piles.length)]; const arr=pk==='a'?oa.atkCharge:oa.blkCharge; F.discard.push(arr.splice(pi,1)[0]); } pushLog(`Ink Explosion: Spill on ${oa.name}, and one charged ABC is lost.`); remove(); break; }
    case 'glue':{ const F=foeOf(side); inflict(active(F),'glue'); pushLog(`${who(P)} glues ${active(F).name} — it cannot block or switch.`); remove(); break; }
    case 'smudge':{ const F=foeOf(side); inflict(active(F),'smudge'); pushLog(`${who(P)} smudges ${active(F).name}'s notes — its next ABC needs two correct answers.`); remove(); break; }
    case 'burn':{ const F=foeOf(side); inflict(active(F),'burn'); pushLog(`Book Burn: ${active(F).name} is Burning — 10 HP each turn, unhealable.`); remove(); break; }
    case 'laminate':{ grant(act,'laminate'); pushLog(`${who(P)} laminates ${act.name} — immune to Tear, Rip, Glue, Spill.`); hold('laminate',act.uid); break; }
    case 'proofread':{ const m=active(P); let r=null; for(const k of STATUS_NEG){ if(m.status[k]){ delete m.status[k]; if(k==='smudge') delete m.status._smudgeHalf; r=k; break; } } pushLog(r?`Proofread: ${m.name} sheds ${r}.`:`Proofread: ${m.name} had no negative status.`); remove(); break; }
    case 'revised':{ const m=active(P); cleanseNeg(m); const b0=m.hp; m.hp=Math.min(m.maxHp,m.hp+20); fxHeal(sideOfChar(m),m.hp-b0); pushLog(`Revised Edition: ${m.name} is cleansed and heals 20 (${m.hp}/${m.maxHp}).`); remove(); break; }
    case 'highlight':{ grant(act,'highlight'); pushLog(`${who(P)} highlights ${act.name} — next attack +20.`); hold('highlight',act.uid); break; }
    case 'marginnotes':{ grant(act,'marginNotes'); pushLog(`${who(P)} pencils Margin Notes on ${act.name} — draw on the next attach.`); hold('marginNotes',act.uid); break; }
    case 'hardcover':{ grant(act,'hardcover'); pushLog(`${who(P)} gives ${act.name} a Hardcover — incoming damage -10 until your next turn.`); hold('hardcover',act.uid); break; }
    case 'dogear':{ P.flags.dogear=true; pushLog(`${who(P)} dog-ears a page — the next attack keeps its Attack ABC.`); hold('dogear'); break; }
    case 'redpen':{ const F=foeOf(side),oa=active(F); const piles=[]; oa.atkCharge.forEach((c,i)=>piles.push(['a',i])); oa.blkCharge.forEach((c,i)=>piles.push(['b',i])); if(piles.length){ const [pk,pi]=piles[rnd(piles.length)]; const arr=pk==='a'?oa.atkCharge:oa.blkCharge; F.discard.push(arr.splice(pi,1)[0]); pushLog(`Editor's Red Pen strips an ABC from ${oa.name}.`); } const m=active(P), ci=P.hand.findIndex(c=>c.cat==='abc'); if(ci>=0){ const c=P.hand.splice(ci,1)[0]; (c.type==='ATTACK'?m.atkCharge:m.blkCharge).push(c); pushLog(`Editor's Red Pen attaches a ${c.type} ABC to ${m.name} free of trivia.`); } remove(); break; }
    case 'rewrite':{ const m=active(P),F=foeOf(side),oa=active(F); let moved=0; STATUS_NEG.forEach(k=>{ if(m.status[k]){ delete m.status[k]; if(k==='smudge')delete m.status._smudgeHalf; if(inflict(oa,k)) moved++; } }); pushLog(moved?`Rewrite History: ${moved} status effect${moved>1?'s':''} shifted onto ${oa.name}.`:`Rewrite History: no negative status to move.`); remove(); break; }
    case 'bibliography':{ const i=P.discard.findIndex(c=>c.cat==='bookmark'); if(i>=0){ const c=P.discard.splice(i,1)[0]; P.hand.push(c); pushLog(`Bibliography returns ${c.name} to hand.`); } else pushLog('Bibliography: no Bookmark in your discard pile.'); remove(); break; }
    case 'citation':{ const F=foeOf(side), i=F.hand.findIndex(c=>c.cat==='bookmark'); if(i>=0){ const c=F.hand.splice(i,1)[0]; F.discard.push(c); pushLog(`Citation Needed: the opponent discards ${c.name}.`); } else pushLog('Citation Needed: the opponent holds no Bookmark.'); remove(); break; }
    case 'loststacks':{ const F=foeOf(side); const bench=F.team.filter((c,ix)=>ix!==F.activeIdx&&c.hp>0); if(bench.length){ const b=bench[0]; const n=b.atkCharge.length+b.blkCharge.length; F.discard.push(...b.atkCharge.splice(0),...b.blkCharge.splice(0)); pushLog(`Lost in the Stacks: ${b.name} loses ${n} charged ABC.`); } else pushLog('Lost in the Stacks: no benched enemy character.'); remove(); break; }
    case 'deadline':{ ['you','opp'].forEach(k=>{ const pl=S[k]; pl.team.forEach(c=>{ if(c.atkCharge.length) pl.discard.push(...c.atkCharge.splice(0)); }); }); pushLog('Editorial Deadline: every charged Attack ABC is discarded; Block ABC remain.'); remove(); break; }
    case 'restoration':{ const m=active(P); let a=0,b=0; for(let i=P.discard.length-1;i>=0&&(a<2||b<2);i--){ const c=P.discard[i]; if(c.cat!=='abc') continue; if(c.type==='ATTACK'&&a<2){ m.atkCharge.push(P.discard.splice(i,1)[0]); a++; } else if(c.type==='BLOCK'&&b<2){ m.blkCharge.push(P.discard.splice(i,1)[0]); b++; } } pushLog(`Library Restoration: ${m.name} regains ${a} Attack and ${b} Block ABC.`); remove(); break; }
    case 'completerewrite':{ const m=active(P); clearAllStatus(m); if(m.atkCharge.length||m.blkCharge.length) P.discard.push(...m.atkCharge.splice(0),...m.blkCharge.splice(0)); const b0=m.hp; m.hp=Math.min(m.maxHp,m.hp+30); fxHeal(sideOfChar(m),m.hp-b0); for(let d=0;d<2;d++){ if(!P.deck.length&&P.discard.length)P.deck=shuffle(P.discard.splice(0)); if(P.deck.length)P.hand.push(P.deck.shift()); } pushLog(`Complete Rewrite: ${m.name} is fully reset, heals 30 (${m.hp}/${m.maxHp}), and you draw 2.`); remove(); break; }
    case 'maskingtape':{ let n=0; P.team.forEach(c=>{ if(c.hp>0){ if(c.status.tear){ delete c.status.tear; n++; } if(c.status.rip){ delete c.status.rip; n++; } } }); pushLog(n?`Masking Tape: cleared ${n} Tear/Rip effect${n>1?'s':''} from your team.`:`Masking Tape: no Tear or Rip on your team.`); remove(); break; }
    case 'roundrobin':{ const done=[]; ['you','opp'].forEach(k=>{ const pl=S[k]; const bi=pl.team.findIndex((c,ix)=>ix!==pl.activeIdx && c.hp>0); if(bi>=0){ doSwitch(pl,bi); done.push(`${who(pl)} \u2192 ${pl.team[pl.activeIdx].name}`); } }); pushLog(done.length?`Round Robin: front lines rotate \u2014 ${done.join('; ')}.`:`Round Robin: no benched characters to rotate in.`); remove(); break; }
    default: toast('No effect'); return;
  }
  commit();
  render();
}

/* ---------------- target picker ---------------- */
function askPick(title,options,cb){ S.picker={title,options}; pickCb=cb; busy=true; render(); }
function resolvePick(val){ const cb=pickCb; S.picker=null; pickCb=null; busy=false; if(cb) cb(val); render(); }

/* ---------------- damage ---------------- */
function calcDamage(ch,ab){
  let d=ab.dmg||0;
  if(ab.dmgType==='perTurn') d=(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay);
  else if(ab.dmgType==='perABC') d=(ab.step||10)*ch.atkCharge.length;
  return Math.max(0,Math.round(d));
}
function calcBlock(ch,ab,incoming){
  if(!ab) return {amt:0};
  if(typeof symbolsOff==='function' && symbolsOff()) return {amt:ab.block||0};
  if(ab.blockType==='negate') return {amt:incoming,negate:true};
  if(ab.blockType==='capto') return {amt:Math.max(0,incoming-(ab.cap||10))};
  if(ab.blockType==='perTurn') return {amt:(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay)};
  return {amt:ab.block||0};
}
function spend(charge,n){ const out=[]; for(let i=0;i<n&&charge.length;i++) out.push(charge.shift()); return out; }

/* ---------------- 1st Edition (Commander) passive engine ---------------- */
function feOnField(p){ return p?p.team.filter(c=>c.fe&&c.hp>0):[]; }
function pHasPassive(p,flag){ return feOnField(p).some(c=>c.passive&&c.passive[flag]); }
function pPassiveChar(p,flag){ return feOnField(p).find(c=>c.passive&&c.passive[flag])||null; }
function isSoloAlive(p){ return p.team.filter(c=>c.hp>0).length<=1; }
function doSwitch(p, newIdx, opts){
  opts=opts||{}; const oldIdx=p.activeIdx; if(newIdx==null||newIdx===oldIdx) return;
  const leaving=p.team[oldIdx]; p.activeIdx=newIdx; const entering=p.team[newIdx];
  if(leaving && leaving.status && leaving.status.rip){ delete leaving.status.rip; if(!opts.silent) pushLog(`${leaving.name} leaves the front line — its Rip mends.`); }
  if(!opts.silent && leaving&&leaving.hp>0&&leaving.fe&&leaving.passive&&leaving.passive.onSwitchInflict&&entering&&entering.hp>0){
    if(inflict(entering, leaving.passive.onSwitchInflict)) pushLog(`${leaving.name} steps aside — ${entering.name} is ${statusName(leaving.passive.onSwitchInflict)}.`);
  }
  if(entering&&entering.fe&&entering.passive){
    if(entering.passive.forcedActiveSelfRip && entering.hp>0){ entering.status.rip=true; pushLog(`${entering.name} is forced Active — Ripped (attack disabled).`); }
    if(entering.passive.forcedActiveStripBlocks){ p.team.forEach(c=>{ delete c.status.hardcover; delete c.status.laminate; delete c.status.ironcurtain; }); pushLog('The curtain falls — active defensive buffs are stripped.'); }
  }
}
function performAttack(side,abilKey){           // == beginAttack
  const A=S[side], att=active(A), ab=att[abilKey];
  if(!A.critTurn) A.critTurn={};
  if(abilKey==='atk' && A.flags.skipAttack){ A.flags.skipAttack=false; if(side==='you') toast("Hamlet's hesitation — attack skipped."); pushLog(`${who(A)} must skip the attack declaration (Anticipatory Madness).`); return false; }
  if(abilKey==='atk' && att.status.rip){ if(side==='you') toast(`${att.name}'s attack is Ripped — unusable until it leaves play.`); return false; }
  let cost=attackCostFor(side,ab);
  if(att.status.costUp) cost+=1;
  const pool=()=> hasCrit(side,'queer') ? (att.atkCharge.length+att.blkCharge.length) : att.atkCharge.length;
  if(cost!=null && pool()<cost){ toast(`Need ${cost} ATTACK ABCs (have ${pool()}).`); return false; }
  const D=foeOf(side), dKey=(D===S.you?'you':'opp'), def=active(D);
  if(!def||def.hp<=0){ toast('No target.'); return false; }
  if(ab.cleanseAlly){ const ally=A.team.find(c=>c.hp>0 && c.status[ab.cleanseAlly]); if(ally){ delete ally.status[ab.cleanseAlly]; pushLog(`${att.name} clears ${statusName(ab.cleanseAlly)} from ${ally.name}.`); } }
  let dmg=calcDamage(att,ab);
  if(hasCrit(side,'russian')){ dmg=att.hp; pushLog(`Russian Formalism: ${att.name}'s damage equals its HP (${dmg}).`); }
  let condPierce=false, condInflict=null, condFoeDiscard=0;
  if(ab.koScale){ const n=(S[side].grave||[]).length; if(n){ dmg+=ab.koScale*n; pushLog(`${att.name}: +${ab.koScale*n} damage from ${n} fallen.`); } }
  if(ab.cond){ ab.cond.forEach(r=>{ if(condMatch(r,A,D,def)){ const t=r.then||{}; if(t.dmgSet!=null)dmg=t.dmgSet; if(t.dmgAdd)dmg+=t.dmgAdd; if(t.dmgMult)dmg=Math.round(dmg*t.dmgMult); if(t.pierce)condPierce=true; if(t.inflict)condInflict=t.inflict; if(t.foeDiscard)condFoeDiscard+=t.foeDiscard; if(r.log)pushLog(r.log); } }); }
  // 1E passive & ability damage
  if(att.fe&&att.passive&&att.passive.soloBonus&&isSoloAlive(A)){ dmg+=att.passive.soloBonus; pushLog(`${att.name} stands alone — +${att.passive.soloBonus} damage.`); }
  if(att.fe&&att.passive&&att.passive.statusDmgBonus&&STATUS_NEG.some(x=>def.status[x])){ dmg+=att.passive.statusDmgBonus; pushLog(`${att.name}: +${att.passive.statusDmgBonus} against an afflicted target.`); }
  if(ab.bmDiscardBonus){ const n=(A.discard||[]).filter(c=>c.cat==='bookmark').length; const add=Math.min(ab.bmDiscardCap||9999, ab.bmDiscardBonus*n); if(add>0){ dmg+=add; pushLog(`${ab.n}: +${add} from ${n} Bookmark(s) in the discard.`); } }
  if(ab.guessTopFoe){ const top=D.deck[0]; const types=['ATTACK','BLOCK','BOOKMARK']; const guess=types[rnd(3)]; const actual=top?(top.cat==='abc'?top.type:'BOOKMARK'):null; if(actual&&guess===actual){ dmg+=ab.guessTopFoe.bonus||0; if(ab.guessTopFoe.inflict)condInflict=ab.guessTopFoe.inflict; pushLog(`The Mousetrap calls ${guess} — correct! +${ab.guessTopFoe.bonus} and Tear.`); } else pushLog(`The Mousetrap calls ${guess} — wrong.`); }
  if(ab.condPierceVillain && (def.tags||[]).includes('villain')){ condPierce=true; pushLog(`${ab.n} sees through the monstrous nature — Pierce.`); }
  let spentAtk=spend(att.atkCharge,cost);
  if(spentAtk.length<cost && hasCrit(side,'queer')){ const more=spend(att.blkCharge,cost-spentAtk.length); if(more.length) A.critTurn.queerMismatch=true; spentAtk.push(...more); }
  if(ab.selfDiscardBlk){ for(let i=0;i<ab.selfDiscardBlk;i++){ if(att.blkCharge.length) A.discard.push(att.blkCharge.shift()); } pushLog(`${att.name} discards ${ab.selfDiscardBlk} Block ABC.`); }
  if(ab.selfDiscardAtk){ for(let i=0;i<ab.selfDiscardAtk;i++){ if(att.atkCharge.length) A.discard.push(att.atkCharge.shift()); } pushLog(`${att.name} discards ${ab.selfDiscardAtk} Attack ABC.`); }
  if(S.settings.powerAdds) dmg+=spentAtk.reduce((s,c)=>s+(c.power||0),0);
  if(S.scrim && side==='you' && scrimHas('gutenberg')){ dmg+=5; pushLog('The Gutenberg Press — +5 base damage.'); }
  if(hasCrit(side,'marxist') && (ab.cost===1||ab.cost===2) && def.atk && (def.atk.cost===3||def.atk.cost===4)){ dmg+=10; pushLog('Marxist Lens: +10 class-struggle damage.'); }
  if(A.flags.supercharge){ dmg*=2; A.flags.supercharge=false; pushLog('Supercharger: damage doubled!'); }
  if(att.status.highlight){ dmg+=20; delete att.status.highlight; pushLog(`${att.name} is Highlighted — +20 damage.`); }
  if(def.status.tear){ dmg+=10; pushLog(`${def.name} is Torn — +10 incoming damage.`); }
  if(att.status.weaken){ dmg=Math.max(0,dmg-att.status.weaken); pushLog(`${att.name} was weakened — -${att.status.weaken} damage.`); delete att.status.weaken; }
  if(def.status.exposed){ dmg=Math.round(dmg*2); pushLog(`${def.name} is Exposed — damage doubled!`); delete def.status.exposed; }
  if(att.status.costUp){ delete att.status.costUp; }
  if(A.flags.dogear){ att.atkCharge.unshift(...spentAtk.filter(c=>!c._wild)); A.flags.dogear=false; pushLog(`Dog-Eared Strategy: ${att.name}'s Attack ABC stay attached.`); }
  else A.discard.push(...spentAtk.filter(c=>!c._wild));
  if(side==='you') A.flags.attacked=true;
  let pierce=(ab.flags||[]).includes('pierce') || condPierce;
  if(hasCrit(side,'psycho') && def.blkCharge.length===0){ pierce=true; }
  if(symbolsOff()) pierce=false;
  atkCtx={side,A,att,ab,D,dKey,def,dmg,pierce,condInflict,condFoeDiscard};
  if(def.status.ecoNegate){ def.status.ecoNegate=false; pushLog(`${def.name} negates the attack (Ecocriticism)!`); return finishAttack(dmg,true); }
  if(def.status.ironcurtain && !pierce && !ab.ignoreDefBuffs){ def.status.ironcurtain=false; pushLog(`${def.name}'s Iron Curtain absorbs the blow!`); return finishAttack(dmg,true); }
  const bb=def.blk, canBlock=(!pierce||deconOn()) && !def.status.glue && bb && bb.cost!=null && def.blkCharge.length>=bb.cost;
  if(def.status.glue && bb && def.blkCharge.length>=bb.cost) pushLog(`${def.name} is Glued — cannot block.`);
  if(canBlock){
    if(dKey==='you' && !S.settings.autoBlock){ S.defend=true; busy=true; render(); return; }   // player chooses
    const willBlock=(dKey==='opp')?(dmg>=8):true;
    if(willBlock) return doBlock();
  }
  finishAttack(0,false);
}
function doBlock(){
  const {A,att,def,D,dmg,dKey}=atkCtx, b=def.blk;
  let spentBlk=spend(def.blkCharge,b.cost);
  if(spentBlk.length<b.cost && hasCrit(dKey,'queer')){ spentBlk.push(...spend(def.atkCharge,b.cost-spentBlk.length)); }
  const res=calcBlock(def,b,dmg); let amt=res.amt; let neg=!!res.negate; let failDouble=false;
  if(b.blkCleanse && def.status[b.blkCleanse]){ delete def.status[b.blkCleanse]; pushLog(`${def.name} shrugs off ${statusName(b.blkCleanse)} while blocking.`); }
  if(b.cond){ b.cond.forEach(r=>{ if(condMatch(r,D,A,att)){ const t=r.then||{};
      if(t.negate){ neg=true; amt=dmg; }
      if(t.blockSet!=null) amt=t.blockSet;
      if(t.blockAdd) amt+=t.blockAdd;
      if(t.blockMult) amt=Math.round(amt*t.blockMult);
      if(t.blockHalf) amt=Math.ceil(dmg/2);
      if(t.blockFailDouble) failDouble=true;
      if(r.log) pushLog(r.log);
  } }); }
  if(S.settings.powerAdds && !neg) amt+=spentBlk.reduce((s,c)=>s+(c.power||0),0);
  if(hasCrit(dKey,'newhist') && !neg){ amt+=10; pushLog('New Historicism: block reduces an extra 10.'); }
  D.discard.push(...spentBlk.filter(c=>!c._wild));
  if(!symbolsOff()){
    if(b.grant){ grant(def,b.grant); pushLog(`${def.name} gains ${b.grant}.`); }
    if(b.inflictAtt && att.hp>0){ if(inflict(att,b.inflictAtt)) pushLog(`${att.name} is afflicted with ${b.inflictAtt.charAt(0).toUpperCase()+b.inflictAtt.slice(1)}.`); }
    if(b.selfStatus){ def.status[b.selfStatus]=true; pushLog(`${def.name} suffers ${b.selfStatus}.`); }
    if(b.selfDamage){ def.hp=Math.max(0,def.hp-b.selfDamage); pushLog(`${def.name} loses ${b.selfDamage} HP.`); }
    if(b.onBlockDraw){ for(let i=0;i<b.onBlockDraw;i++){ if(!D.deck.length&&D.discard.length)D.deck=shuffle(D.discard.splice(0)); if(D.deck.length)D.hand.push(D.deck.shift()); } pushLog(`${def.name} draws ${b.onBlockDraw} after blocking.`); }
    if(b.selfDiscardHand){ for(let i=0;i<b.selfDiscardHand;i++){ if(D.hand.length) D.discard.push(D.hand.splice(rnd(D.hand.length),1)[0]); } pushLog(`${def.name} discards ${b.selfDiscardHand} card from hand.`); }
    if(att.fe&&att.passive&&att.passive.blockerTear&&def.hp>0){ if(inflict(def,'tear')) pushLog(`Off With Their Heads! — ${def.name} is Torn for daring to block.`); }
    if(b.postDiscardBlk){ for(let i=0;i<b.postDiscardBlk;i++){ if(def.blkCharge.length) D.discard.push(def.blkCharge.shift()); } pushLog(`${def.name} discards a Block ABC.`); }
    if(b.selfCleanse){ cleanseNeg(def); pushLog(`${def.name} shrugs off its afflictions.`); }
  }
  if(failDouble){ pushLog(`${def.name}'s guard fails — incoming damage doubled!`); return finishAttack(0,false,dmg*2); }
  if(neg && deconOn()){ pushLog('Deconstruction inverts the Negate — incoming damage doubled!'); return finishAttack(0,false,dmg*2); }
  if(neg || amt>=dmg) atkCtx._fullBlock=true;
  if(b.forceSwitchSelf==='bench'){ const alt=D.team.map((c,i)=>({c,i})).filter(o=>o.i!==D.activeIdx&&o.c.hp>0); if(alt.length){ doSwitch(D, alt[0].i); pushLog(`${def.name} slips to Backstage.`); } }
  pushLog(`${def.name} blocks with ${b.n} (${neg?'all damage negated':'-'+amt}).`);
  finishAttack(neg?dmg:amt,neg);
}
function resolveDefense(useBlock){
  if(!atkCtx) return; S.defend=false;
  if(useBlock) doBlock(); else finishAttack(0,false);
}
function finishAttack(blocked,negated,forceNet){
  const {side,A,att,ab,D,dKey,def,dmg,pierce}=atkCtx;
  let net=(forceNet!=null)?forceNet:(negated?0:Math.max(0,dmg-(pierce?0:blocked)));
  if(def.status.hardcover && !pierce && !ab.ignoreDefBuffs && net>0 && !(def.fe&&def.passive&&def.passive.noDamageReduction)){ net=Math.max(0,net-10); pushLog(`${def.name}'s Hardcover reduces 10 damage.`); }
  if(def.fe&&def.passive&&def.passive.nakedVuln&&def.blkCharge.length===0&&net>0){ net+=def.passive.nakedVuln; pushLog(`${def.name} is exposed (no Block ABC) — +${def.passive.nakedVuln} damage.`); }
  if(ab.sacrifice && hasCrit(dKey,'feminist') && !symbolsOff() && net>30){ net=30; pushLog('Feminist Lens caps the Sacrifice attack at 30.'); }
  def.hp=Math.max(0,def.hp-net);
  pushLog(`${att.name} uses ${ab.n}: ${net} damage to ${def.name}. (${def.hp}/${def.maxHp} HP)`);
  if(pierce) pushLog(`${ab.n} pierced the defense!`);
  if(ab.sacrifice && !symbolsOff()){ att.hp=Math.max(0,att.hp-ab.sacrifice); pushLog(`${att.name} sacrifices ${ab.sacrifice} HP.`); }
  if(ab.stripBlocks && def.blkCharge.length){ const n=def.blkCharge.length; D.discard.push(...def.blkCharge.splice(0)); pushLog(`Quick-Sand Crash buries ${def.name}'s defense — ${n} Block ABC lost.`); }
  if(!symbolsOff()){
    if(ab.inflict && def.hp>0){ if(inflict(def,ab.inflict,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(ab.inflict)}.`); }
    if(atkCtx&&atkCtx.condInflict && def.hp>0){ if(inflict(def,atkCtx.condInflict,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(atkCtx.condInflict)}.`); }
    if(ab.inflictChoice && ab.inflictChoice.length && def.hp>0){ const opts=ab.inflictChoice; const pick=opts.find(s=>!def.status[s])||opts[rnd(opts.length)]; if(inflict(def,pick,ab.pierceLaminate)) pushLog(`${def.name} is afflicted with ${statusName(pick)}.`); }
    if(ab.stripPos && def.hp>0 && def.status[ab.stripPos]){ delete def.status[ab.stripPos]; pushLog(`${def.name} loses ${statusName(ab.stripPos)}.`); }
    if(atkCtx&&atkCtx.condFoeDiscard){ for(let i=0;i<atkCtx.condFoeDiscard;i++){ if(D.hand.length) D.discard.push(D.hand.splice(rnd(D.hand.length),1)[0]); } pushLog(`${who(D)} is forced to discard ${atkCtx.condFoeDiscard} card.`); }
    if(ab.grant){ grant(att,ab.grant); pushLog(`${att.name} gains ${ab.grant}.`); }
    if(ab.weaken!=null && def.hp>0){ def.status.weaken=ab.weaken; pushLog(`${def.name} is weakened — its next attack deals ${ab.weaken} less.`); }
    if(ab.selfStatus){ att.status[ab.selfStatus]=true; pushLog(`${att.name} suffers ${ab.selfStatus}.`); }
    if(ab.selfDamage){ att.hp=Math.max(0,att.hp-ab.selfDamage); pushLog(`${att.name} loses ${ab.selfDamage} HP.`); }
    if(ab.drawAfter){ drawN(side,ab.drawAfter); pushLog(`${who(A)} draws ${ab.drawAfter}.`); }
  }
  flash(dKey);
  if(negated || (blocked>0 && net<=0)){ fxBlock(dKey, negated?0:blocked); }
  else if(blocked>0){ fxBlock(dKey, blocked); fxDmgNum(dKey, net); }
  else if(net>0){ fxAttack(dKey, net); }
  // ---- crit thesis auto-tracking (events observable at combat resolution) ----
  A.critTurn=A.critTurn||{}; D.critTurn=D.critTurn||{}; A.critEver=A.critEver||{}; D.critEver=D.critEver||{};
  const koed = def.hp<=0;
  if(koed && ab.onKO && ab.onKO.selfStatus && att.hp>0){ att.status[ab.onKO.selfStatus]=true; pushLog(`${att.name} gains ${statusName(ab.onKO.selfStatus)}.`); }
  const noKeywords = !ab.flags && !ab.sacrifice && !ab.inflict && !ab.grant && ab.weaken==null && !pierce;
  const printedAtk = (ab.dmg!=null?ab.dmg:(ab.base!=null?ab.base:null));
  if(koed){
    if(ab.cost===1) A.critTurn.koCost1=true;                       // marxist
    if(noKeywords) A.critTurn.koPlain=true;                        // formalism
    if(printedAtk!=null && printedAtk<=20) A.critTurn.koLowAtk=true; // russian
  }
  if(negated || (blocked>0 && net<=0)) D.critEver.blockedToZero=true;             // feminist
  if(blocked>0 && !negated && dmg===blocked){ A.critEver.atkEqBlk=true; D.critEver.atkEqBlk=true; } // archetypal
  if(def.hp===10) D.critEver.survivedAt10=true;                    // ecocrit
  if(def.hp<=0 && att.fe&&att.passive&&att.passive.killWorsen){ A.flags.doubleTrivia=true; pushLog(`${att.name}'s guilt deepens — from now your attaches need two correct answers.`); }
  checkKO(D,dKey); checkKO(A,side);
  const wasOpp=(side==='opp');
  atkCtx=null; S.defend=false; busy=false; render();
  if(wasOpp && !S.over) endAiTurn();
}
function checkKO(p,side){
  const a=active(p);
  if(a && a.hp<=0){
    spawnKO(side, a.name);
    if(!p.grave.includes(a)) p.grave.push(a);
    const attacker=foeOf(side); attacker.kos++;
    pushLog(`${a.name} is knocked out!`);
    if(attacker.kos>=S.settings.koTarget){ S.over=true; S.winner=(attacker===S.you)?'you':'opp'; pushLog(`${who(attacker)} reached ${S.settings.koTarget} knockouts — match over!`); }
    const next=p.team.findIndex(c=>c.hp>0);
    if(next>=0){ doSwitch(p,next); pushLog(`${p.team[next].name} steps up.`); }
  }
  if(!p.team.some(c=>c.hp>0)){ S.over=true; if(!S.winner) S.winner=(side==='you')?'opp':'you'; pushLog(`${who(foeOf(side))} wins the match!`); }
  if(S.over) stopTurnTimer();
}

/* ---------------- AI ---------------- */
function aiTurn(){
  if(!S||S.over) return; busy=true; armAiWatch(); doDraw();
  setTimeout(()=>{
    if(!S||S.over){ busy=false; return; }
    const p=S.opp; let guard=0;
    // deploy a Critical Lens if the AI is holding one and has none active
    if(!p.crit){ const ci=p.hand.findIndex(c=>c.cat==='crit'); if(ci>=0) playCrit('opp',ci); }
    // bring a 1st Edition anchor Active when it makes sense (once/turn)
    if(!p.flags.swapped && !active(p).status.glue){ const a=active(p); const feIdx=p.team.findIndex((c,i)=>i!==p.activeIdx && c.fe && c.hp>0 && !c.status.rip && !(c.passive&&c.passive.benchCostAura)); if(feIdx>=0 && (!a.fe) && (a.hp<=a.maxHp*0.5)){ doSwitch(p,feIdx); p.flags.swapped=true; pushLog(`Opponent brings ${p.team[feIdx].name} (1st Edition) to the front.`); } }
    const step=()=>{
      if(!S||S.over){ busy=false; return; }
      const act=active(p);
      // play a supercharger if it has a ready attack
      const sc=p.hand.findIndex(c=>c.cat==='bookmark'&&c.effect==='supercharge');
      if(sc>=0 && act.atkCharge.length>=act.atk.cost && !p.flags.supercharge){ playBookmark('opp',sc); }
      const needAtk=act.atkCharge.length<=act.blkCharge.length;
      let pick=p.hand.findIndex(c=>c.cat==='abc' && (needAtk?c.type==='ATTACK':c.type==='BLOCK'));
      if(pick<0) pick=p.hand.findIndex(c=>c.cat==='abc');
      if(p.attachesLeft>0 && pick>=0 && guard<9){ guard++;
        const useFree=(p.flags.feFree||0)>0 && p.hand[pick] && p.hand[pick].cat==='abc'; if(useFree) p.flags.feFree--;
        const ok=useFree?true:(Math.random()<S.settings.aiAccuracy);
        attach('opp',pick,ok||!S.settings.triviaOn); setTimeout(step,400);
      } else {
        const heal=p.hand.findIndex(c=>c.cat==='bookmark'&&c.effect==='heal');
        if(act.hp<act.maxHp*0.4 && heal>=0) playBookmark('opp',heal);
        setTimeout(aiEngage,400);
      }
    }; step();
  },400);
}
function aiEngage(){
  if(!S||S.over){ busy=false; return; }
  S.phase='engage'; render();
  const p=S.opp, act=active(p);
  setTimeout(()=>{
    if(!S||S.over){ busy=false; return; }
    if(p.flags.truce){ p.flags.truce=false; pushLog('Opponent is under Truce — attack skipped.'); endAiTurn(); }
    else if(act.atkCharge.length>=act.atk.cost){ if(performAttack('opp','atk')===false){ pushLog('Opponent could not attack — passes.'); endAiTurn(); } }  // else finishAttack -> endAiTurn
    else { pushLog('Opponent has no charged attack — passes.'); endAiTurn(); }
  },500);
}
function armAiWatch(){ clearTimeout(aiWatch); aiWatch=setTimeout(function tick(){ if(!S||S.over||S.turn!=='opp') return; if(S.defend||S.pending){ aiWatch=setTimeout(tick,4000); return; } pushLog('Opponent stalled — safeguard ends the turn.'); busy=false; endAiTurn(); },9000); }
function endAiTurn(){ clearTimeout(aiWatch); setTimeout(()=>{ if(!S) return; busy=false; if(!S.over){ S.turn='you'; startTurn(); } },700); }

/* ---------------- trivia ---------------- */
function openTrivia(card,handIdx,targetUid){ busy=true; S.pending={card,handIdx,target:targetUid}; try{SFX.card('book_flip',0.7);}catch(e){} render(); }
function answerTrivia(choice){
  const pend=S.pending; if(!pend) return;
  const correct=choice===pend.card.ans; S.pending=null; busy=false;
  try{SFX.card(correct?'card_place':'card_shove',0.7);}catch(e){}
  toast(correct?'Correct! Card attached.':'Wrong — card discarded.', correct?'good':'bad');
  attach('you',pend.handIdx,correct,pend.target);
}

function render(){
  const root=$('#game'); if(!root) return;
  try{ if(APP.screen==='play'&&S){ SFX.contextTrack(S.scrim?((S.scrim.node&&S.scrim.node.boss)?'boss':'hiphop9'):null); } else { SFX.contextTrack(null); } }catch(e){}
  if(APP.screen==='play' && S){ document.body.setAttribute('data-screen','play'); sweepActiveBm(S.you); sweepActiveBm(S.opp); renderGame(root); return; }
  if(APP.screen==='scrim'){ document.body.setAttribute('data-screen','scrim'); document.body.setAttribute('data-scrimview',(SCRIM&&SCRIM.view)||''); root.innerHTML=scrimScreen(); scrimAfterRender&&scrimAfterRender(); return; }
  if(APP.screen==='builder'){ document.body.setAttribute('data-screen','builder'); root.innerHTML=builderScreen(); return; }
  document.body.setAttribute('data-screen','menu');
  document.body.setAttribute('data-menuscreen',APP.screen);
  if(APP.screen==='difficulty'){ root.innerHTML=difficultyScreen(); return; }
  if(APP.screen==='custom'){ root.innerHTML=customScreen(); return; }
  if(APP.screen==='tune'){ root.innerHTML=tuneScreen(); return; }
  if(APP.screen==='guide'){ root.innerHTML=guideScreen(); return; }
  root.innerHTML=menuScreen();
}

  return s||'<span class="pip none">—</span>';

function critChip(p,side){
  const c=p.crit; if(!c) return '<div class="lenschip empty"><span class="lc-none">No Lens active</span></div>';

  const canFulfill = side==='you' && S.turn==='you' && !S.over && !busy && (S.phase==='strategize'||S.phase==='engage');
  const met = (side==='you' && p.crit) ? thesisMet(side).ok : false;

function charTile(p,side){
  const ch=active(p); if(!ch) return '';
  const dead=ch.hp<=0, pct=Math.max(0,ch.hp/ch.maxHp*100);
  const canAct = side==='you' && S.turn==='you' && S.phase==='engage' && !S.over && !p.flags.attacked && !busy;
  const effCost = attackCostFor(side,ch.atk);
  const effPool = hasCrit(side,'queer') ? (ch.atkCharge.length+ch.blkCharge.length) : ch.atkCharge.length;
  const atkReady = effPool>=effCost;
  const port = ch.img

// Uniformly scale the board so both sides + controls always fit the play area (no overlap, no scroll)
function fitBoard(){
  const board=document.querySelector('body[data-screen="play"] .board');
  const inner=board&&board.querySelector('.board-inner');
  if(!board||!inner) return;
  if(window.matchMedia && window.matchMedia('(max-width:560px)').matches) { inner.style.transform=''; inner.style.width=''; return; } // pager mode scrolls by design
  inner.style.transform=''; inner.style.width='';
  const availH=board.clientHeight, availW=board.clientWidth;
  const needH=inner.scrollHeight, needW=inner.scrollWidth;
  if(!availH||!needH) return;
  const k=Math.min(1, availH/needH, availW/needW);
  if(k<0.999){
    inner.style.transformOrigin='top center';
    inner.style.transform=`scale(${k})`;
    inner.style.width=(100/k)+'%';           // let content keep its natural width, then shrink uniformly
    inner.style.marginLeft=((1-1/k)*50)+'%'; // recenter the widened box
  } else { inner.style.marginLeft=''; }
}
window.addEventListener('resize',()=>{ if(S&&APP.screen==='play'){ fitNames(); fitBoard(); } });

  for(let k=0;k<(diff.epic||0)&&epics.length;k++) out.push(pick(epics));

}

function _endDrag(){ if(_drag&&_drag.ghost&&_drag.ghost.parentNode) _drag.ghost.parentNode.removeChild(_drag.ghost); document.body.classList.remove('dragging-abc'); document.querySelectorAll('.drop-zone.dragover').forEach(el=>el.classList.remove('dragover')); _drag=null; }

  if(!_drag||_drag.pid!==e.pointerId) return;

    _drag.active=true;

  }

  if(_drag.ghost){ _drag.ghost.style.left=e.clientX+'px'; _drag.ghost.style.top=e.clientY+'px'; }
  document.querySelectorAll('.drop-zone.dragover').forEach(el=>el.classList.remove('dragover'));

  if(dz) dz.classList.add('dragover');
},{passive:false});
document.addEventListener('pointerup',e=>{
  if(!_drag||_drag.pid!==e.pointerId) return;
  if(_drag.active){
    e.preventDefault();
    const hit=document.elementFromPoint(e.clientX,e.clientY), dz=hit&&hit.closest('.drop-zone[data-charuid]');
    const idx=_drag.idx, uid=dz?dz.dataset.charuid:null;

});

  const ab=[]; for(let i=0;i<8 && i<DATA.abcs[dk].length;i++) ab.push({d:dk,i:i});
  const bm=[0,1,2,3,4].filter(i=>i<DATA.bookmarks.length);
  SCRIM.deck = { ab:ab, bm:bm, cr:[] };
  SCRIM.map = scrimGenMap();
  SCRIM.view='map'; render(); scrimSave();
}

/* ---- map generation (branching DAG, StS-style) ---- */
function scrimGenMap(){
  const N=6, cols=[];
  cols.push([{type:'start',done:true}]);
  for(let c=1;c<N-1;c++){ const rows=2+rnd(2); const arr=[]; for(let r=0;r<rows;r++) arr.push({type:scrimNodeType(c,N)}); cols.push(arr); }
  cols.push([{type:'boss',boss:(Math.random()<0.5?'sandroid':'dyefone')}]);
  for(let c=0;c<cols.length-1;c++){
    const nx=cols[c+1];
    cols[c].forEach(node=>{ node.next=[]; const k=1+rnd(Math.min(2,nx.length)); const idxs=shuffle(nx.map((_,i)=>i)).slice(0,k); node.next=idxs.sort((a,b)=>a-b); });
    const covered={}; cols[c].forEach(n=>n.next.forEach(i=>covered[i]=1));
    nx.forEach((_,i)=>{ if(!covered[i]){ const src=cols[c][rnd(cols[c].length)]; if(src.next.indexOf(i)<0){ src.next.push(i); src.next.sort((a,b)=>a-b); } } });
  }
  return { cols, pos:{c:0,r:0} };
}
function scrimNodeType(c,N){
  if(c===N-2) return Math.random()<0.6?'rest':'scrim';
  const roll=Math.random();
  if(c<=1) return roll<0.8?'scrim':'archives';
  if(roll<0.55) return 'scrim';
  if(roll<0.72) return 'archives';
  if(roll<0.85) return 'rest';
  return 'elite';
}
function scrimReachable(c,r){ const m=SCRIM.map; if(!m) return false; const cur=m.cols[m.pos.c][m.pos.r]; return c===m.pos.c+1 && cur.next && cur.next.indexOf(r)>=0 && !m.cols[c][r].done; }
function scrimAdvanceTo(c,r){ SCRIM.map.pos={c,r}; SCRIM.map.cols[c][r].done=true; SCRIM.cleared++; }

/* ---- deck / character builders for a run battle ---- */
function scrimPlayerShell(name,setKey,team,deck){ const ai=team.findIndex(c=>c.hp>0); return { name,setKey,team,activeIdx:ai>=0?ai:0,deck,hand:[],discard:[],grave:[],kos:0,attachesLeft:0,crit:null,critTurn:{},critEver:{},flags:{},activeBm:[],_lastDrawn:null }; }
function buildRunDeck(rd){ const deck=[];
  (rd.ab||[]).forEach((r,n)=>{ const a=DATA.abcs[r.d]&&DATA.abcs[r.d][r.i]; if(a) deck.push({cat:'abc',...clone(a),cid:'a'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.bm||[]).forEach((i,n)=>{ const b=DATA.bookmarks[i]; if(b) deck.push({cat:'bookmark',...clone(b),cid:'b'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.cr||[]).forEach((i,n)=>{ const c=DATA.crits[i]; if(c) deck.push({cat:'crit',...clone(c),cid:'c'+n+Math.random().toString(36).slice(2,5)}); });
  return deck; }
function buildScrimChar(rec){ let def; if(rec.fe) def=firstedById(rec.id); else def=(DATA.characters[rec.deck]||[]).find(c=>c.id===rec.id); if(!def) return null; const c=makeChar(def,1.0); if(rec.maxHp) c.maxHp=rec.maxHp; c.hp=Math.max(0,Math.min(rec.curHp!=null?rec.curHp:c.maxHp,c.maxHp)); c._scrimIdx=rec._i; return c; }
function scrimYouPlayer(){ const team=[]; SCRIM.team.forEach((rec,i)=>{ rec._i=i; const c=buildScrimChar(rec); if(c) team.push(c); }); const deck=shuffle(buildRunDeck(SCRIM.deck)); return scrimPlayerShell('You',SCRIM.kit,team,deck); }
function scrimNoHeal(bmIdxs){ return bmIdxs.filter(i=>!(DATA.bookmarks[i] && DATA.bookmarks[i].effect==='heal')); }
function scrimBossDeck(b){ const dk=b.deck||scrimRandomDeck(); const def=defaultDeck(dk); return { ab:def.ab.map(i=>({d:dk,i})).slice(0,16), bm:scrimNoHeal(def.bm).slice(0,8), cr:[] }; }
function scrimOppPlayer(node){
  if(node.boss){ const b=SCRIM_BOSSES[node.boss];
    const bc=makeChar({id:'boss_'+node.boss,name:b.name,hp:b.hp,accent:b.accent,img:'',tags:['villain'],atk:clone(b.atk),blk:clone(b.blk)},1.0); bc._boss=true; bc.sub=b.sub;
    return scrimPlayerShell(b.name,'boss',[bc],shuffle(buildRunDeck(scrimBossDeck(b)))); }
  const dk=node.oppDeck||scrimRandomDeck();
  const ids=shuffle(DATA.characters[dk].map(c=>c.id)).slice(0, node.type==='elite'?3:2);
  const depth=SCRIM.pending?SCRIM.pending.c:1;
  const scale=node.type==='elite'?0.95:Math.min(0.9,0.55+0.06*depth);
  const team=ids.map(id=>{ const c=makeChar(DATA.characters[dk].find(x=>x.id===id),1.0); c.maxHp=Math.max(20,Math.round(c.maxHp*scale/10)*10); c.hp=c.maxHp; return c; });
  const def=defaultDeck(dk);
  const rd={ ab:def.ab.map(i=>({d:dk,i})).slice(0,14), bm:scrimNoHeal(def.bm).slice(0,10), cr:node.type==='elite'?def.cr.slice(0,2):[] };
  return scrimPlayerShell('Opponent',dk,team,shuffle(buildRunDeck(rd)));
}

/* ---- launch a battle node ---- */
function scrimStartBattle(node){
  stopTurnTimer();
  const st=clone(APP.settings); st.koTarget=99; st.hpScale=1.0;
  st.aiAccuracy = node.boss?SCRIM_BOSSES[node.boss].acc:(node.type==='elite'?0.9:0.72);

  st.handSize = (DEFAULTS.handSize||5) + (scrimHas('librarycard')?1:0);

  S = { settings:clone(st), turn:'you', phase:'deal', over:false, winner:null, pending:null, defend:false, picker:null, viewPile:null, poison:0, _logopen:false, _settings:false, fxShuffle:false,
        you, opp, log:[], scrim:{ node, ruleShift: node.boss?SCRIM_BOSSES[node.boss].ruleShift:null, rosettaUsed:false } };
  APP.screen='play';
  pushLog(node.boss?('\u26a0 ALGORITHM CORE \u2014 '+SCRIM_BOSSES[node.boss].name+'!'):(node.type==='elite'?'\ud83c\udf93 Thesis Defense \u2014 an elite fight!':'\u2694 A Scrimmage begins.'));
  if(S.scrim.ruleShift){ const b=SCRIM_BOSSES[node.boss]; pushLog('Global Rule Shift \u2014 '+b.shiftName+': '+b.shiftText); }

}

/* ---- battle resolution back into the run ---- */
function scrimOverModal(){

function scrimGrantArtifact(){
  const avail=Object.keys(SCRIM_ART).filter(id=>SCRIM.artifacts.indexOf(id)<0);
  if(!avail.length) return null;
  const id=avail[rnd(avail.length)]; SCRIM.artifacts.push(id);
  if(id==='spine'){ SCRIM.team.forEach(rec=>{ rec.maxHp=(rec.maxHp||0)+15; if(rec.curHp>0) rec.curHp=Math.min(rec.maxHp, rec.curHp+15); }); }
  return id;
}
function scrimEndRun(victory){
  const gained = SCRIM.cleared*5 + (victory?60:0);
  META.ip=(META.ip||0)+gained; metaSave();
  SCRIM._lastIP=gained; SCRIM._victory=victory;
  SCRIM.active=false; scrimClearSave();
  S=null; stopTurnTimer(); APP.screen='scrim'; SCRIM.view='dead'; render();
}
function scrimRollDraft(n){ const out=[]; const decks=Object.keys(DATA.characters);
  for(let k=0;k<n;k++){ const roll=Math.random();
    if(roll<0.6){ const d=decks[rnd(decks.length)]; out.push({t:'ab',d,i:rnd(DATA.abcs[d].length)}); }
    else if(roll<0.85){ out.push({t:'bm',i:rnd(DATA.bookmarks.length)}); }
    else { out.push({t:'cr',i:rnd(DATA.crits.length)}); } }
  return out; }
function scrimDraftCard(ref){ if(ref.t==='ab') return DATA.abcs[ref.d][ref.i]; if(ref.t==='bm') return DATA.bookmarks[ref.i]; return DATA.crits[ref.i]; }

/* ---- action router ---- */
function handleScrim(cmd){
  const [op,a,b]=cmd.split(':');
  if(op==='back'){ stopTurnTimer(); APP.screen='menu'; APP.mode=null; render(); return; }
  if(op==='new'){ SCRIM.view='kit'; render(); return; }
  if(op==='kit'){ scrimStartKit(a); return; }
  if(op==='resume'){ if(scrimLoadSave()){ APP.mode='scrim'; APP.screen='scrim'; render(); } else toast('No saved run found.'); return; }
  if(op==='shop'){ SCRIM.view='shop'; render(); return; }
  if(op==='tomap'){ SCRIM.view='map'; render(); return; }
  if(op==='endrun'){ SCRIM.view='intro'; APP.screen='scrim'; render(); return; }
  if(op==='node'){ const c=+a, r=+b; if(!scrimReachable(c,r)){ toast('That node is not reachable yet.'); return; } scrimResolveNode(c,r); return; }
  if(op==='rest'){ const cur=S===null?null:null; // rest resolves on run team
    if(a==='heal1'){ const alive=SCRIM.team.filter(t=>t.curHp>0); if(alive.length){ let t=alive.sort((x,y)=>(x.curHp/x.maxHp)-(y.curHp/y.maxHp))[0]; t.curHp=t.maxHp; } }
    else if(a==='healall'){ SCRIM.team.forEach(t=>{ if(t.curHp>0) t.curHp=Math.min(t.maxHp,t.curHp+20); }); }
    else if(a==='revive'){ const dead=SCRIM.team.filter(t=>t.curHp<=0); if(dead.length){ dead[0].curHp=Math.round(dead[0].maxHp*0.5); } }
    SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='draftpick'){ try{SFX.card('pack_take',0.75);}catch(e){} const k=+a; const ref=SCRIM.draft&&SCRIM.draft[k]; if(ref){ if(ref.t==='ab') SCRIM.deck.ab.push({d:ref.d,i:ref.i}); else if(ref.t==='bm') SCRIM.deck.bm.push(ref.i); else SCRIM.deck.cr.push(ref.i); } SCRIM.draft=null; SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='draftskip'){ SCRIM.draft=null; SCRIM.view='map'; render(); scrimSave(); return; }
  if(op==='vault'){ scrimBuyUnlock(a); return; }
  if(op==='rosetta'){ if(S&&S.pending&&S.scrim&&!S.scrim.rosettaUsed){ const type=S.pending.card.type; const decks=Object.keys(DATA.abcs); let pick=null,g=0; while(!pick&&g++<40){ const d=decks[rnd(decks.length)]; const x=DATA.abcs[d][rnd(DATA.abcs[d].length)]; if(x&&x.type===type) pick=x; } if(pick){ const c=S.pending.card; c.q=pick.q; c.opts=pick.opts.slice(); c.ans=pick.ans; S.scrim.rosettaUsed=true; pushLog('Rosetta Stone \u2014 the question is swapped.'); render(); } } return; }
  if(op==='afterbattle'){ scrimAfterBattle(); return; }
}
function scrimResolveNode(c,r){
  const node=SCRIM.map.cols[c][r]; SCRIM.pending={c,r};
  if(node.type==='scrim'||node.type==='elite'||node.type==='boss'){ scrimStartBattle(node); }
  else if(node.type==='archives'){ scrimAdvanceTo(c,r); SCRIM.pending=null; SCRIM.draft=scrimRollDraft(3); SCRIM.view='archives'; try{SFX.card('pack_open',0.7);}catch(e){} render(); scrimSave(); }
  else if(node.type==='rest'){ scrimAdvanceTo(c,r); SCRIM.pending=null; SCRIM.view='rest'; render(); scrimSave(); }
}
function scrimAfterBattle(){
  if(!S) { SCRIM.view='map'; render(); return; }
  S.you.team.forEach(c=>{ if(c._scrimIdx!=null && SCRIM.team[c._scrimIdx]) SCRIM.team[c._scrimIdx].curHp=Math.max(0,c.hp); });
  const won = !S.opp.team.some(x=>x.hp>0);
  const node=S.scrim.node;
  if(!won){ scrimEndRun(false); return; }
  if(SCRIM.pending){ scrimAdvanceTo(SCRIM.pending.c,SCRIM.pending.r); }
  let art=null;
  if(node.type==='elite'||node.boss) art=scrimGrantArtifact();
  SCRIM._gainedArt=art;
  if(node.boss){ S=null; scrimEndRun(true); return; }
  S=null; stopTurnTimer(); APP.screen='scrim';
  SCRIM.pending=null; SCRIM.draft=scrimRollDraft(3); SCRIM.view='reward'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave();
}
function scrimBuyUnlock(id){
  const U={ hp:{cost:40,name:'Hardy Scholars (+10 starting Max HP)'}, kit:{cost:60,name:'Extra kit slot (cosmetic)'} };
  const u=U[id]; if(!u) return;
  if((META.ip||0)<u.cost){ toast('Not enough Intellect Points.'); return; }
  if(META.unlocks.indexOf(id)>=0){ toast('Already unlocked.'); return; }
  META.ip-=u.cost; META.unlocks.push(id); metaSave(); toast('Unlocked: '+u.name); render();
}

function scrimDrawConnectors(){

      const ra=a.getBoundingClientRect(), rb=bnode.getBoundingClientRect();
      const x1=ra.left+ra.width/2-wrap.left, y1=ra.top+ra.height/2-wrap.top, x2=rb.left+rb.width/2-wrap.left, y2=rb.top+rb.height/2-wrap.top;

    }); });
  });

    if(ref.t==='ab') inner=`<div class="dc-top ${card.type.toLowerCase()}">${card.type==='ATTACK'?'\u2694 ATTACK':'\u26ca BLOCK'} \u00b7 pw ${card.power}</div><div class="dc-q">${card.q}</div>`;
    else if(ref.t==='bm') inner=`<div class="dc-top bmk">\u2726 ${card.kind}</div><div class="dc-nm">${card.name}</div><div class="dc-tx">${card.text}</div>`;
    else inner=`<div class="dc-top crt">\u25c6 CRIT LENS</div><div class="dc-nm">${card.name}</div><div class="dc-tx">${card.passive||''}</div>`;
    return `<button class="draft-card" data-scrim="draftpick:${k}">${inner}<div class="dc-add">Add to deck \u203a</div></button>`;
  }).join('');
  return `<div class="scrim-wrap scrim-ink"><div class="scrim-panel">
    <div class="scrim-title sm">${isArch?'\ud83d\udcda Study Break':'Victory \u2014 spoils of the scrimmage'}</div>
    ${artLine}
    <p class="scrim-intro-copy">Choose one card to add permanently to your run deck.</p>
    <div class="draft-grid">${cards}</div>
    <button class="toolbtn" data-scrim="draftskip">Skip \u2014 take nothing</button>
  </div></div>`;
}
function scrimRestScreen(){
  const dead=SCRIM.team.some(t=>t.curHp<=0);
  return `<div class="scrim-wrap scrim-ink"><div class="scrim-panel">
    <div class="scrim-title sm">\u2615 Coffee Break</div>
    <p class="scrim-intro-copy">A quiet corner of the library. Recover before pressing on.</p>
    <div class="hud-team rest-team">${scrimTeamStrip()}</div>
    <div class="rest-opts">
      <button class="rest-opt" data-scrim="rest:heal1">\u2764 Fully heal one character</button>
      <button class="rest-opt" data-scrim="rest:healall">\u271a Restore 20 HP to everyone</button>
      ${dead?`<button class="rest-opt" data-scrim="rest:revive">\u26a1 Revive a fallen character (50% HP)</button>`:''}
    </div>
  </div></div>`;
}
function scrimShopScreen(){
  const U=[['hp',40,'Hardy Scholars','+10 starting Max HP for future runs'],['kit',60,'Curriculum Expansion','A cosmetic nod \u2014 more kits coming soon']];
  const rows=U.map(([id,cost,nm,tx])=>{ const owned=META.unlocks.indexOf(id)>=0; return `<div class="vault-row"><div class="vault-nm">${nm}<small>${tx}</small></div><button class="vault-buy ${owned?'owned':''}" ${owned?'disabled':`data-scrim="vault:${id}"`}>${owned?'Owned':cost+' IP'}</button></div>`; }).join('');
  return `<div class="scrim-wrap scrim-ink"><div class="scrim-panel">
    <button class="toolbtn scrim-back" data-scrim="endrun">\u2039 Back</button>
    <div class="scrim-title sm">\ud83c\udfdb The Vault</div>
    <div class="scrim-ipline">\ud83e\udde0 Intellect Points: <b>${META.ip||0}</b></div>
    <div class="vault-list">${rows}</div>
  </div></div>`;
}
function scrimDeadScreen(){
  const v=SCRIM._victory;
  return `<div class="scrim-wrap scrim-ink"><div class="scrim-panel">
    <div class="scrim-title ${v?'':'sm'}">${v?'\ud83c\udfc6 Sector Purged!':'The Library Falls'}</div>
    <p class="scrim-intro-copy">${v?'You defeated the Algorithm Core and reclaimed a sector of the Library of Mind.':'Your characters were overwhelmed by the noise. But knowledge endures.'}</p>
    <div class="scrim-ipline">Intellect Points earned: <b>+${SCRIM._lastIP||0}</b> \u00b7 Total \ud83e\udde0 ${META.ip||0}</div>
    <div class="scrim-menu">
      <button class="bigbtn" data-scrim="new">\u2694 New Run</button>
      <button class="toolbtn" data-scrim="endrun">\u2039 Scrimmage menu</button>
      <button class="toolbtn" data-scrim="back">Main menu</button>
    </div>
  </div></div>`;
}
