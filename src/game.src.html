  }
  def.ed=def.ed||{}; Object.keys(def.ed).forEach(id=>{ if(def.ed[id]&&!edCharFor(k,id)) delete def.ed[id]; });
  def.edab=(def.edab||[]).filter(cid=>edHas(cid)&&edAbcByCid(k,cid)).filter((c,i,a)=>a.indexOf(c)===i);
  def.edbm=def.edbm||{}; Object.keys(def.edbm).forEach(cid=>{ if(!(edHas(cid)&&edBmByCid(k,cid))) delete def.edbm[cid]; });

}
function fillGaps(def){
  const k=def.d;
  const allCh=poolCh(k);
  while(def.ch.length<LIMITS.ch){ const miss=allCh.filter(id=>!def.ch.includes(id)); if(!miss.length) break; def.ch.push(miss[rnd(miss.length)]); }
  const allAb=poolAb(k);
  while(def.ab.length<LIMITS.ab){ const miss=allAb.filter(i=>!def.ab.includes(i)); if(!miss.length) break; def.ab.push(miss[rnd(miss.length)]); }
  const allCr=poolCr();
  while(def.cr.length<LIMITS.cr){ const miss=allCr.filter(i=>!def.cr.includes(i)); if(!miss.length) break; def.cr.push(miss[rnd(miss.length)]); }
  const slots=poolBmSlots();
  while(def.bm.length<LIMITS.bm){
    const used={}; def.bm.forEach(i=>used[i]=(used[i]||0)+1);
    const avail=slots.filter(i=>(used[i]||0)<bmOwned(i));
    const fresh=avail.filter(i=>!(used[i]>0));
    const pick=(fresh.length?fresh:avail);
    if(!pick.length) break;
    def.bm.push(pick[rnd(pick.length)]);
  }

}
function makeDeck(def){
  const deck=[];

  def.bm.forEach((i,n)=>{ const b=DATA.bookmarks[i]; if(b) deck.push({cat:'bookmark',...clone(b),cid:'b'+i+'_'+n+Math.random().toString(36).slice(2,5)}); });
  def.cr.forEach((i,n)=>{ const c=DATA.crits[i]; if(c) deck.push({cat:'crit',...clone(c),cid:'c'+i+'_'+n+Math.random().toString(36).slice(2,5)}); });
  (def.edab||[]).forEach((cid,n)=>{ const a=edAbcByCid(def.d,cid); if(a) deck.push({cat:'abc',...clone(a),cid:'ea'+n+Math.random().toString(36).slice(2,5)}); });

function encodeDeck(def){
  try{ const j=JSON.stringify({d:def.d,ch:def.ch,ab:def.ab,bm:def.bm,cr:def.cr,fe:def.fe||[]});
    return 'ABC-'+window.btoa(unescape(encodeURIComponent(j))).replace(/=+$/,''); }

}
function decodeDeck(code){
  try{
    let s=(code||'').trim(); if(s.startsWith('ABC-')) s=s.slice(4);
    s=s.replace(/\s+/g,''); while(s.length%4) s+='=';
    const o=JSON.parse(decodeURIComponent(escape(window.atob(s))));
    if(!o||!o.d||!DATA.characters[o.d]) return null;
    return clampDeck({d:o.d,ch:o.ch||[],ab:o.ab||[],bm:o.bm||[],cr:o.cr||[],fe:o.fe||[]});
  }catch(e){ return null; }
}

/* ---------------- crit-card (Critical Lens) engine ---------------- */
function critFx(side){ const c=S[side]&&S[side].crit; return c?c.fx:null; }

function attackCostFor(side,ab){

  const P=S[side]; if(P){ const act=active(P);
    if(act&&act.fe&&act.passive&&act.passive.costMod) cost+=act.passive.costMod;

function playCrit(side,idx){

function thesisMet(side){

    case 'newhist': ok=!!(act&&((act.atkCharge&&act.atkCharge.length>=3)||(act.blkCharge&&act.blkCharge.length>=3))); break; // 3 matching charged
    case 'queer': ok=!!ct.queerMismatch; break;                                          // paid with mismatched colour
    case 'structuralism': ok=!!(ct.atk&&ct.blk&&ct.bm); break;                           // ⚔ + ⛊ + Bookmark this phase
    case 'reader': ok=(ct.readerStreak||0)>=2; break;                                    // 2 named-type in a row

function fulfillThesis(side){

    case 'archetypal': { const lim=S.settings.handSize; while(P.hand.length<lim && (P.deck.length||P.discard.length)){ if(!P.deck.length){P.deck=shuffle(P.discard.splice(0));} P.hand.push(P.deck.shift()); } break; }
    case 'feminist': case 'psycho': { if(opp.hand.length){ opp.discard.push(opp.hand.splice(rnd(opp.hand.length),1)[0]); pushLog(`${who(opp)} discards a card.`);} break; }

    case 'queer': if(act){ const b0=act.hp; act.hp=act.maxHp; fxHeal(sideOfChar(act),act.hp-b0); pushLog(`${act.name} fully healed.`);} break;
    case 'structuralism': opp.flags.noBookmarks=true; pushLog(`${who(opp)} cannot use Bookmarks next turn.`); break;

function attach(side,handIdx,correct,targetUid){

/* ---------------- status effects (Tear, Rip, Glue, Spill, Smudge, Burn / Highlight, Laminate, Hardcover, Margin Notes) ---------------- */
const STATUS_NEG=['tear','rip','glue','spill','smudge','burn'];
const LAMINATE_BLOCKS=['tear','rip','glue','spill'];
function inflict(t,k,ignoreLam){
  if(!t||t.hp<=0) return false;
  if(t._overlord && (k==='rip'||k==='smudge'||k==='burn'||k==='spill'||k==='glue') && Math.random()<0.5){ pushLog(`${t.name} resists ${statusName(k)} — the overload shrugs it off.`); return false; }
  if(t.wardNext && t.wardNext.includes(k)){ t.wardNext=null; pushLog(`${t.name} shrugs off ${statusName(k)} — shielded.`); return false; }
  if(!ignoreLam && t.status.laminate && LAMINATE_BLOCKS.includes(k)){ pushLog(`${t.name} is Laminated — ${k.charAt(0).toUpperCase()+k.slice(1)} prevented.`); return false; }
  t.status[k]=true; fxStatus(sideOfChar(t),statusName(k),'neg'); return true;
}
function grant(t,k){ if(t&&t.fe&&t.passive&&t.passive.immuneSelfBuff){ pushLog(`${t.name} is too isolated to gain ${statusName(k)}.`); return false; } if(t&&t.hp>0){ t.status[k]=true; fxStatus(sideOfChar(t),statusName(k),'pos'); return true; } return false; }
function cleanseNeg(t){ if(!t) return; ['tear','rip','glue','burn','_smudgeHalf','costUp'].forEach(k=>{ delete t.status[k]; }); if(!t.status._spillLock){ delete t.status.spill; delete t.status.spillAmt; } if(!t.status._smudgeLock){ delete t.status.smudge; } }
function clearAllStatus(t){ if(t) t.status={}; }
function statusLabel(c){
  const order=[['burn','🔥'],['spill','💧'],['tear','✂'],['rip','⊘'],['glue','🩹'],['smudge','▒'],['laminate','◈'],['highlight','✶'],['hardcover','▣'],['marginNotes','✎'],['rip','⊘']];
  let out=''; const seen={};
  order.forEach(([k,g])=>{ if(c.status[k]&&!seen[k]){ seen[k]=1; out+=g; } });
  return out;
}

/* ---------------- conditional effect evaluator (cross-character "if X in play / KO'd") ---------------- */
function aliveOn(pl,id){ return pl && pl.team.some(c=>c.id===id && c.hp>0); }
function koAnywhere(id){ return ['you','opp'].some(k=>S[k].grave.some(c=>c.id===id)); }
function condMatch(rule, own, other, otherChar){
  const ids=rule.ids||[];
  if(rule.test==='inPlay'){
    const f=id=> rule.scope==='foe'?aliveOn(other,id) : rule.scope==='either'?(aliveOn(own,id)||aliveOn(other,id)) : aliveOn(own,id);
    return rule.all? ids.every(f) : ids.some(f);
  }
  if(rule.test==='ko') return ids.some(koAnywhere);
  if(rule.test==='pileCount'){ const pl=(rule.scope==='foe')?other:own; return pl && ((pl.discard?pl.discard.length:0)+(pl.grave?pl.grave.length:0))>=(rule.n||0); }
  if(rule.test==='defenderIs' || rule.test==='attackerIs') return otherChar && ids.includes(otherChar.id);
  if(rule.test==='defenderHasStatus') return !!(otherChar && (rule.status? otherChar.status[rule.status] : STATUS_NEG.some(x=>otherChar.status[x])));
  if(rule.test==='selfHasStatus'){ const a=active(own); return !!(a && a.status[rule.status]); }
  if(rule.test==='selfHpBelow'){ const a=active(own); return !!(a && a.hp < (rule.n||0)); }
  if(rule.test==='incomingCostGTE'){ return !!(atkCtx && atkCtx.ab && (atkCtx.ab.cost||0) >= (rule.n||0)); }
  if(rule.test==='attackerDeckIn'){ return !!(other && (rule.decks||[]).includes(other.setKey)); }
  return false;
}

/* ---------------- target picker ---------------- */
function askPick(title,options,cb){ S.picker={title,options}; pickCb=cb; busy=true; render(); }
function resolvePick(val){ const cb=pickCb; S.picker=null; pickCb=null; busy=false; if(cb) cb(val); render(); }

/* ---------------- damage ---------------- */
function calcDamage(ch,ab){
  let d=ab.dmg||0;
  if(ab.dmgType==='perTurn') d=(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay);
  else if(ab.dmgType==='perABC') d=(ab.step||10)*ch.atkCharge.length;
  return Math.max(0,Math.round(d));
}
function calcBlock(ch,ab,incoming){
  if(!ab) return {amt:0};
  if(typeof symbolsOff==='function' && symbolsOff()) return {amt:ab.block||0};
  if(ab.blockType==='negate') return {amt:incoming,negate:true};
  if(ab.blockType==='capto') return {amt:Math.max(0,incoming-(ab.cap||10))};
  if(ab.blockType==='perTurn') return {amt:(ab.base||0)+(ab.step||10)*Math.max(1,ch.turnsInPlay)};
  return {amt:ab.block||0};
}
function spend(charge,n){ const out=[]; for(let i=0;i<n&&charge.length;i++) out.push(charge.shift()); return out; }

/* ---------------- 1st Edition (Commander) passive engine ---------------- */
function feOnField(p){ return p?p.team.filter(c=>c.fe&&c.hp>0):[]; }
function pHasPassive(p,flag){ return feOnField(p).some(c=>c.passive&&c.passive[flag]); }
function pPassiveChar(p,flag){ return feOnField(p).find(c=>c.passive&&c.passive[flag])||null; }
function isSoloAlive(p){ return p.team.filter(c=>c.hp>0).length<=1; }
function doSwitch(p, newIdx, opts){
  opts=opts||{}; const oldIdx=p.activeIdx; if(newIdx==null||newIdx===oldIdx) return;
  const leaving=p.team[oldIdx]; p.activeIdx=newIdx; const entering=p.team[newIdx];
  if(leaving && leaving.status && leaving.status.rip){ delete leaving.status.rip; if(!opts.silent) pushLog(`${leaving.name} leaves the front line — its Rip mends.`); }
  if(leaving && leaving._tatamiTransfer && leaving.status && leaving.status.smudge && entering && entering.hp>0){ delete leaving.status.smudge; delete leaving._tatamiTransfer; inflict(entering,'smudge'); entering._tatamiTransfer=true; if(!opts.silent) pushLog(`The bloodstain spreads — ${entering.name} is Smudged as ${leaving.name} withdraws.`); }
  if(!opts.silent && leaving&&leaving.hp>0&&leaving.fe&&leaving.passive&&leaving.passive.onSwitchInflict&&entering&&entering.hp>0){
    if(inflict(entering, leaving.passive.onSwitchInflict)) pushLog(`${leaving.name} steps aside — ${entering.name} is ${statusName(leaving.passive.onSwitchInflict)}.`);
  }
  if(entering&&entering.fe&&entering.passive){
    if(entering.passive.forcedActiveSelfRip && entering.hp>0){ entering.status.rip=true; pushLog(`${entering.name} is forced Active — Ripped (attack disabled).`); }
    if(entering.passive.forcedActiveStripBlocks){ p.team.forEach(c=>{ delete c.status.hardcover; delete c.status.laminate; delete c.status.ironcurtain; }); pushLog('The curtain falls — active defensive buffs are stripped.'); }
  }
}
function performAttack(side,abilKey){           // == beginAttack

  if(cost!=null && pool()<cost){ toast(`Need ${cost} ATTACK ABCs (have ${pool()}).`); return false; }
  const D=foeOf(side), dKey=(D===S.you?'you':'opp'), def=active(D);
  if(!def||def.hp<=0){ toast('No target.'); return false; }
  if(ab.cleanseAlly){ const ally=A.team.find(c=>c.hp>0 && c.status[ab.cleanseAlly]); if(ally){ delete ally.status[ab.cleanseAlly]; pushLog(`${att.name} clears ${statusName(ab.cleanseAlly)} from ${ally.name}.`); } }
  let dmg=calcDamage(att,ab);
  { const _neg=['rip','smudge','burn','spill','glue','tear','weaken']; const _hasNeg=(c)=>c&&c.status&&_neg.some(k=>c.status[k]); const _dbl=_hasNeg(att)||_hasNeg(def);
    if(att.passive&&att.passive.id==='dangerlove') dmg+=_dbl?20:10;
    if(def&&def.passive&&def.passive.id==='dangerlove') dmg+=_dbl?40:20; }
  if(hasCrit(side,'russian')){ dmg=att.hp; pushLog(`Russian Formalism: ${att.name}'s damage equals its HP (${dmg}).`); }

  if(ab.cond){ ab.cond.forEach(r=>{ if(condMatch(r,A,D,def)){ const t=r.then||{}; if(t.dmgSet!=null)dmg=t.dmgSet; if(t.dmgAdd)dmg+=t.dmgAdd; if(t.dmgMult)dmg=Math.round(dmg*t.dmgMult); if(t.pierce)condPierce=true; if(t.inflict)condInflict=t.inflict; if(t.foeDiscard)condFoeDiscard+=t.foeDiscard; if(r.log)pushLog(r.log); } }); }
  // 1E passive & ability damage
  if(att.fe&&att.passive&&att.passive.soloBonus&&isSoloAlive(A)){ dmg+=att.passive.soloBonus; pushLog(`${att.name} stands alone — +${att.passive.soloBonus} damage.`); }
  if(att.fe&&att.passive&&att.passive.statusDmgBonus&&STATUS_NEG.some(x=>def.status[x])){ dmg+=att.passive.statusDmgBonus; pushLog(`${att.name}: +${att.passive.statusDmgBonus} against an afflicted target.`); }
  if(ab.bmDiscardBonus){ const n=(A.discard||[]).filter(c=>c.cat==='bookmark').length; const add=Math.min(ab.bmDiscardCap||9999, ab.bmDiscardBonus*n); if(add>0){ dmg+=add; pushLog(`${ab.n}: +${add} from ${n} Bookmark(s) in the discard.`); } }
  if(ab.guessTopFoe){ const top=D.deck[0]; const types=['ATTACK','BLOCK','BOOKMARK']; const guess=types[rnd(3)]; const actual=top?(top.cat==='abc'?top.type:'BOOKMARK'):null; if(actual&&guess===actual){ dmg+=ab.guessTopFoe.bonus||0; if(ab.guessTopFoe.inflict)condInflict=ab.guessTopFoe.inflict; pushLog(`The Mousetrap calls ${guess} — correct! +${ab.guessTopFoe.bonus} and Tear.`); } else pushLog(`The Mousetrap calls ${guess} — wrong.`); }
  if(ab.condPierceVillain && (def.tags||[]).includes('villain')){ condPierce=true; pushLog(`${ab.n} sees through the monstrous nature — Pierce.`); }

  if(ab.selfDiscardAtk){ for(let i=0;i<ab.selfDiscardAtk;i++){ if(att.atkCharge.length) A.discard.push(att.atkCharge.shift()); } pushLog(`${att.name} discards ${ab.selfDiscardAtk} Attack ABC.`); }

  if(S.scrim && side==='you' && scrimHas('honorary')){ dmg=Math.round(dmg*1.15); }

  if(att.status.highlight){ dmg+=20; delete att.status.highlight; pushLog(`${att.name} is Highlighted — +20 damage.`); }

window.AI_PROFILES={

  honorroll:    {name:'Honor Roll',      bm:['heal','boost','support'],                 commit:false, lethal:true,  cleanse:true,  retreat:false, inflictChance:0.35},

/* the game's own taxonomy -> AI roles */
window.BM_CLEANSE=['maskingtape','restoration','completerewrite','proofread'];
window.BM_HEAL=['heal','defib','revised'];
function aiProfile(){
  var d=(APP && APP.diff) || (S && S.settings && S.settings.diffKey) || 'honorroll';
  return window.AI_PROFILES[d] || window.AI_PROFILES.honorroll;
}
function bmRole(c){
  if(!c || c.cat!=='bookmark') return null;
  var e=c.effect, k=(c.kind||'').toLowerCase();
  if(window.BM_CLEANSE.indexOf(e)>=0) return 'cleanse';
  if(window.BM_HEAL.indexOf(e)>=0) return 'heal';
  if(k==='status') return 'status';
  if(k==='boost') return 'boost';
  if(k==='support') return 'support';
  if(k==='item') return 'item';
  if(k==='reset') return 'reset';
  return 'utility';
}
/* pick ONE bookmark to play, by priority, given the board */
function aiPickBookmark(p, prof){
  var act=active(p), foe=S.you, fa=active(foe);
  var hand=p.hand.map(function(c,i){return {c:c,i:i,role:bmRole(c)};}).filter(function(o){return o.role;});
  if(!hand.length) return -1;
  var allow=function(role){ return prof.bm.indexOf(role)>=0 || role==='cleanse'&&prof.cleanse; };
  var find=function(role,test){
    for(var j=0;j<hand.length;j++){
      var o=hand[j];
      if(o.role!==role) continue;
      if(!allow(role) && !(role==='cleanse'&&prof.cleanse)) continue;
      if(test && !test(o.c)) continue;
      return o.i;
    }
    return -1;
  };
  var hurt=act.hp<act.maxHp*0.45;
  var statused=Object.keys(act.status||{}).some(function(k){return ['tear','rip','glue','burn','spill','smudge'].indexOf(k)>=0;});
  var ready=act.atkCharge.length>=act.atk.cost;
  var i;
  /* 1. clear a crippling status (Rip disables the attack entirely) */
  if(prof.cleanse && statused){ i=find('cleanse'); if(i>=0) return i; }
  /* 2. survive */
  if(hurt){ i=find('heal'); if(i>=0) return i; }
  /* 3. about to swing -> buff it */
  if(ready){ i=find('boost'); if(i>=0) return i;
             i=find('item', function(c){return c.effect==='supercharge';}); if(i>=0) return i; }
  /* 4. pressure the player with a status */
  if(fa && fa.hp>0 && Math.random()<prof.inflictChance){ i=find('status'); if(i>=0) return i; }
  /* 5. the player is charged and dangerous -> defend */
  var foeReady=fa && fa.atkCharge && fa.atkCharge.length>=fa.atk.cost;
  if(foeReady){ i=find('support'); if(i>=0) return i; }
  /* 6. value / tempo */
  i=find('item'); if(i>=0) return i;
  i=find('utility'); if(i>=0) return i;
  i=find('reset'); if(i>=0) return i;
  return -1;
}
/* would this attack finish the enemy Active? */
function aiLethal(p){
  var act=active(p), fa=active(S.you); if(!act||!fa) return false;
  if(act.atkCharge.length < act.atk.cost) return false;
  var dmg=(act.atk.dmg||0) + (fa.status && fa.status.tear ? 10 : 0);
  return dmg >= fa.hp;

function aiTurn(){
  if(!S||S.over) return; busy=true; armAiWatch();
  if(active(S.opp)&&active(S.opp)._overlord){ overlordTurn(); return; }
  const _b=active(S.opp);

  }

      }
    }
    const step=()=>{
      if(!S||S.over){ busy=false; return; }
      const act=active(p);

      const bi=aiPickBookmark(p, prof);
      if(bi>=0 && (p.flags.bmCount||0)<2){ try{ playBookmark('opp',bi); }catch(e){} }
      // ---- CHARGE PLAN ----

      const needAtk = prof.commit
        ? (act.atkCharge.length < act.atk.cost)
        : (act.atkCharge.length <= act.blkCharge.length);
      let pick=p.hand.findIndex(c=>c.cat==='abc' && (needAtk?c.type==='ATTACK':c.type==='BLOCK'));
      if(pick<0) pick=p.hand.findIndex(c=>c.cat==='abc');
      if(p.attachesLeft>0 && pick>=0 && guard<9){ guard++;
        const useFree=(p.flags.feFree||0)>0 && p.hand[pick] && p.hand[pick].cat==='abc'; if(useFree) p.flags.feFree--;
        const ok=useFree?true:(Math.random()<S.settings.aiAccuracy);
        attach('opp',pick,ok||!S.settings.triviaOn); setTimeout(step,400);
      } else {
        setTimeout(aiEngage,400);
      }
    }; step();
  },400);
}
function aiEngage(){
  if(!S||S.over){ busy=false; return; }
  S.phase='engage'; render();
  const p=S.opp, act=active(p);
  setTimeout(()=>{
    if(!S||S.over){ busy=false; return; }
    if(p.flags.truce){ p.flags.truce=false; pushLog('Opponent is under Truce — attack skipped.'); endAiTurn(); }
    else if(act.atkCharge.length>=act.atk.cost){ if(performAttack('opp','atk')===false){ pushLog('Opponent could not attack — passes.'); endAiTurn(); } }  // else finishAttack -> endAiTurn
    else { pushLog('Opponent has no charged attack — passes.'); endAiTurn(); }
  },500);
}
function armAiWatch(){ clearTimeout(aiWatch); aiWatch=setTimeout(function tick(){ if(!S||S.over||S.turn!=='opp') return; if(S.defend||S.pending){ aiWatch=setTimeout(tick,4000); return; } pushLog('Opponent stalled — safeguard ends the turn.'); busy=false; endAiTurn(); },9000); }
function endAiTurn(){ clearTimeout(aiWatch); setTimeout(()=>{ if(!S) return; busy=false; if(!S.over){ S.turn='you'; startTurn(); } },700); }
function solFace(boss,f){ boss._face=f; if(boss._faces&&boss._faces[f]) boss.img=boss._faces[f]; }
function overlordTurn(){
  if(!S||S.over){ busy=false; return; }
  const p=S.opp, boss=active(p);
  if(!boss||boss.hp<=0){ endAiTurn(); return; }
  boss._turn=(boss._turn||0)+1;
  const ratio=boss.hp/boss.maxHp, phase=ratio<=0.33?3:(ratio<=0.66?2:1);
  const recalEvery=phase===3?3:5;
  // ---- Recalibrate: cleanse own debuffs + small heal ----
  if(boss._turn % recalEvery === 0){
    boss.status=boss.status||{}; ['rip','poison','smudge','weaken','tear','burn','spill','glue','costUp'].forEach(k=>{ delete boss.status[k]; });
    const heal=Math.round(boss.maxHp*0.05); boss.hp=Math.min(boss.maxHp, boss.hp+heal);
    solFace(boss,'taunt'); pushLog('\u26a1 The Over-lord RECALIBRATES \u2014 purges its afflictions and heals '+heal+' HP.');
    try{fxHeal('opp');}catch(e){}
    S.phase='engage'; render(); setTimeout(endAiTurn,1000); return;
  }
  // ---- pick a move by phase rotation ----
  const rot = (phase>=2) ? ['overload','disorient','overload','amplify'] : ['overload','amplify','disorient'];
  const mv = rot[(boss._turn-1) % rot.length];
  const baseDmg = {1:40,2:50,3:65}[phase];
  if(mv==='amplify'){
    boss.status=boss.status||{}; boss.status.highlight=true; if(phase===3) boss.status.laminate=true;
    solFace(boss,'defend'); pushLog('\ud83d\udee1 The Over-lord AMPLIFIES \u2014 it powers up its next assault'+(phase===3?' and shields itself.':'.'));
    S.phase='engage'; render(); setTimeout(endAiTurn,1000); return;
  }
  // overload / disorient are attacks routed through the normal pipeline (block + fx + KO)
  let dmg = (mv==='disorient') ? 15 : baseDmg;
  if(boss.status && boss.status.highlight){ dmg+=20; delete boss.status.highlight; }   // Amplify payoff
  if(mv==='disorient'){ const you=active(S.you); if(you){ you.status=you.status||{}; you.status.weaken=Math.max(you.status.weaken||0, phase>=2?2:1); pushLog('\ud83c\udf00 DISORIENT \u2014 your Active is overstimulated (attacks weakened).'); } }
  else { pushLog('\ud83d\udca5 SENSORY OVERLOAD!'); }
  solFace(boss,'attack');
  boss.atk={ n:(mv==='disorient'?'Disorient':'Sensory Overload'), dmg:dmg, cost:0, label:String(dmg) };
  boss.atkCharge=[];
  S.phase='engage'; render();
  setTimeout(()=>{ if(!S||S.over){ busy=false; return; } if(performAttack('opp','atk')===false){ endAiTurn(); } }, 500);
}

function answerTrivia(choice){
  const pend=S.pending; if(!pend) return;
  const correct=choice===pend.card.ans; S.pending=null; busy=false;
  if(!correct && S.scrim) S.scrim._streak=0;
  try{SFX.card(correct?'card_place':'card_shove',0.7);}catch(e){}

    if(rs==='e_politics'){ const boss=active(S.opp); if(boss&&boss.hp>0){ boss.hp=Math.min(boss.maxHp,boss.hp+8); pushLog('Office Politics \u2014 the examiner heals 8 HP.'); } }
  }
  if(!correct){ const me=S.you.team[S.you.activeIdx]; if(me&&me.fe&&me.passive&&me.passive.failDiscardRandom&&S.you.hand.length){ const ri=Math.floor(Math.random()*S.you.hand.length); const lost=S.you.hand.splice(ri,1)[0]; if(lost){ S.you.discard.push(lost); pushLog(`${me.name}'s composure shatters — a card slips from your hand.`); } } }
  attach('you',pend.handIdx,correct,pend.target);
}

// Uniformly scale the board so both sides + controls always fit the play area (no overlap, no scroll)
function fitBoard(){
  const board=document.querySelector('body[data-screen="play"] .board');
  const inner=board&&board.querySelector('.board-inner');
  if(!board||!inner) return;
  /* single-screen mobile: scale to fit rather than paging */ // pager mode scrolls by design
  inner.style.transform=''; inner.style.width='';
  const availH=board.clientHeight, availW=board.clientWidth;
  const needH=inner.scrollHeight, needW=inner.scrollWidth;
  if(!availH||!needH) return;
  const k=Math.min(1, availH/needH, availW/needW);
  if(k<0.999){
    inner.style.transformOrigin='top center';
    inner.style.transform=`scale(${k})`;
    inner.style.width=(100/k)+'%';           // let content keep its natural width, then shrink uniformly
    inner.style.marginLeft=((1-1/k)*50)+'%'; // recenter the widened box
  } else { inner.style.marginLeft=''; }
}
window.addEventListener('resize',()=>{ if(S&&APP.screen==='play'){ fitNames(); fitBoard(); } });
// Auto-shrink long character names so they never clip the plate (priority: full name visible)
function fitNames(){
  document.querySelectorAll('.pc-name').forEach(el=>{
    el.style.fontSize='';
    let size=parseFloat(getComputedStyle(el).fontSize)||15, guard=48;
    while(el.scrollWidth>el.clientWidth+1 && size>8.5 && guard-->0){ size-=0.5; el.style.fontSize=size+'px'; }
  });
}

function bmRarity(b){ return b.rarity||'C'; }
function bmIdxByRarity(rs){ const o=[]; DATA.bookmarks.forEach((b,i)=>{ if(rs.includes(bmRarity(b))) o.push(i); }); return o; }
function buildOppBookmarks(diff){
  const commons=bmIdxByRarity(['C']), ur=bmIdxByRarity(['U','R']), epics=bmIdxByRarity(['E']), legends=bmIdxByRarity(['L']);
  const N=LIMITS.bm, out=[], pick=a=>a[rnd(a.length)];
  for(let k=0;k<(diff.legend||0)&&legends.length;k++) out.push(pick(legends));
  for(let k=0;k<(diff.epic||0)&&epics.length;k++) out.push(pick(epics));
  let need=Math.round(N*(diff.ur||0)), got=0;
  while(got<need && out.length<N && ur.length){ out.push(pick(ur)); got++; }
  while(out.length<N) out.push(pick(commons.length?commons:DATA.bookmarks.map((_,i)=>i)));
  return out.slice(0,N);
}

  else if(op==='edbm-'){ const cid=arg.replace(/;/g,':'); def.edbm=def.edbm||{}; if(def.edbm[cid]){ def.edbm[cid]--; if(!def.edbm[cid]) delete def.edbm[cid]; } B.code=''; }
  else if(op==='edfilter'){ APP.builder.edFilter=arg;

  else if(op==='cr'){ const n=+arg, i=def.cr.indexOf(n); if(i>=0) def.cr.splice(i,1); else if(def.cr.length<LIMITS.cr && ownCrit(n)) def.cr.push(n); B.code=''; }

  else if(op==='bm+'){ const n=+arg; const have=def.bm.filter(x=>x===n).length; if(def.bm.length<LIMITS.bm && have<bmOwned(n)) def.bm.push(n); B.code=''; }

  else if(op==='prevch'){

/* ---------- pointer drag: ABC card → any of your living characters (active or backstage) ---------- */
let _drag=null;
function _endDrag(){ if(_drag&&_drag.active) window._dragJustEnded=Date.now();
  if(_drag&&_drag.dot&&_drag.dot.parentNode) _drag.dot.parentNode.removeChild(_drag.dot);
  try{ if(_drag&&_drag.capEl&&_drag.pid!=null) _drag.capEl.releasePointerCapture(_drag.pid); }catch(err){}
  document.body.classList.remove('maybe-drag');
  if(_drag&&_drag.ghost&&_drag.ghost.parentNode) _drag.ghost.parentNode.removeChild(_drag.ghost); document.body.classList.remove('dragging-abc'); document.querySelectorAll('.drop-zone.dragover').forEach(el=>el.classList.remove('dragover')); _drag=null; }
/* Keep the AudioContext awake: iOS/Safari re-suspends it aggressively, which delays SFX. Resume on any touch. */
document.addEventListener('pointerdown', function(){ try{ SFX.unlock&&SFX.unlock(); }catch(e){} }, {passive:true});
document.addEventListener('pointerdown',e=>{
  if(!S||S.turn!=='you'||S.phase!=='strategize'||busy) return;
  const el=e.target.closest('.hc.abc.drag-src[data-idx]'); if(!el) return;
  const idx=+el.dataset.idx, card=S.you.hand[idx]; if(!card) return;
  _drag={idx, sx:e.clientX, sy:e.clientY, pid:e.pointerId, active:false, label:`${card.type==='ATTACK'?'⚔':'⛊'} ${card.power}`};
  try{ el.setPointerCapture(e.pointerId); _drag.capEl=el; }catch(err){}   /* keeps the drag alive when the finger leaves the card */
  document.body.classList.add('maybe-drag');
});
document.addEventListener('pointermove',e=>{
  if(!_drag||_drag.pid!==e.pointerId) return;
  if(!_drag.active){
    if(Math.hypot(e.clientX-_drag.sx,e.clientY-_drag.sy) < (window.matchMedia('(pointer:coarse)').matches?14:8)) return;
    _drag.active=true;
    const g=document.createElement('div'); g.className='drag-ghost'; g.textContent=_drag.label;
    document.body.appendChild(g); _drag.ghost=g;
    const dot=document.createElement('div'); dot.className='drag-dot';
    document.body.appendChild(dot); _drag.dot=dot;
    document.body.classList.add('dragging-abc');
  }
  e.preventDefault();
  if(_drag.ghost){ _drag.ghost.style.left=e.clientX+'px'; _drag.ghost.style.top=e.clientY+'px'; }
  if(_drag.dot){ _drag.dot.style.left=e.clientX+'px'; _drag.dot.style.top=e.clientY+'px'; }
  document.querySelectorAll('.drop-zone.dragover').forEach(el=>el.classList.remove('dragover'));
  const hit=document.elementFromPoint(e.clientX,e.clientY), dz=hit&&hit.closest('.drop-zone[data-charuid]');
  if(dz) dz.classList.add('dragover');
},{passive:false});
document.addEventListener('pointerup',e=>{
  if(!_drag||_drag.pid!==e.pointerId) return;
  if(_drag.active){
    e.preventDefault();
    const hit=document.elementFromPoint(e.clientX,e.clientY), dz=hit&&hit.closest('.drop-zone[data-charuid]');
    const idx=_drag.idx, uid=dz?dz.dataset.charuid:null;
    _endDrag();
    suppressNextClick=true; setTimeout(()=>{ suppressNextClick=false; },400);
    if(uid) tryPlayHandCard(idx,uid);
  } else { _drag=null; }
});
document.addEventListener('pointercancel',()=>{ if(_drag) _endDrag(); });

function tenureRank(){ const n=(META.commanders||[]).length; return n>=10?2:(n>=4?1:0); }function perkSlots(){ const r=tenureRank(); return 2+(r>=1?1:0)+(r>=2?1:0); }   // 2 -> 3 -> 4 (max)

  META.loadout=(META.loadout||[]).filter(id=>SCRIM_PERKS[id] && (META.perks||[]).indexOf(id)>=0 && (!SCRIM_PERKS[id].tenured || tenuredUnlocked())).slice(0,perkSlots());
}
const PACK_COST={ silver:50, gold:250, mhamlet:40, frank2077:40, senge:40 };
const PACK_IP_COMMON=[5,10,10,15,15,25];
/* Roll a 5-card pack: slots 1-3 IP bundles, slot 4 Standing Order (gold guaranteed; silver ~70%),
   slot 5 feature (gold guaranteed Commander; silver 60% + pity every 3rd). Empty pools fall back to IP. */
function scrimRollPack(type){
  const picked=[];
  const cmdPool=()=>(DATA.firsteds||[]).map(f=>f.id).filter(id=>(META.commanders||[]).indexOf(id)<0 && picked.indexOf(id)<0);
  const perkPool=()=>Object.keys(SCRIM_PERKS).filter(id=>(META.perks||[]).indexOf(id)<0 && picked.indexOf(id)<0);
  const rollIP=(amt)=>({t:'ip', amt:(amt||PACK_IP_COMMON[rnd(PACK_IP_COMMON.length)])});
  const rollSO=()=>{ const pool=perkPool(); if(!pool.length) return rollIP(20); const id=pool[rnd(pool.length)]; picked.push(id); const p=SCRIM_PERKS[id]; return {t:'so',id,name:p.name,ic:p.ic,text:p.text}; };
  const rollCmd=()=>{ const pool=cmdPool(); if(!pool.length) return (perkPool().length?rollSO():rollIP(30)); const id=pool[rnd(pool.length)]; picked.push(id); const f=firstedById(id); return {t:'cmd',id,name:f?f.name:id,fd:f}; };
  const cards=[];
  for(let i=0;i<3;i++) cards.push(rollIP());
  cards.push( (type==='gold'||Math.random()<0.7) ? rollSO() : rollIP(20) );
  const pity=((META.packs||0)%3===0);
  if(type==='gold') cards.push(rollCmd());
  else if(pity || Math.random()<0.6) cards.push(rollCmd());
  else cards.push(perkPool().length?rollSO():rollIP(25));
  return cards;
}
function scrimApplyPack(cards){
  cards.forEach(c=>{
    if(c.t==='ip') META.ip=(META.ip||0)+c.amt;
    else if(c.t==='so'){ if((META.perks||[]).indexOf(c.id)<0) META.perks.push(c.id); }
    else if(c.t==='cmd'){ if((META.commanders||[]).indexOf(c.id)<0) META.commanders.push(c.id); }
  });
}

/* ---- generic set pools: every set has C / U / R ---- */
function setPool(setId){
  if(setId==='base'){
    var perks=Object.keys(SCRIM_PERKS||{});
    return {
      C:DATA.bookmarks.map(function(b,i){return {k:'bm',id:i,name:b.name};}),
      U:DATA.crits.map(function(c,i){return {k:'cr',id:i,name:c.name};}).filter(function(o){return (window.START_CR||[]).indexOf(o.id)<0;})
         .concat(perks.map(function(p){return {k:'so',id:p,name:(SCRIM_PERKS[p]||{}).name||p};})),
      R:(DATA.firsteds||[]).filter(function(f){return !deckLocked(f.deck);}).map(function(f){return {k:'cmd',id:f.id,name:f.name};})
    };
  }
  if(deckLocked(setId)){
    return {
      C:(DATA.abcs[setId]||[]).map(function(a,i){return {k:'dab',deck:setId,id:i,name:'Trivia #'+(i+1),sub:a.type};}),
      U:(DATA.characters[setId]||[]).map(function(c){return {k:'dch',deck:setId,id:c.id,name:c.name};}),
      R:(DATA.firsteds||[]).filter(function(f){return f.deck===setId;}).map(function(f){return {k:'cmd',id:f.id,name:f.name};})
    };
  }
  var E=(window.EXPANSIONS||{})[setId];
  if(E&&E.battle) return {
    C:(E.battle.abcs||[]).map(function(a){return {k:'ed',cid:a.cid,name:a.word,sub:a.type};}),
    U:(E.battle.chars||[]).map(function(c){return {k:'ed',cid:c.cid,name:c.name};})
       .concat((E.battle.bookmarks||[]).map(function(b){return {k:'ed',cid:b.cid,name:b.name};})),
    R:(E.battle.commanders||[]).map(function(f){return {k:'ed',cid:f.cid,name:f.name};})
  };
  return {C:[],U:[],R:[]};
}
/* have we got it? */
function hasCard(o){
  if(o.k==='dch') return deckOwnCh(o.deck,o.id);
  if(o.k==='dab') return deckOwnAb(o.deck,o.id);
  if(o.k==='bm') return bmOwned(o.id)>=window.BM_MAX_COPIES;      /* "complete" only at max copies */
  if(o.k==='cr') return ownCrit(o.id);
  if(o.k==='so') return (META.perks||[]).indexOf(o.id)>=0;
  if(o.k==='cmd') return (META.commanders||[]).indexOf(o.id)>=0;
  return edHas(o.cid);
}
function grantCard(o){
  if(o.k==='dch'||o.k==='dab'){ META.deckCards=META.deckCards||{}; var d=META.deckCards[o.deck]=META.deckCards[o.deck]||{ch:[],ab:[]};
    var arr=(o.k==='dch')?(d.ch=d.ch||[]):(d.ab=d.ab||[]);
    if(arr.indexOf(o.id)<0){ arr.push(o.id); return true; } return false; }
  if(o.k==='bm'){ META.bmCopies[o.id]=Math.min(window.BM_MAX_COPIES,(META.bmCopies[o.id]||0)+1); return true; }
  if(o.k==='cr'){ if(!ownCrit(o.id)){ META.crits.push(+o.id); return true; } return false; }
  if(o.k==='so'){ if((META.perks||[]).indexOf(o.id)<0){ META.perks.push(o.id); return true; } return false; }
  if(o.k==='cmd'){ if((META.commanders||[]).indexOf(o.id)<0){ META.commanders.push(o.id); return true; } return false; }
  if((META.editionCards||[]).indexOf(o.cid)<0){ META.editionCards.push(o.cid); return true; }

}
function setProgress(setId){

/* ---- roll a pack: setId + tier ---- */
function rollTierPack(setId,tier){
  var T=window.PACK_TIERS[tier], pool=setPool(setId), taken=[], out=[];
  function avail(r){ return (pool[r]||[]).filter(function(o){
      var key=o.cid||(o.k+':'+o.id);
      /* bookmarks: pullable while below max copies; prefer NEW types first */
      if(o.k==='bm') return taken.indexOf(key)<0 && bmOwned(o.id)<window.BM_MAX_COPIES;
      return taken.indexOf(key)<0 && !hasCard(o);
    }); }
  function pull(r){
    if(T.reach.indexOf(r)<0) return null;
    var a=avail(r); if(!a.length) return null;
    if(r==='C'){ var fresh=a.filter(function(o){ return o.k!=='bm'||bmOwned(o.id)===0; }); if(fresh.length) a=fresh; }

    var order=['C','U','R'], x=null, n=0;

    if(!x) return {t:'foil'};
    return {t:'card',o:x,r:r};
  }
  T.slots.forEach(function(s){ out.push(slot(s)); });

  if(META.packs%20===0 && Math.random()<0.5) out.push({t:'ip',amt:100});   /* kindness bundle */

function scrimRollMhPack(){

  function pull(a){var p=av(a); if(!p.length)return null; var x=p[rnd(p.length)]; taken.push(x.cid); return x;}
  var common=E.abcs, uncommon=E.roster.concat(E.bookmarks), rare=E.commanders;

function packTear(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const pack=o.querySelector('.pkr-pack'); if(!pack||pack.classList.contains('torn')) return;
  pack.classList.add('torn');
  setTimeout(()=>{ const fan=o.querySelector('.pkr-fan'); if(fan) fan.classList.add('spread'); pack.classList.add('gone');
    const h=o.querySelector('.pkr-hint'); if(h) h.textContent='Tap each card to flip \u00b7 chase card is last';
    const fa=o.querySelector('.pkr-flipall'); if(fa) fa.classList.add('show'); }, 420);
}
function packFlip(i){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const fan=o.querySelector('.pkr-fan'); if(!fan||!fan.classList.contains('spread')) return;
  const rc=o.querySelector('.pkr-card[data-scrim="packflip:'+i+'"]'); if(!rc||rc.classList.contains('flipped')) return;
  rc.classList.add('flipped'); try{SFX.card('pack_take',0.7);}catch(e){}
  packCheckDone();
}
function packFlipAll(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const cards=[...o.querySelectorAll('.pkr-card')];
  cards.forEach((rc,k)=>setTimeout(()=>{ if(!rc.classList.contains('flipped')){ rc.classList.add('flipped'); if(k===0){ try{SFX.card('pack_take',0.7);}catch(e){} } } if(k===cards.length-1) packCheckDone(); }, k*170));
}
function packCheckDone(){
  const o=document.getElementById('packOverlay'); if(!o) return;
  const all=[...o.querySelectorAll('.pkr-card')].every(rc=>rc.classList.contains('flipped'));
  if(all){ const h=o.querySelector('.pkr-hint'); if(h) h.style.display='none';
    const fa=o.querySelector('.pkr-flipall'); if(fa) fa.classList.remove('show');
    const d=o.querySelector('.pkr-done'); if(d) d.classList.add('show'); }
}
function packClose(){
  const o=document.getElementById('packOverlay'); if(o){ o.classList.remove('show'); setTimeout(()=>{ if(o&&o.parentNode) o.parentNode.removeChild(o); }, 250); }
  render();
}

function transcriptChecksum(str){ let h=5381; for(let i=0;i<str.length;i++){ h=((h*33)^str.charCodeAt(i))>>>0; } return ('0000'+h.toString(36)).slice(-4); }
function edcFactor(arr){ const g={},order=[]; (arr||[]).forEach(x=>{ x=String(x); const i=x.lastIndexOf(':'); const p=i<0?'':x.slice(0,i+1); const leaf=i<0?x:x.slice(i+1); if(!g[p]){g[p]=[];order.push(p);} g[p].push(leaf); }); return order.map(p=>[p,g[p]]); }
function edcUnfactor(f){ const out=[]; (f||[]).forEach(pair=>{ const p=(pair&&pair[0])||''; ((pair&&pair[1])||[]).forEach(leaf=>out.push(p+leaf)); }); return out; }
function transcriptB64(j){ return window.btoa(unescape(encodeURIComponent(j))).replace(/=+$/,''); }
function transcriptEncode(){
  try{
    const arr=TRANSCRIPT_V2_ORDER.map(k=>{ if(k==='editionCards') return edcFactor(META.editionCards); return META[k]!==undefined?META[k]:null; });
    const payload=transcriptB64(JSON.stringify(arr));
    return 'LUL2-'+payload+'-'+transcriptChecksum(payload);
  }catch(e){ return ''; }
}
function transcriptDecode(code){
  try{
    let s=(code||'').trim().replace(/\s+/g,''); let ver=0;
    if(s.indexOf('LUL2-')===0){ ver=2; s=s.slice(5); }
    else if(s.indexOf('LUL1-')===0){ ver=1; s=s.slice(5); }
    else return {err:'That doesn\u2019t look like a Transcript Code (it should start with LUL2-).'};
    const dash=s.lastIndexOf('-'); if(dash<1) return {err:'This Transcript Code is missing its checksum \u2014 re-copy the whole thing.'};
    const payload=s.slice(0,dash), check=s.slice(dash+1);
    if(transcriptChecksum(payload)!==check) return {err:'This Transcript Code looks incomplete or altered \u2014 re-copy the entire code.'};
    let b=payload; while(b.length%4) b+='=';
    const o=JSON.parse(decodeURIComponent(escape(window.atob(b))));
    let snap;
    if(ver===2){
      if(!Array.isArray(o)) return {err:'This Transcript Code could not be read (unrecognized format).'};
      snap={v:2};
      TRANSCRIPT_V2_ORDER.forEach((k,i)=>{ let val=o[i]; if(val===undefined) val=null;
        if(k==='editionCards') snap[k]=edcUnfactor(val); else if(val!==null) snap[k]=val; });
    } else {
      if(!o||o.v!==1) return {err:'This Transcript Code could not be read (unrecognized format).'};
      snap=o;
    }
    if(typeof snap.ip!=='number') return {err:'This Transcript Code could not be read (unrecognized format).'};
    return {snap:snap};
  }catch(e){ return {err:'This Transcript Code could not be read \u2014 check the paste and try again.'}; }
}
function transcriptApply(snap){
  try{ TRANSCRIPT_FIELDS.forEach(k=>{ if(snap[k]!==undefined) META[k]=snap[k]; }); metaSave(); metaLoad(); }catch(e){}
}

/* ---- run setup ---- */
function scrimStartKit(kitId){
  const kit=SCRIM_KITS[kitId]; if(!kit) return;
  SCRIM.active=true; SCRIM.kit=kitId; SCRIM.artifacts=[]; SCRIM.cleared=0; SCRIM.act=1; SCRIM.bosses=scrimRollBosses(); SCRIM.lf=0; SCRIM.t0=Date.now(); SCRIM.honors=Math.min(META.honorsMax||0, SCRIM._honorsSel||0);
  SCRIM._eventsSeen=[]; SCRIM._noNextReward=false; SCRIM._overdueUsed=false; SCRIM.event=null; SCRIM._eventResult=null;
  SCRIM.doctoral=!!SCRIM._doctoralPending; SCRIM._doctoralPending=false; SCRIM.semester=SCRIM.doctoral?1:0; SCRIM._tenureBonus=0; SCRIM._docTotal=0; SCRIM._lastDocBoss=null; SCRIM._wasDoctoral=false;
  META.stats=META.stats||{runs:0,wins:0,bossKills:0,bestAct:0,fastestMs:0};
  META.stats.runs=(META.stats.runs||0)+1; metaSave();
  const dk=kit.deck;
  SCRIM.team = kit.chars.map(id=>{ const def=DATA.characters[dk].find(c=>c.id===id); const mx=def?def.hp:80; return { deck:dk, id:id, curHp:mx, maxHp:mx, fe:false }; });
  // Balanced starter: guarantee both ATTACK and BLOCK are drawable. Some decks are ordered
  // lopsided (Macbeth's leading cards are block-heavy; Othello/Wonderland's are all attack),
  // so a naive "first 8" slice could leave a kit unable to attack or block. Pull 4 of each.
  const _src=DATA.abcs[dk]||[]; const _atk=[], _blk=[];
  _src.forEach((c,i)=>{ (c.type==='ATTACK'?_atk:_blk).push(i); });
  // Guarantee 8 ATTACK + 8 BLOCK so both starting characters can always be armed.
  // If a deck defines fewer than 8 of a type, cycle through what it has to fill the count.
  const ab=[]; const pull=(arr)=>{ if(!arr.length) return; for(let n=0;n<8;n++) ab.push({d:dk, i:arr[n % arr.length]}); };
  pull(_atk); pull(_blk);
  if(!ab.length){ for(let i=0;i<16 && i<_src.length;i++) ab.push({d:dk,i:i}); }
  const bm=[0,1,2,3,4].filter(i=>i<DATA.bookmarks.length);
  SCRIM.deck = { ab:ab, bm:bm, cr:[] };
  // Standing Orders (equipped perks) apply at run start:
  if(perkOn('hardy')) SCRIM.team.forEach(rec=>{ rec.maxHp+=10; rec.curHp+=10; });
  if(perkOn('chair')){ scrimGrantArtifact(); scrimGrantArtifact(); }
  else if(perkOn('endowment')){ scrimGrantArtifact(); }
  // Kit signature kicker (Option B): a small themed head-start
  SCRIM._ambition=0;
  (function(){ const k=SCRIM.kit; const give=(id)=>{ if(id && SCRIM.artifacts.indexOf(id)<0){ SCRIM.artifacts.push(id); scrimArtOnGain(id); } };
    if(k==='gothic'){ SCRIM.team.forEach(rec=>{ rec.maxHp+=15; rec.curHp+=15; }); }
    else if(k==='scifi'){ give('redpen'); }
    else if(k==='drama'){ give('legalpad'); }
    else if(k==='macbeth'){ give('tenuretrack'); }
    else if(k==='wonderland'){ const pool=scrimArtPool(['common']); if(pool.length) give(pool[rnd(pool.length)]); }
    else if(k==='tewwg'){ give('journal'); }
  })();
  SCRIM.map = scrimGenMap(1);
  SCRIM.view='map'; render(); scrimSave();
}

/* ---- map generation (branching DAG, StS-style) ---- */
function scrimGenMap(act){
  act=act||SCRIM.act||1;
  const N=(act>=4?8:7), cols=[];
  cols.push([{type:'start',done:true}]);
  for(let c=1;c<N-1;c++){ const rows=2+rnd(2); const arr=[]; for(let r=0;r<rows;r++) arr.push({type:scrimNodeType(c,N)}); cols.push(arr); }
  const bossId = SCRIM.doctoral ? scrimRollDoctoralBoss() : ((SCRIM.bosses&&SCRIM.bosses[act-1]) || (Math.random()<0.5?'sandroid':'dyefone'));
  cols.push([{type:'boss',boss:bossId}]);
  for(let c=0;c<cols.length-1;c++){
    const nx=cols[c+1];
    cols[c].forEach(node=>{ node.next=[]; const k=1+rnd(Math.min(2,nx.length)); const idxs=shuffle(nx.map((_,i)=>i)).slice(0,k); node.next=idxs.sort((a,b)=>a-b); });
    const covered={}; cols[c].forEach(n=>n.next.forEach(i=>covered[i]=1));
    nx.forEach((_,i)=>{ if(!covered[i]){ const src=cols[c][rnd(cols[c].length)]; if(src.next.indexOf(i)<0){ src.next.push(i); src.next.sort((a,b)=>a-b); } } });
  }
  if(scrimHas('syllabus')){ const mid=[]; for(let c=1;c<cols.length-1;c++) cols[c].forEach(n=>{ if(n.type!=='archives'&&n.type!=='boss') mid.push(n); }); if(mid.length) mid[rnd(mid.length)].type='archives'; }
  return { cols, pos:{c:0,r:0} };
}
function scrimNodeType(c,N){
  if(c===N-2) return Math.random()<0.6?'rest':'scrim';
  const roll=Math.random();
  if(c<=1) return roll<0.8?'scrim':'archives';
  if(roll<0.52) return 'scrim';
  if(roll<0.67) return 'archives';
  if(roll<0.77) return 'rest';
  if(roll<0.85) return 'fair';
  if(roll<0.93) return 'office';
  return 'elite';
}
function scrimReachable(c,r){ const m=SCRIM.map; if(!m) return false; const cur=m.cols[m.pos.c][m.pos.r]; return c===m.pos.c+1 && cur.next && cur.next.indexOf(r)>=0 && !m.cols[c][r].done; }
function scrimAdvanceTo(c,r){ if(!SCRIM.map || !SCRIM.map.cols[c] || !SCRIM.map.cols[c][r]) return; SCRIM.map.pos={c,r}; SCRIM.map.cols[c][r].done=true; SCRIM.cleared++; if(scrimHas('journal')){ SCRIM.team.forEach(t=>{ if(t.curHp>0) t.curHp=Math.min(t.maxHp,t.curHp+5); }); } }

/* ---- deck / character builders for a run battle ---- */
function scrimPlayerShell(name,setKey,team,deck){ const ai=team.findIndex(c=>c.hp>0); return { name,setKey,team,activeIdx:ai>=0?ai:0,deck,hand:[],discard:[],grave:[],kos:0,attachesLeft:0,crit:null,critTurn:{},critEver:{},flags:{},activeBm:[],_lastDrawn:null }; }
function buildRunDeck(rd){ const deck=[];
  (rd.ab||[]).forEach((r,n)=>{ const a=DATA.abcs[r.d]&&DATA.abcs[r.d][r.i]; if(a) deck.push({cat:'abc',...clone(a),cid:'a'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.bm||[]).forEach((i,n)=>{ const b=DATA.bookmarks[i]; if(b) deck.push({cat:'bookmark',...clone(b),cid:'b'+n+Math.random().toString(36).slice(2,5)}); });
  (rd.cr||[]).forEach((i,n)=>{ const c=DATA.crits[i]; if(c) deck.push({cat:'crit',...clone(c),cid:'c'+n+Math.random().toString(36).slice(2,5)}); });
  return deck; }
function buildScrimChar(rec){ let def; if(rec.fe) def=firstedById(rec.id); else def=(DATA.characters[rec.deck]||[]).find(c=>c.id===rec.id); if(!def) return null; const c=makeChar(def,1.0); if(rec.maxHp) c.maxHp=rec.maxHp; c.hp=Math.max(0,Math.min(rec.curHp!=null?rec.curHp:c.maxHp,c.maxHp)); c._scrimIdx=rec._i; return c; }
function scrimYouPlayer(){ const team=[]; SCRIM.team.forEach((rec,i)=>{ rec._i=i; const c=buildScrimChar(rec); if(c) team.push(c); }); const deck=shuffle(buildRunDeck(SCRIM.deck)); return scrimPlayerShell('You',SCRIM.kit,team,deck); }
function scrimNoHeal(bmIdxs){ return bmIdxs.filter(i=>!(DATA.bookmarks[i] && (DATA.bookmarks[i].effect==='heal' || DATA.bookmarks[i].effect==='defib'))); }
function scrimBossDeck(b){ const dk=b.deck||scrimRandomDeck(); const def=defaultDeck(dk); return { ab:def.ab.map(i=>({d:dk,i})).slice(0,16), bm:scrimNoHeal(def.bm).slice(0,8), cr:[] }; }
function scrimOppPlayer(node){
  if(node.superboss){
    const b=SUPER_BOSS; const F=(typeof window!=='undefined'&&window.ABC_SOL_FACES)||{};
    const bc=makeChar({id:'overlord',name:b.name,hp:b.hp,accent:b.accent,tags:['villain'],
      atk:{n:'Sensory Overload',dmg:40,cost:0,label:'40'},blk:{n:'Amplify',block:20,cost:2,label:'20/2'}},1.0);
    bc._boss=true; bc._overlord=true; bc._big=true; bc.sub=b.sub; bc._faces=F; bc._face='idle'; bc.img=F.idle||''; bc.imgpos='50% 26%'; bc._turn=0;
    return scrimPlayerShell(b.name,'boss',[bc], shuffle(buildRunDeck(scrimBossDeck({deck:scrimRandomDeck()}))));
  }
  if(node.boss){ const b=SCRIM_BOSSES[node.boss]; const mul=scrimActMul();
    const bAtk=clone(b.atk); if(bAtk.dmg!=null) bAtk.dmg=Math.round(bAtk.dmg*mul);
    const bimg=((typeof window!=='undefined'&&window.ABC_BOSS_IMG)||{})[node.boss]||'';
    const bc=makeChar({id:'boss_'+node.boss,name:b.name,hp:Math.round(b.hp*mul*(SCRIM.doctoral?1.2:1.15)),accent:b.accent,img:bimg,tags:['villain'],atk:bAtk,blk:clone(b.blk)},1.0); bc._boss=true; bc.sub=b.sub;
    bc.imgpos=((typeof window!=='undefined'&&window.ABC_BOSS_IMGPOS)||{})[node.boss]||'50% 40%';
    return scrimPlayerShell(b.name,'boss',[bc],shuffle(buildRunDeck(scrimBossDeck(b)))); }
  const dk=node.oppDeck||scrimRandomDeck();
  const ids=shuffle(DATA.characters[dk].map(c=>c.id)).slice(0, node.type==='elite'?3:2);
  const depth=SCRIM.pending?SCRIM.pending.c:1;
  const scale=(node.type==='elite'?1.35:Math.min(1.3,0.8+0.08*depth))*scrimActMul();
  const team=ids.map(id=>{ const c=makeChar(DATA.characters[dk].find(x=>x.id===id),1.0); c.maxHp=Math.max(20,Math.round(c.maxHp*scale/10)*10); c.hp=c.maxHp; return c; });
  const def=defaultDeck(dk);
  const rd={ ab:def.ab.map(i=>({d:dk,i})).slice(0,14), bm:scrimNoHeal(def.bm).slice(0,10), cr:node.type==='elite'?def.cr.slice(0,2):[] };
  return scrimPlayerShell('Opponent',dk,team,shuffle(buildRunDeck(rd)));
}

/* choose the rule shift for this battle: bosses roll base-or-alt; elites get a named modifier */
function scrimApplyShift(node){
  if(!S||!S.scrim) return;
  if(node.boss){
    const b=SCRIM_BOSSES[node.boss]; if(!b) return;
    const useAlt = b.altShift && (SCRIM.doctoral || Math.random()<0.5);
    S.scrim.ruleShift = useAlt ? b.altShift : b.ruleShift;
    S.scrim.shiftName = useAlt ? b.altName : b.shiftName;
    S.scrim.shiftText = useAlt ? b.altText : b.shiftText;
    if(useAlt){ META.bossAltSeen=META.bossAltSeen||[]; if(META.bossAltSeen.indexOf(node.boss)<0){ META.bossAltSeen.push(node.boss); metaSave(); } const alt=(typeof window!=='undefined'&&window.ABC_BOSS_IMG_ALT&&window.ABC_BOSS_IMG_ALT[node.boss]); if(alt){ const bc=active(S.opp); if(bc){ bc.img=alt; bc.imgpos='50% 22%'; } } }
  } else if(node.type==='elite'){
    const ids=Object.keys(SCRIM_ELITES); const id=ids[rnd(ids.length)]; const e=SCRIM_ELITES[id];
    S.scrim.ruleShift=id; S.scrim.eliteId=id; S.scrim.shiftName=e.name; S.scrim.shiftText=e.text;
    if(id==='e_latereg'){ S.settings.handSize=Math.max(2,(S.settings.handSize||5)-2); }
    if(id==='e_group'){ const liv=S.you.team.filter(c=>c.hp>0); if(liv.length){ const slacker=liv[rnd(liv.length)]; S.you.team.forEach(c=>{ if(c===slacker) c._slacker=true; else c._carry=true; }); } }
    try{ toast('Thesis Defense: '+e.name); }catch(_e){}
  }
}
/* ---- launch a battle node ---- */
function scrimStartSuperBoss(){ META.overlordSeen=true; metaSave(); SCRIM.pending=null; SCRIM.bossReward=null; SCRIM._gainedArt=null; SCRIM.view='map'; scrimStartBattle({type:'boss', superboss:true}); }
function scrimStartBattle(node){
  stopTurnTimer();
  const st=clone(APP.settings); st.koTarget=99; st.hpScale=1.0;
  st.aiAccuracy = node.boss?Math.min(0.98,SCRIM_BOSSES[node.boss].acc+honorsMods().acc):(node.type==='elite'?Math.min(0.96,scrimAccFloor()+0.06):scrimAccFloor());
  if(node.boss==='sicsoc') st.turnTimer=15;
  const _hExtra=(scrimHas('librarycard')?1:0)+(scrimHas('honorary')?1:0);
  st.handMin = (DEFAULTS.handMin||4) + _hExtra;
  st.handSize = (DEFAULTS.handSize||5) + _hExtra + (scrimHas('legalpad')?1:0) + (scrimHas('espresso')?2:0);
  const you=scrimYouPlayer(), opp=scrimOppPlayer(node);
  // Boss artifact battle-start effects on the enemy team
  if(scrimHas('honorary')) opp.team.forEach(c=>{ c.maxHp=(c.maxHp||0)+20; c.hp=(c.hp||0)+20; });
  if(scrimHas('corneroffice')&&opp.team.length){ const t=opp.team.slice().sort((a,b)=>(b.maxHp||0)-(a.maxHp||0))[0]; const cut=Math.round((t.maxHp||0)*0.25); t.maxHp=Math.max(1,(t.maxHp||0)-cut); t.hp=Math.min(t.hp,t.maxHp); }
  // Dean's Endorsement: your Active starts each battle with a random boon
  if(scrimHas('deansendorsement')&&you.team.length){ const act=you.team[you.activeIdx]||you.team[0]; if(act){ act.status=act.status||{}; const boon=['highlight','laminate','hardcover'][rnd(3)]; act.status[boon]=true; } }
  if(SCRIM.kit==='wonderland'&&you.team.length){ const act=you.team[you.activeIdx]||you.team[0]; if(act){ act.status=act.status||{}; const boon=['highlight','laminate','hardcover'][rnd(3)]; act.status[boon]=true; } }
  S = { settings:clone(st), turn:'you', phase:'deal', over:false, winner:null, pending:null, defend:false, picker:null, viewPile:null, poison:0, _logopen:false, _settings:false, fxShuffle:false,
        you, opp, log:[], scrim:{ node, ruleShift:null, shiftName:null, shiftText:null, eliteId:null, rosettaUsed:false } };
  scrimApplyShift(node);
  APP.screen='play';
  pushLog(node.superboss?('\u26a0 COMMENCEMENT \u2014 THE SENSORY OVER-LORD RISES!'):(node.boss?('\u26a0 ALGORITHM CORE \u2014 '+SCRIM_BOSSES[node.boss].name+'!'):(node.type==='elite'?('\ud83c\udf93 Thesis Defense \u2014 '+(S.scrim.shiftName||'an elite fight')+'!'):'\u2694 A Scrimmage begins.')));
  if(S.scrim.ruleShift){ pushLog((node.boss?'Global Rule Shift \u2014 ':'Elite Rule \u2014 ')+S.scrim.shiftName+': '+S.scrim.shiftText); }
  if(node.boss){ S._bossReveal=node.boss; if((META.bossSeen||[]).indexOf(node.boss)<0){ META.bossSeen.push(node.boss); metaSave(); } }
  render(); dealOpening();
}

/* ---- battle resolution back into the run ---- */
function scrimOverModal(){
  const won = !S.opp.team.some(c=>c.hp>0);
  const node=S.scrim.node; const boss=node.boss?SCRIM_BOSSES[node.boss]:null;
  const title = won ? (boss?('Sector purged: '+boss.name+' defeated!'):'Node cleared!') : 'Your Library falls\u2026';
  const sub = won ? 'Your surviving characters carry their wounds onward.' : 'All your characters were knocked out \u2014 the run ends here.';
  const cls = won?'win':'lose';
  return `<div class="modal-bg"><div class="over scrim-over ${cls}">
    <div class="over-title ${cls}">${title}</div>
    <div class="over-sub">${sub}</div>
    <div class="set-actions"><button class="bigbtn" data-scrim="afterbattle">${won?'Continue \u203a':'End run'}</button></div></div></div>`;
}

function scrimResolveNode(c,r){

      if(node&&SCRIM.map){ const cell=SCRIM.map.cols?.[node.c]?.[node.r]; if(cell) cell.done=false; }
      S=null; stopTurnTimer(); APP.screen='scrim'; SCRIM.pending=null; SCRIM.view='map';
      toast('Overdue Notice \u2014 you survive at 1 HP. (once per run)','bad'); render(); scrimSave(); return; }
    if(SCRIM.doctoral){ scrimEndDoctoral(false); return; }
    if(honorsMods().permadeath){ scrimEndRun(false); return; }
    // Non-permadeath: regroup — team revives at 40% and returns to the map to retry.
    SCRIM.team.forEach(t=>{ t.curHp=Math.max(1,Math.round(t.maxHp*0.4)); });
    if(node&&SCRIM.map){ const cell=SCRIM.map.cols?.[node.c]?.[node.r]; if(cell) cell.done=false; }
    S=null; stopTurnTimer(); APP.screen='scrim'; SCRIM.pending=null; SCRIM.view='map';
    toast('The sector overwhelms you \u2014 your scholars regroup at 40% HP.','bad'); render(); scrimSave(); return;
  }
  const _lf = (node.boss?6:(node.type==='elite'?4:2)) + (perkOn('adjunct')?2:0) + (scrimHas('tenuretrack')?2:0);
  if(SCRIM.kit==='tewwg') SCRIM.team.forEach(t=>{ if(t.curHp>0) t.curHp=Math.min(t.maxHp,t.curHp+8); });
  SCRIM.lf=(SCRIM.lf||0)+_lf; SCRIM._lfGain=_lf;
  if(SCRIM.pending){ scrimAdvanceTo(SCRIM.pending.c,SCRIM.pending.r); }
  let art=null;
  if(node.type==='elite'||node.boss) art=scrimGrantArtifact(node.boss?['rare','boss']:['uncommon','rare']);
  SCRIM._gainedArt=art;
  if(node.superboss){
    META.stats.bossKills=(META.stats.bossKills||0)+1; META.overlordKilled=true; metaSave();
    S=null; stopTurnTimer(); APP.screen='scrim';
    scrimEndRun(true); return;
  }
  if(node.boss){
    META.stats.bossKills=(META.stats.bossKills||0)+1; if((META.bossKilled||[]).indexOf(node.boss)<0) META.bossKilled.push(node.boss); if((META.bossSeen||[]).indexOf(node.boss)<0) META.bossSeen.push(node.boss); metaSave();
    if(scrimHas('fellowship')){ SCRIM.team.forEach(t=>{ t.curHp=t.maxHp; }); }
    S=null; stopTurnTimer(); APP.screen='scrim';
    if(SCRIM.doctoral){
      const sem=SCRIM.semester||1;
      const ipGain=Math.round(40*(1+0.4*sem)*honorsMods().ipMul); META.ip=(META.ip||0)+ipGain; SCRIM._bossIP=ipGain; SCRIM._docTotal=(SCRIM._docTotal||0)+ipGain;
      SCRIM._tenureBonus=(SCRIM._tenureBonus||0)+Math.round(25*sem*honorsMods().ipMul);
      META.stats.doctoralBest=Math.max(META.stats.doctoralBest||0, sem); metaSave();
      SCRIM.pending=null; SCRIM.view='doctoralchoice'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave(); return;
    }
    if((SCRIM.act||1)>=7){ scrimStartSuperBoss(); return; }
    const ipGain=Math.round(40*honorsMods().ipMul); META.ip=(META.ip||0)+ipGain; metaSave(); SCRIM._bossIP=ipGain;
    SCRIM.bossReward=scrimRollFirstEds(3); SCRIM.pending=null;
    SCRIM.view='bossreward'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave(); return;
  }
  S=null; stopTurnTimer(); APP.screen='scrim';
  if(SCRIM._noNextReward){ SCRIM._noNextReward=false; SCRIM.pending=null; SCRIM.view='map'; toast('Too tired to take notes \u2014 no card this fight.'); render(); scrimSave(); return; }
  SCRIM.pending=null; SCRIM.draft=scrimRollDraft(Math.max(2,(perkOn('officehours')?4:3)+honorsMods().draftDelta)); SCRIM.view='reward'; try{SFX.card('card_fan',0.7);}catch(e){} render(); scrimSave();
}
function scrimBuyUnlock(id){
  const U={ hp:{cost:40,name:'Hardy Scholars (+10 starting Max HP)'}, kit:{cost:60,name:'Extra kit slot (cosmetic)'} };
  const u=U[id]; if(!u) return;
  if((META.ip||0)<u.cost){ toast('Not enough Intellect Points.'); return; }
  if(META.unlocks.indexOf(id)>=0){ toast('Already unlocked.'); return; }
  META.ip-=u.cost; META.unlocks.push(id); metaSave(); toast('Unlocked: '+u.name); render();
}

function scrimDrawConnectors(){
  if(typeof document==='undefined') return;
  const smap=document.getElementById('smap'), svg=document.getElementById('smapLines'); if(!smap||!svg) return;
  const wrap=smap.getBoundingClientRect(); if(!wrap.width) return;
  const m=SCRIM.map; let paths='';
  const cols=smap.querySelectorAll('.smap-col');
  m.cols.forEach((col,c)=>{ if(c>=m.cols.length-1) return;
    col.forEach((node,r)=>{ (node.next||[]).forEach(ni=>{
      const a=cols[c]&&cols[c].children[r], bnode=cols[c+1]&&cols[c+1].children[ni]; if(!a||!bnode) return;
      const ra=a.getBoundingClientRect(), rb=bnode.getBoundingClientRect();
      const x1=ra.left+ra.width/2-wrap.left, y1=ra.top+ra.height/2-wrap.top, x2=rb.left+rb.width/2-wrap.left, y2=rb.top+rb.height/2-wrap.top;
      const on=(m.pos.c===c&&m.pos.r===r);
      paths+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${on?'#caa53a':'#6a5a3a'}" stroke-width="2.4" stroke-dasharray="7 5" stroke-linecap="round" />`;
    }); });
  });
  svg.setAttribute('width',wrap.width); svg.setAttribute('height',wrap.height);
  svg.style.width=wrap.width+'px'; svg.style.height=wrap.height+'px';
  svg.innerHTML=paths;
}

    return `<span class="vault-perkwrap"><button class="${cls}"${click}>${p.ic} ${have?p.name:'???'}${p.tenured?' <small class="ten">HONORS</small>':''}${on?' \u2713':''}</button><button class="vault-info" data-scrim="perkinfo:${id}" title="What does this do?">\u2139</button></span>`;
  }).join('');
  return `<div class="scrim-title sm vault-tabtitle">\ud83c\udfdb Shop</div>
    <div class="vault-sec"><div class="vault-h">\ud83d\udce6 Booster Packs</div>
      <div class="vault-row"><div style="display:flex;align-items:center;gap:10px;flex:1">${PA.silver?`<img class="vault-packimg" src="${PA.silver}" alt="">`:''}<div class="vault-nm">First Edition Portfolio <small>5 cards \u00b7 IP bundles, a Standing Order, and a Commander chase (60% + pity every 3rd).</small></div></div>

    <div class="vault-sec"><div class="vault-h">\ud83d\udccb Standing Orders <small>tap a chip to equip \u00b7 \u2139 for details</small></div>
      <div class="vault-perks">${perkChips}</div>${infoHtml}</div>`;
}
function scrimVFirstEds(){
  const owned=(META.commanders||[]).length, total=(DATA.firsteds||[]).length;
  const shelf=(DATA.firsteds||[]).map((f,i)=>{const got=(META.commanders||[]).indexOf(f.id)>=0;
    const h=128+((i*29)%34);
    return `<button class="lib-spine ${got?'got':''}" style="height:${h}px;--sp:${f.accent||'#5a4a3a'}" data-scrim="fecard:${f.id}" title="${f.name}">${got?'<span class="sp-star">\u2b50</span>':''}<span class="sp-name">${scrimSpineAbbrev(f.name)}</span></button>`;}).join('');
  return `<div class="scrim-title sm vault-tabtitle">\ud83d\udcd6 1st Editions</div>
    <div class="vault-sec"><div class="vault-h">\ud83d\udcd6 The Library <small>${owned}/${total} Commanders \u00b7 tap a spine to inspect</small></div>
      <div class="lib-shelf">${shelf}</div><div class="lib-shelfboard"></div></div>`;
}
function scrimDeadScreen(){
  if(SCRIM._wasDoctoral){
    const def=SCRIM._doctoralDefended, sem=SCRIM._doctoralSem||1, rank=SCRIM._doctoralRank||'Doctoral Candidate', bonus=SCRIM._doctoralBonusPaid||0;

      <p class="scrim-intro-copy">${def?('You walk away a <b>'+rank+'</b> after '+sem+' semester'+(sem>1?'s':'')+' \u2014 Tenure Bonus secured.'):('You pushed too far and fell in Semester '+sem+'. Your rank of <b>'+rank+'</b> stands, but the un-banked Tenure Bonus is forfeit.')}</p>
      <div class="scrim-ipline">Program banked: <b>+${SCRIM._docTotal||0} IP</b>${def?(' + Tenure Bonus <b>+'+bonus+'</b>'):' \u00b7 <span style="color:#b5402a">Tenure Bonus lost</span>'} \u00b7 Total \ud83e\udde0 ${META.ip||0}</div>
      <div class="scrim-menu"><button class="bigbtn go" data-scrim="back">\u2039 Back to Scrimmage</button></div></div></div>`;
  }
  const v=SCRIM._victory;
  return `<div class="scrim-wrap scrim-ink"><div class="scrim-panel">
    <div class="scrim-title ${v?'':'sm'}">${v?'\ud83c\udfc6 Sector Purged!':'The Library Falls'}</div>
    <p class="scrim-intro-copy">${v?'You defeated the Algorithm Core and reclaimed a sector of the Library of Mind.':'Your characters were overwhelmed by the noise. But knowledge endures.'}</p>
    <div class="scrim-ipline">Intellect Points earned: <b>+${SCRIM._lastIP||0}</b> \u00b7 Total \ud83e\udde0 ${META.ip||0}</div>
    <div class="scrim-menu">
      <button class="bigbtn" data-scrim="new">\u2694 New Run</button>
      <button class="toolbtn" data-scrim="endrun">\u2039 Scrimmage menu</button>
      <button class="toolbtn" data-scrim="back">Main menu</button>
    </div>
  </div></div>`;
}
