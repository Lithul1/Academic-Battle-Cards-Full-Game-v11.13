<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Academic Battle Cards — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F2E6C6; --cream-hi:#FBF3DD; --paper-ed:#E7D4A6;
  --ink:#241F1B; --ink-2:#3a322b;
  --red:#B53A2C; --red-dk:#8C2A20;
  --teal:#1F6A6A; --teal-dk:#13474A;
  --gold:#E3A92B; --gold-dk:#C2861A;
  --felt:#143b3d;
  --disp:'Alfa Slab One',Georgia,serif;
  --cond:'Anton',Impact,sans-serif;
  --body:'Spectral',Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--body); color:var(--ink);
  background-color:#e7d9b4;
  background-image:
    repeating-linear-gradient(0deg, rgba(74,56,34,.045) 0 1px, transparent 1px 25px),
    linear-gradient(90deg, transparent 0 46%, rgba(60,40,22,.10) 49%, rgba(45,30,16,.22) 50%, rgba(60,40,22,.10) 51%, transparent 54%),
    radial-gradient(115% 80% at 50% -10%, rgba(255,250,236,.65), transparent 55%),
    radial-gradient(150% 130% at 50% 50%, #f1e7ca 0%, #e6d6ac 55%, #c9b485 100%);
  background-attachment:fixed;
  min-height:100%; overflow-x:hidden;
}

/* ===== UI redesign (demo_11_12): shared paper backdrop on framed screens ===== */
:root{ --abc-bg:none; --deckbg-gatsby:url("data:image/png;base64,__ABCASSET_900__"); --deckbg-hamlet:url("data:image/png;base64,__ABCASSET_902__"); --deckbg-frankenstein:url("data:image/png;base64,__ABCASSET_903__"); --deckbg-sherlock:url("data:image/png;base64,__ABCASSET_904__"); --deckbg-othello:url("data:image/png;base64,__ABCASSET_905__"); --deckbg-macbeth:url("data:image/png;base64,__ABCASSET_906__"); --deckbg-wonderland:url("data:image/png;base64,__ABCASSET_907__"); --deckbg-oz:url("data:image/png;base64,__ABCASSET_908__"); --deckbg-crucible:url("data:image/png;base64,__ABCASSET_901__"); --deckbg-tewwg:url("data:image/jpeg;base64,__ABCASSET_919__"); }
body::before{ content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:var(--abc-bg) center/cover no-repeat; }
/* gameplay surfaces keep their own playfield/ink look */
body[data-screen="play"]::before,
body[data-screen="scrim"]::before{ display:none; }
/* ...but the two Scrimmage MENUS get the shared paper */
body[data-screen="scrim"][data-scrimview="intro"]::before,
body[data-screen="scrim"][data-scrimview="kit"]::before{ display:block; }
body[data-screen="scrim"][data-scrimview="intro"] .scrim-ink,
body[data-screen="scrim"][data-scrimview="kit"] .scrim-ink{ background:transparent; }
/* flat off-white card buttons — Scrimmage menus (scoped) */
.scrim-menu .bigbtn{ background:#faf7ef; color:var(--ink); border:1px solid rgba(40,25,12,.16);
  border-radius:12px; box-shadow:0 2px 5px rgba(40,25,12,.10), 0 6px 16px rgba(40,25,12,.07);
  transition:transform .12s, box-shadow .12s; }
.scrim-menu .bigbtn:hover{ transform:translateY(-2px);
  box-shadow:0 4px 9px rgba(40,25,12,.13), 0 10px 22px rgba(40,25,12,.10); }
.scrim-menu .bigbtn:active{ transform:translateY(1px);
  box-shadow:0 1px 2px rgba(40,25,12,.12); }
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
#game{max-width:1080px;margin:0 auto;padding:10px 12px 24px;position:relative}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 12px;margin-bottom:8px;border-radius:12px;
  background:linear-gradient(#1a4547,#15393b);border:2px solid #0c2426;
  box-shadow:0 2px 0 #0c2426, inset 0 0 0 2px rgba(227,169,43,.25)}
.brand{display:flex;align-items:baseline;gap:2px;font-family:var(--disp);font-size:26px;letter-spacing:.5px}
.brand .bk{display:inline-grid;place-items:center;width:30px;height:34px;border-radius:6px;color:var(--cream-hi);
  border:2px solid var(--ink);transform:rotate(-3deg);text-shadow:1px 1px 0 rgba(0,0,0,.35)}
.brand .b1{background:var(--teal)} .brand .b2{background:var(--red);transform:rotate(2deg)} .brand .b3{background:var(--gold);color:var(--ink);transform:rotate(-2deg)}
.brand i{color:var(--gold);font-style:italic;margin-left:2px}
.brand small{font-family:var(--cond);font-weight:400;font-size:12px;letter-spacing:2px;color:#bfe3d8;text-transform:uppercase;margin-left:8px;align-self:center}
.score{display:flex;gap:8px;margin-left:auto}
.kos{font-family:var(--cond);font-size:13px;letter-spacing:1px;padding:5px 10px;border-radius:8px;border:2px solid var(--ink);color:var(--cream-hi);text-transform:uppercase}
.kos.you{background:var(--teal)} .kos.opp{background:var(--red)}
.tb-btns{display:flex;gap:6px}
.tb-btns button{font-family:var(--cond);letter-spacing:1px;font-size:13px;color:var(--ink);background:var(--gold);
  padding:7px 11px;border-radius:8px;border:2px solid var(--ink);box-shadow:0 2px 0 var(--gold-dk)}
.tb-btns button:active{transform:translateY(2px);box-shadow:none}

/* ---------- board ---------- */
.board{display:flex;flex-direction:column;gap:8px}
.side{padding:8px;border-radius:14px}
.opp-side{background:linear-gradient(#3a1c1c55,#2a141455);border:1px dashed #b53a2c66}
.you-side{background:linear-gradient(#13474a55,#0f3a3d55);border:1px dashed #1f6a6a88}
.side-meta{font-family:var(--cond);letter-spacing:1px;font-size:11px;text-transform:uppercase;color:#cfe7df;opacity:.8;padding:2px 4px}
.row{display:flex;align-items:center;gap:12px;justify-content:center;position:relative}
.deckpile{position:relative;font-size:34px;line-height:1;color:#0a1f20;filter:drop-shadow(0 2px 0 #000)}
.deckpile span{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--cond);font-size:13px;color:var(--gold)}

/* character card */
.char{width:236px;background:var(--paper,var(--cream));border:3px solid var(--frame,var(--ink));border-radius:14px;padding:7px;
  box-shadow:0 6px 0 #0c2426, 0 8px 18px rgba(0,0,0,.35);position:relative}
.char.dead{filter:grayscale(.8) brightness(.7);opacity:.55}
.pc-plate{display:flex;align-items:stretch;gap:5px;margin-bottom:5px}
.pc-name{flex:1;min-width:0;font-family:var(--disp);font-size:15px;letter-spacing:.3px;line-height:1.15;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--plate,#fff);color:var(--plate-ink,var(--ink));border:2px solid var(--frame,var(--ink));border-radius:7px;padding:2px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-hp{position:relative;flex:0 0 auto;min-width:58px;display:grid;place-items:center;border:2px solid var(--frame,var(--ink));border-radius:7px;overflow:hidden;background:#2a2a2a}
.pc-hp i{position:absolute;left:0;top:0;bottom:0;width:100%;background:var(--hp,#4f9fe0);transition:width .35s}
.pc-hp b{position:relative;z-index:2;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.5px;color:var(--hp-ink,#fff);text-shadow:0 1px 1px rgba(0,0,0,.35);padding:2px 7px}
.char.dead .pc-hp i{background:#8a8a8a}
.pc-art{position:relative;height:132px;border:2px solid var(--frame,var(--ink));border-radius:8px;display:grid;place-items:center;overflow:hidden;background:var(--ground,linear-gradient(160deg,var(--accent),#1b1714))}
.pc-art .mono{font-family:var(--disp);font-size:44px;color:rgba(255,255,255,.92);text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.pc-art .port-img{width:100%;height:100%;object-fit:cover;display:block}
/* ---- scrimmage boss: enlarged menacing tile ---- */
.char.boss{border-color:#b5122a;box-shadow:0 0 0 2px #2a0a0e,0 6px 0 #3a0a0e,0 8px 20px rgba(140,20,32,.42)}
@keyframes bosspulse{0%,100%{box-shadow:0 0 0 2px #2a0a0e,0 6px 0 #3a0a0e,0 8px 22px rgba(120,10,20,.35)}50%{box-shadow:0 0 0 2px #2a0a0e,0 6px 0 #3a0a0e,0 10px 26px rgba(200,30,50,.6)}}
.char.boss .pc-name{background:linear-gradient(#2a0a0e,#4a0d14);color:#ffd9dd;border-color:#b5122a;font-size:12px;letter-spacing:1px;text-transform:uppercase;text-shadow:0 0 6px rgba(255,60,80,.5)}
.char.boss .pc-art{height:168px;border-color:#b5122a;background:radial-gradient(120% 100% at 50% 20%,#241016,#0c0608)}
body[data-screen="play"] .char.boss .pc-art{height:clamp(70px,15vh,168px)}
/* ---- boss reveal splash ---- */
.brv-bg{background:radial-gradient(120% 90% at 50% 30%,rgba(38,12,16,.9),rgba(8,11,13,.96));z-index:60}
.brv{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;max-width:min(92vw,640px);animation:brvin .45s cubic-bezier(.2,.9,.25,1.4)}
@keyframes brvin{0%{transform:scale(.7) translateY(14px);opacity:0}60%{opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
.brv-tag{font-family:var(--disp);font-size:clamp(15px,4vw,22px);letter-spacing:3px;color:#ff8f9c;text-shadow:0 1px 2px rgba(0,0,0,.85)}
.brv-stage{width:100%;display:grid;place-items:center}
.brv-art{max-width:min(88vw,600px);max-height:52vh;width:auto;height:auto;object-fit:contain;filter:drop-shadow(0 10px 22px rgba(0,0,0,.6))}
.brv-mono{width:min(70vw,300px);aspect-ratio:3/4;display:grid;place-items:center;font-family:var(--disp);font-size:56px;color:#fff;border-radius:14px;border:3px solid #b5122a;background:radial-gradient(120% 100% at 50% 25%,var(--accent,#444),#140a0c);box-shadow:0 6px 18px rgba(0,0,0,.5)}
.brv-name{font-family:var(--disp);font-size:clamp(26px,7vw,46px);color:#fff;line-height:1;text-shadow:0 2px 0 #000}
.brv-sub{font-family:var(--cond);font-style:italic;color:#e7c9cd;font-size:clamp(12px,3.4vw,16px);margin-top:-2px}
.brv-shift{font-family:var(--cond);color:#f4e2e4;font-size:clamp(12px,3.3vw,15px);line-height:1.35;background:rgba(30,6,9,.6);border:1px solid rgba(200,60,70,.5);border-radius:9px;padding:8px 12px;max-width:min(88vw,520px)}
.brv-shift b{color:#ff8a98}
.brv-go{margin-top:4px}
.pc-flip{position:absolute;right:5px;bottom:5px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:rgba(12,12,14,.72);color:#fff;font-family:var(--disp);font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0;box-shadow:0 2px 5px rgba(0,0,0,.4);z-index:3}
.pc-flip:hover{background:var(--red)}
.pcb-close{align-self:center;margin-top:auto;font-family:var(--cond);font-size:11px;letter-spacing:.5px;padding:4px 12px;border:2px solid var(--frame,var(--ink));border-radius:6px;background:#fff;cursor:pointer}
.bench-view{width:min(92vw,340px)!important;max-height:90vh;overflow:auto;display:flex;flex-direction:column;gap:7px}
.bench-view .pc-name{font-size:18px}
.bv-art{height:clamp(150px,42vh,290px);border:2px solid var(--frame,var(--ink));border-radius:8px;overflow:hidden;display:grid;place-items:center;background:var(--ground,linear-gradient(160deg,var(--accent),#1b1714))}
.bv-art img{width:100%;height:100%;object-fit:cover;display:block}
.bv-art .mono{font-family:var(--disp);font-size:56px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.bv-move{border:2px solid var(--frame,var(--ink));border-radius:8px;padding:7px 9px;font-family:var(--cond)}
.bv-move.atk{background:#f3c7bf} .bv-move.blk{background:#bfe0e0}
.bv-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.bv-h b{font-size:14px;letter-spacing:.5px}
.bv-move p{margin:0;font-size:12.5px;line-height:1.32;color:#241f1b}
.pips{min-height:20px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:5px}
.pip{font-size:14px;line-height:18px;width:20px;height:20px;display:grid;place-items:center;border-radius:5px;border:1.5px solid var(--ink)}
.pip.atk{background:var(--red);color:var(--gold)} .pip.blk{background:var(--teal);color:var(--cream-hi)}
.pip.iron{background:var(--ink);color:var(--gold)} .pip.none{border:none;color:#a98}
.pc-moves{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.pc-move{display:flex;align-items:center;gap:6px;text-align:left;padding:5px 6px;border-radius:8px;border:2px solid var(--frame,var(--ink));line-height:1.1;width:100%}
.pc-mn{flex:1;min-width:0;font-family:var(--cond);font-weight:700;letter-spacing:.4px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-mc{font-family:var(--cond);font-size:10px;letter-spacing:.3px;opacity:.85;white-space:nowrap}
.pc-chip{flex:0 0 auto;font-family:var(--disp);font-size:13px;line-height:1;color:#fff;padding:4px 7px;border-radius:6px;border:2px solid rgba(0,0,0,.35);min-width:34px;text-align:center}
.pc-chip.red{background:var(--red)} .pc-chip.blue{background:#3f7fd6}
.pc-chip.sm{font-size:11px;padding:2px 6px;min-width:0}
.pc-move.atk{background:#f3c7bf;color:var(--red-dk)}
.pc-move.atk.ready{background:var(--red);color:var(--cream-hi);box-shadow:0 0 0 3px var(--gold),0 3px 0 var(--red-dk);animation:pulse 2.2s ease-in-out infinite}
.pc-move.atk[disabled]{opacity:.62;cursor:not-allowed}
.pc-move.blk{background:#bfe0e0;color:var(--teal-dk);cursor:default}
/* ---- per-deck themes (frame & palette per novel; red/blue move chips kept for game consistency) ---- */
.char[data-deck="hamlet"]{--frame:#0b0b0d;--paper:#f5f6fb;--plate:#ffffff;--plate-ink:#0b0b0d;--hp:#4f9fe0;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#1a2440,#0a0e1c 70%);background:var(--paper) var(--deckbg-hamlet) center/cover;padding:9px}
.char[data-deck="gatsby"]{--frame:#0e0e0e;--paper:#f7efd6;--plate:linear-gradient(#f6d97a,#d4af37);--plate-ink:#241a06;--hp:#d4af37;--hp-ink:#241a06;--ground:linear-gradient(150deg,#2b2416,#0c0a06);background:var(--paper) var(--deckbg-gatsby) center/cover;padding:9px}
.char[data-deck="crucible"]{--frame:#2a2018;--paper:#efe6d1;--plate:#e7dabb;--plate-ink:#3a2a1a;--hp:#8f2d2d;--hp-ink:#ffffff;--ground:linear-gradient(160deg,#3b3025,#140f0a);background:var(--paper) var(--deckbg-crucible) center/cover;padding:9px}
.char[data-deck="frankenstein"]{--frame:#0e1519;--paper:#e6eef1;--plate:#17222a;--plate-ink:#d6f4ff;--hp:#27c2d4;--hp-ink:#04222a;--ground:linear-gradient(160deg,#163a44,#080d10);background:var(--paper) var(--deckbg-frankenstein) center/cover;padding:9px}
.char[data-deck="sherlock"]{--frame:#22301f;--paper:#ece1c4;--plate:#d8ca9f;--plate-ink:#2a2016;--hp:#b08d3c;--hp-ink:#241a08;--ground:linear-gradient(160deg,#2d3326,#11150e);background:var(--paper) var(--deckbg-sherlock) center/cover;padding:9px}
.char[data-deck="oz"]{--frame:#0f2a1e;--paper:#eaf3e6;--plate:linear-gradient(#ffe38f,#e6c34d);--plate-ink:#123322;--hp:#2f9d63;--hp-ink:#04140c;--ground:radial-gradient(circle at 30% 20%,#12503a,#06170f 70%);background:var(--paper) var(--deckbg-oz) center/cover;padding:9px}
.char[data-deck="othello"]{--frame:#141821;--paper:#e7ecf3;--plate:#1b2634;--plate-ink:#cfe4ff;--hp:#d94b3a;--hp-ink:#1a0a08;--ground:linear-gradient(160deg,#1d2733,#080b12);background:var(--paper) var(--deckbg-othello) center/cover;padding:9px}
.char[data-deck="macbeth"]{--frame:#1a0e10;--paper:#efe1de;--plate:#2a1418;--plate-ink:#f0d8d0;--hp:#9c2b2b;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#3a1418,#110507 70%);background:var(--paper) var(--deckbg-macbeth) center/cover;padding:9px}
.char[data-deck="wonderland"]{--frame:#2a0f1e;--paper:#f6eef2;--plate:linear-gradient(#f7d6e0,#e6a6c0);--plate-ink:#3a1020;--hp:#c0223f;--hp-ink:#ffffff;--ground:radial-gradient(circle at 30% 20%,#5a1a3a,#180612 70%);background:var(--paper) var(--deckbg-wonderland) center/cover;padding:9px}
.char[data-deck="tewwg"]{--frame:#3a2410;--paper:#f5ecd6;--plate:linear-gradient(#f0c86a,#d99a3c);--plate-ink:#3a2410;--hp:#c77d3a;--hp-ink:#241a08;--ground:radial-gradient(circle at 30% 20%,#c9962f,#3a2a10 70%);background:var(--paper) var(--deckbg-tewwg) center/cover;padding:9px}
.char[data-deck="gatsby"] .pc-name,.char[data-deck="crucible"] .pc-name,.char[data-deck="sherlock"] .pc-name,.char[data-deck="oz"] .pc-name{font-family:var(--disp)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--gold),0 3px 0 var(--red-dk)}50%{box-shadow:0 0 0 5px var(--gold),0 3px 0 var(--red-dk)}}
.char.hit{animation:hit .45s}
@keyframes hit{0%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(6px,-2px);box-shadow:0 0 0 4px var(--red),0 6px 0 #0c2426}60%{transform:translate(-4px,1px)}100%{transform:translate(0,0)}}

/* bench */
.bench{display:flex;flex-direction:column;gap:5px;width:62px}
.bench-mini{background:var(--cream);border:2px solid var(--ink);border-radius:9px;padding:4px;text-align:center;box-shadow:0 3px 0 #0c2426}
.bench-mini.dead{filter:grayscale(.8);opacity:.5}
.bm-init{display:grid;place-items:center;height:26px;border-radius:6px;color:#fff;font-family:var(--disp);font-size:16px;border:1.5px solid var(--ink);overflow:hidden}
.bm-img{width:100%;height:100%;object-fit:cover;display:block}
.bm-hp{height:6px;background:#e0cfa6;border:1px solid var(--ink);border-radius:4px;margin:3px 0;overflow:hidden}
.bm-hp div{height:100%;background:#3e8e57}
.bm-name{font-family:var(--cond);font-size:10px;letter-spacing:.5px;text-transform:uppercase}

/* mid line / phases */
.midline{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0}
.phasehud{display:flex;align-items:center;gap:6px}
.ph{font-family:var(--cond);letter-spacing:2px;text-transform:uppercase;font-size:14px;color:#9fc4bd;
  background:#0e2c2e;border:2px solid #0a2123;border-radius:8px;padding:7px 14px}
.ph.on{background:var(--gold);color:var(--ink);border-color:var(--ink);box-shadow:0 0 14px rgba(227,169,43,.6),0 3px 0 var(--gold-dk)}
.ph.dim{opacity:.45}
.ph-arrow{color:var(--gold);font-size:18px}
.actions{display:flex;align-items:center;gap:12px;min-height:44px}
.bigbtn{font-family:var(--disp);font-size:16px;color:var(--ink);background:var(--gold);padding:10px 20px;border-radius:10px;border:3px solid var(--ink);box-shadow:0 4px 0 var(--gold-dk)}
.bigbtn:active{transform:translateY(3px);box-shadow:none}
.bigbtn.end{background:var(--red);color:var(--cream-hi);box-shadow:0 4px 0 var(--red-dk)}
.hint{font-family:var(--cond);letter-spacing:1px;font-size:12px;color:#cfe7df;text-transform:uppercase}
.thinking{font-family:var(--cond);letter-spacing:2px;color:var(--gold);text-transform:uppercase;animation:blink 2s ease-in-out infinite}
@keyframes blink{50%{opacity:.72}}

/* hand */
.hand-wrap{position:fixed;left:0;right:0;bottom:0;padding:6px 10px 10px;background:linear-gradient(transparent,#0a2123 22%);z-index:30}
.hand-label{font-family:var(--cond);letter-spacing:2px;text-transform:uppercase;font-size:11px;color:#cfe7df;text-align:center;margin-bottom:2px}
.hand{display:flex;gap:8px;justify-content:center;align-items:flex-end;overflow-x:auto;padding:6px 4px 2px;scrollbar-width:thin}
.hand-toggle{display:none;width:100%;justify-content:center;align-items:center;gap:8px;font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;padding:9px 12px;border:none;border-top:2px solid #1c4a4a;background:#0c2426;color:#dff3ec;cursor:pointer}
.hand .empty{color:#9fc4bd;font-family:var(--cond);letter-spacing:1px}
.hc{flex:0 0 152px;height:150px;background:var(--cream);border:2.5px solid var(--ink);border-radius:11px;overflow:hidden;
  display:flex;flex-direction:column;box-shadow:0 5px 0 #0c2426;transition:transform .14s, box-shadow .14s;position:relative}
.hc.playable{cursor:pointer}
.hc.spent{opacity:.45;filter:saturate(.55)}
.hc.playable:hover{transform:translateY(-12px);box-shadow:0 12px 0 #0c2426,0 0 0 3px var(--gold)}
.hc-top{font-family:var(--cond);letter-spacing:1px;font-size:12px;color:var(--cream-hi);padding:5px 8px;display:flex;justify-content:space-between;align-items:center}
.hc.attack .hc-top{background:var(--red)} .hc.block .hc-top{background:var(--teal)} .hc-top.bmk{background:var(--ink);color:var(--gold)}
.hc .pw{background:var(--gold);color:var(--ink);width:18px;height:18px;display:grid;place-items:center;border-radius:50%;font-size:12px;border:1.5px solid var(--ink)}
.hc-q{font-size:11.5px;line-height:1.25;padding:6px 8px;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}
.hc-foot{font-family:var(--cond);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:#7a6a52;padding:4px 8px;border-top:1px dashed #c9b58a}
.hc-name{font-family:var(--disp);font-size:15px;padding:6px 8px 2px}
.hc-text{font-size:11px;line-height:1.25;padding:0 8px 6px;flex:1;overflow:hidden}

/* ---- crit (Critical Lens) hand cards ---- */
.hc.crit{display:flex;flex-direction:column}
.hc-top.crt{background:linear-gradient(90deg,var(--gold-dk),var(--gold));color:var(--ink);letter-spacing:1.5px}
.hcc-port{flex:1;overflow:hidden;border-bottom:2px solid var(--ink);background:#1b1714}
.hcc-img{width:100%;height:100%;object-fit:cover;object-position:50% 28%;display:block}
.hcc-mono{display:grid;place-items:center;height:100%;font-family:var(--disp);font-size:30px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4)}
.hcc-nm{font-family:var(--cond);letter-spacing:.5px;font-size:12.5px;text-align:center;padding:4px 6px 2px;line-height:1.05}
.hcc-foot{font-family:var(--cond);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:#7a6a52;text-align:center;padding:0 6px 5px}
/* ---- active lens chip on the board ---- */
.lenschip{display:flex;gap:8px;align-items:stretch;background:var(--cream);border:2.5px solid var(--ink);border-left:7px solid var(--lc,#7a5c2c);border-radius:11px;padding:6px;margin:6px 0;max-width:560px;box-shadow:0 3px 0 #0c2426}
.lenschip.bar{padding:3px 6px;align-items:center}
.lenschip.bar .lc-port{width:26px;height:26px;flex-basis:26px}
.lenschip.bar .lc-mono{font-size:11px}
.lenschip.bar .lc-body{flex-direction:row;align-items:center;gap:8px}
.lenschip.bar .lc-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lenschip.bar .lc-thesis{margin:0;padding:3px 9px;font-size:10.5px}
.lc-metdot{color:#2e9e52;font-size:13px}
.lc-toggle{flex:0 0 auto;align-self:center;width:22px;height:22px;border:2px solid var(--ink);border-radius:6px;background:#fff;cursor:pointer;font-size:11px;line-height:1;display:grid;place-items:center;padding:0}
.lenschip.empty{justify-content:center;align-items:center;border-left-color:#6b6257;opacity:.6;min-height:34px}
.lc-none{font-family:var(--cond);letter-spacing:1.5px;text-transform:uppercase;font-size:11px;color:#7a6a52}
.lc-port{flex:0 0 52px;width:52px;height:52px;border:2px solid var(--ink);border-radius:8px;overflow:hidden;background:#1b1714;align-self:center}
.lc-img{width:100%;height:100%;object-fit:cover;object-position:50% 26%;display:block}
.lc-mono{display:grid;place-items:center;height:100%;font-family:var(--disp);font-size:18px;color:#fff}
.lc-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.lc-nm{font-family:var(--cond);letter-spacing:.5px;font-size:14px;color:var(--ink)}
.lc-pf,.lc-th{font-size:10.5px;line-height:1.25;color:var(--ink-2)}
.lc-th i{color:var(--teal-dk);font-style:italic}
.lc-thesis{align-self:flex-start;margin-top:3px;font-family:var(--cond);letter-spacing:.5px;font-size:11px;color:var(--ink);background:var(--gold);padding:4px 10px;border-radius:7px;border:2px solid var(--ink);box-shadow:0 2px 0 var(--gold-dk)}
.lc-thesis.off{opacity:.45;box-shadow:none}
.lc-thesis.met{background:var(--gold);box-shadow:0 2px 0 var(--gold-dk),0 0 12px rgba(230,200,120,.75);animation:pulse 2.2s ease-in-out infinite}
.lc-thesis.unmet{background:#b9ad93;color:#4a4230;box-shadow:none}
.bd-cav{width:34px;height:34px;border-radius:7px;object-fit:cover;object-position:50% 26%;border:1.5px solid var(--ink)}
.bd-chip.crt.on{outline:2px solid var(--gold)}
@media(max-width:560px){.lc-pf,.lc-th{font-size:9.5px}.lenschip{max-width:100%}}


/* log */
.logtoggle{position:fixed;right:10px;top:64px;z-index:35;font-family:var(--cond);letter-spacing:1px;font-size:12px;
  background:var(--ink);color:var(--gold);border:2px solid var(--gold);border-radius:8px;padding:6px 10px}
.log{position:fixed;right:10px;top:96px;width:280px;max-height:50vh;overflow-y:auto;z-index:34;
  background:rgba(8,24,25,.95);border:2px solid var(--gold);border-radius:10px;padding:10px;font-size:12px;line-height:1.45;
  color:#dfeee9;display:none}
.log.open{display:block}
.log div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.log div:first-child{color:var(--gold)}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(6,18,19,.82);display:grid;place-items:center;z-index:50;padding:16px;animation:fade .2s}
@keyframes fade{from{opacity:0}}
.trivia{width:min(460px,94vw);background:var(--cream);border:4px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:0 14px 0 #0c2426}
.tri-head{font-family:var(--disp);font-size:18px;color:var(--cream-hi);padding:12px 16px;letter-spacing:.5px}
.trivia.attack .tri-head{background:var(--red)} .trivia.block .tri-head{background:var(--teal)}
.tri-sub{font-family:var(--cond);letter-spacing:1px;font-size:11px;text-transform:uppercase;color:#7a6a52;padding:8px 16px 0}
.tri-q{font-size:17px;line-height:1.35;padding:6px 16px 12px;font-weight:600}
.tri-opts{display:flex;flex-direction:column;gap:8px;padding:0 16px 16px}
.tri-opt{text-align:left;background:#fff;border:2px solid var(--ink);border-radius:9px;padding:10px 12px;font-family:var(--body);font-size:14px;display:flex;gap:8px;align-items:flex-start;transition:transform .1s,background .1s}
.tri-opt b{font-family:var(--disp);color:var(--red)}
.tri-opt:hover{background:var(--gold);transform:translateX(4px)}
.tri-opt.tri-out{opacity:.4;text-decoration:line-through;background:#e8e2d4;cursor:not-allowed;pointer-events:none}
.tri-opt.tri-out::after{content:"\2717 CliffsNotes";margin-left:auto;font-family:var(--cond);font-size:10px;letter-spacing:1px;color:#a05a2a;text-decoration:none}

.over,.settings{width:min(440px,94vw);background:var(--cream);border:4px solid var(--ink);border-radius:16px;padding:22px;text-align:center;box-shadow:0 14px 0 #0c2426}
.over-title{font-family:var(--disp);font-size:38px;line-height:1}
.over-title.win{color:var(--teal)} .over-title.lose{color:var(--red)}
.over-sub{font-size:15px;margin:10px 0}
.over-score{font-family:var(--cond);letter-spacing:1px;margin-bottom:16px;color:var(--ink-2)}
.settings{text-align:left}
.set-title{font-family:var(--disp);font-size:24px;text-align:center}
.set-sub{font-size:12.5px;color:var(--ink-2);text-align:center;margin:6px 0 14px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed #c9b58a;font-family:var(--cond);letter-spacing:.5px;font-size:13px;text-transform:uppercase}
.set-row input[type=range]{width:150px;accent-color:var(--red)}
.set-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--teal)}
.set-row select{font-family:var(--cond);font-size:13px;padding:5px 8px;border:2px solid var(--ink);border-radius:7px;background:#fff}
.set-head{font-weight:900;color:var(--red);border-bottom:2px solid var(--ink);margin-top:4px}
.trk-pick{display:inline-flex;gap:6px}
.trk-opt{font-family:var(--cond);font-size:12px;letter-spacing:.5px;text-transform:uppercase;padding:5px 11px;border:2px solid var(--ink);border-radius:7px;background:#fff;color:var(--ink);cursor:pointer;font-weight:800}
.trk-opt.on{background:var(--teal);color:#fff;box-shadow:2px 2px 0 var(--ink)}
.set-actions{display:flex;gap:10px;justify-content:center;margin-top:16px}
.set-actions button[data-do=close-set]{font-family:var(--cond);letter-spacing:1px;padding:9px 14px;border:2px solid var(--ink);border-radius:9px;background:#fff}

/* toast */
#toast{position:fixed;left:50%;top:14%;transform:translateX(-50%) translateY(-20px);z-index:60;
  font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:15px;padding:10px 18px;border-radius:10px;
  background:var(--ink);color:var(--cream-hi);border:2px solid var(--gold);opacity:0;pointer-events:none;transition:.25s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.good{background:var(--teal);border-color:var(--cream-hi)} #toast.bad{background:var(--red);border-color:var(--gold)}

/* responsive */
@media(max-width:760px){
  #game{padding-bottom:190px}
  .char{width:200px} .pc-art{height:88px} .pc-art .mono{font-size:38px}
  .bench{width:64px} .brand small{display:none}
  .ph{font-size:12px;padding:6px 9px} .deckstack{width:56px;height:80px} .discardpile{width:56px;height:46px} .deck-ct{font-size:11px;padding:0 5px}
  .cb-disc{width:34px;height:34px;font-size:12px}
  .log{width:min(280px,90vw)}
  .hc{flex-basis:128px;height:138px}
}
/* ---------- deck tools + code on title ---------- */
.deck-tools{margin-top:14px}
.toolbtn{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;background:var(--cream);color:var(--ink);
  border:2px solid var(--ink);border-radius:9px;padding:9px 14px;box-shadow:0 3px 0 #0c2426;cursor:pointer}
.toolbtn:hover{background:var(--gold)}
.code-load{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.code-input{font-family:var(--cond);font-size:13px;padding:8px 11px;border:2px solid var(--ink);border-radius:9px;background:#fff;color:var(--ink);min-width:240px}
.code-msg{min-height:18px;font-family:var(--cond);letter-spacing:.5px;font-size:13px;margin:8px 0 0}
.code-msg.ok{color:#bfe3a8} .code-msg.bad{color:#ff9d8c}
.custom-banner{margin-top:12px;display:inline-flex;gap:8px;align-items:center;background:var(--ink);color:var(--gold);border:2px solid var(--gold);
  border-radius:10px;padding:7px 13px;font-family:var(--cond);letter-spacing:.5px;font-size:13px}
.custom-banner button{background:var(--red);color:var(--cream-hi);border:none;border-radius:6px;padding:3px 9px;font-family:var(--cond);cursor:pointer}

/* ---------- deck builder ---------- */
.builder{max-width:860px;margin:0 auto;padding:14px 14px 70px;color:var(--cream-hi)}
.bd-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bd-top h1{font-family:var(--disp);font-size:26px;margin:0;flex:1;color:var(--cream-hi)}
.bd-setpick{display:flex;gap:6px}
.bd-set{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:13px;background:var(--cream);color:var(--ink);border:2px solid var(--ink);border-radius:8px;padding:7px 13px;cursor:pointer}
.bd-set.on{background:var(--gold);box-shadow:0 0 0 2px var(--gold-dk)}
/* ---- Deck-box picker (replaces text buttons) ---- */
.bd-setpick{display:flex;gap:9px;flex-wrap:wrap;padding:4px 0 18px;align-items:flex-start}
.bdx{position:relative;width:60px;padding:0;border:none;background:none;cursor:pointer;transition:transform .16s ease;filter:drop-shadow(0 6px 8px rgba(0,0,0,.45))}
.bdx-im{display:block;border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.5)}
.bdx-im img{display:block;width:100%;height:auto}
.bdx:hover{transform:translateY(-7px) rotate(-1deg)}
.bdx.sel{transform:translateY(-9px)}
.bdx.sel .bdx-im{outline:3px solid #E6B85C;box-shadow:0 0 18px rgba(230,184,92,.6)}
.bdx-bdg{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:#2A211A;color:#E8D49A;border:1px solid #C99B57;font-family:var(--cond);font-weight:800;font-size:.52rem;letter-spacing:.3px;padding:2px 6px;border-radius:9px;white-space:nowrap;max-width:82px;overflow:hidden;text-overflow:ellipsis}
.bdx.sel .bdx-bdg{background:#E6B85C;color:#241c10}
.bdx-dot{position:absolute;top:-5px;right:-5px;background:#1b2540;color:#f4ecd6;border:1.5px solid #f4ecd6;border-radius:9px;font-family:var(--cond);font-weight:800;font-size:9px;padding:0 5px;line-height:15px}
/* fan-down expansion shelf */
.bd-fan{overflow:hidden;max-height:0;transition:max-height .28s ease;background:linear-gradient(#dccfa8,#cbb98c);border:2px dashed #a2905f;border-radius:12px;margin:0 0 14px}
.bd-fan.open{max-height:220px}
.bd-fan-in{padding:13px 15px;display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.bd-fan-lb{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:12px;color:#5a4a2a;font-weight:bold}
.ebx{position:relative;width:66px;cursor:pointer;border:none;background:none;padding:0;transition:transform .16s;filter:drop-shadow(0 5px 7px rgba(0,0,0,.4));display:inline-block}
.ebx-im{display:block;border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.5)}
.ebx-im img{display:block;width:100%;height:auto}
.ebx:hover{transform:translateY(-6px)}
.ebx.on{transform:translateY(-8px)}
.ebx.on .ebx-im{outline:3px solid #1b2540;box-shadow:0 0 16px rgba(27,37,64,.65)}
.ebx.flt-all.on .ebx-im{outline-color:#E3A92B;box-shadow:0 0 16px rgba(227,169,43,.6)}
.ebx-bdg{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:#1b2540;color:#f4ecd6;border:1px solid #f4ecd6;font-family:var(--cond);font-weight:800;font-size:.52rem;padding:2px 7px;border-radius:9px;white-space:nowrap}
.ebx.flt-all .ebx-bdg{background:#E3A92B;color:#241c10;border-color:#a97e1e}
.ebx-bdg.lk{background:#6a5a3a;border-color:#8a7a5a}
.ebx.locked{cursor:not-allowed;filter:none}
.ebx.locked:hover{transform:none}
.ebx-lk{display:grid;place-items:center;width:100%;height:92px;border:2px dashed #8a7a5a;border-radius:4px;background:#9a8f76;font-family:var(--disp);font-size:26px;color:#6a5a3a}
.ebx-note{font-family:var(--cond);font-size:13px;color:#4a3a1a;line-height:1.35}
.ebx-note small{color:#6a5a3a}
/* ---- Vault pack shop (Set x Tier) ---- */
.pk-shop{margin-top:14px;border-top:2px dashed #c0ab7d;padding-top:12px}
.pk-shelf{display:flex;gap:9px;flex-wrap:wrap;padding:4px 0 14px}
.pk-box{position:relative;width:66px;padding:0;border:none;background:none;cursor:pointer;transition:transform .16s;filter:drop-shadow(0 6px 8px rgba(0,0,0,.4))}
.pk-im{display:block;border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.5)}
.pk-im img{display:block;width:100%;height:auto}
.pk-im.pk-mono{display:grid;place-items:center;height:96px;background:linear-gradient(160deg,#3a3226,#171310);color:#e8dcc0;font-family:var(--disp);font-size:26px}
.pk-box:hover{transform:translateY(-6px)}
.pk-box.sel{transform:translateY(-8px)}
.pk-box.sel .pk-im{outline:3px solid #E6B85C;box-shadow:0 0 16px rgba(230,184,92,.6)}
.pk-nm{display:block;font-family:var(--cond);font-size:10px;text-align:center;margin-top:9px;color:#5a4a2a;line-height:1.1}
.pk-pr{position:absolute;top:-5px;right:-5px;background:#2A211A;color:#E8D49A;border:1.5px solid #C99B57;border-radius:9px;font-family:var(--cond);font-size:9px;padding:0 5px;line-height:15px}
.pk-hd{font-family:var(--disp);font-size:16px;color:#3a2f18;margin:2px 0 8px}
.pk-hd small{display:block;font-family:var(--cond);font-weight:normal;font-size:12px;color:#7a6a4a;margin-top:2px}
.pk-note{font-family:var(--cond);font-size:12px;color:#6a5a3a;margin-top:9px;padding:7px 10px;background:#f6efd9;border:1.5px dashed #c0ab7d;border-radius:8px}
.vault-buy.dim{opacity:.45}
.pk-box.lk .pk-im img,.bdx.lk .bdx-im img{filter:grayscale(1) brightness(.42)}
.pk-lock,.bdx-lock{position:absolute;inset:0;display:grid;place-items:center;font-size:22px;text-shadow:0 2px 6px rgba(0,0,0,.8)}
.pk-im,.bdx-im{position:relative}
.bdx.lk{filter:none}
.bdx.lk:hover{transform:translateY(-3px)}
.pk-box.lk .pk-pr{background:#6a5a3a;border-color:#8a7a5a}
/* ---- Photosensitivity / eye-strain safety ---- */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}

.bdm-hd{font-family:var(--cond);letter-spacing:.5px;font-size:14px;color:#3a2f18}
.bdm-hd b{font-family:var(--disp);font-size:15px}.bdm-hd small{color:#7a6a4a}
.bdm-bar{height:9px;background:#dccfa8;border:1.5px solid var(--ink);border-radius:6px;overflow:hidden;margin:6px 0 5px}

.bdm-sub{font-family:var(--cond);font-size:11px;color:#6a5a3a}
.over-ip{font-family:var(--cond);font-size:15px;color:#E3A92B;margin-top:6px}

/* bench indicator circles — hidden on desktop, shown on mobile */

/* ================= TOUCH-DRAG COMFORT (iOS) ================= */
/* iOS long-press pops the callout/magnifier and kills the drag — disable it on cards */
.hc,.bench-mini,.char{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.hc.abc.drag-src{touch-action:none}
/* while a drag is starting/running, don't let the card leap around under the finger */
body.maybe-drag .hand .hc:active,
body.dragging-abc .hand .hc:active,
body.dragging-abc .hand .hc:hover{transform:none!important;box-shadow:none!important}
body.dragging-abc{cursor:grabbing}
@media (max-width:760px), (pointer:coarse) and (max-width:1400px){
  /* every hand card: no scroll-hijack, no iOS text selection */
  body[data-screen="play"] .hand .hc{touch-action:none;-webkit-touch-callout:none}
  /* bigger, easier-to-hit cards + less overlap (they were 50px and heavily stacked) */
  body[data-screen="play"] .hand .hc{width:58px!important;min-width:58px!important;height:74px!important}
  body[data-screen="play"] .hand .hc:nth-child(1){transform:translateX(6px) rotate(-6deg)}
  body[data-screen="play"] .hand .hc:nth-child(2){transform:translateX(3px) rotate(-3deg)}
  body[data-screen="play"] .hand .hc:nth-child(4){transform:translateX(-3px) rotate(3deg)}
  body[data-screen="play"] .hand .hc:nth-child(5){transform:translateX(-6px) rotate(6deg)}
  body[data-screen="play"] .hand .hc:nth-child(6){transform:translateX(-9px) rotate(9deg)}
  body[data-screen="play"] .hand .hc:nth-child(7){transform:translateX(-12px) rotate(12deg)}
  /* DROP TARGETS: bench minis were 50x36 — far too small for a fingertip.
     Grow the hit area invisibly without changing the visual size. */
  body[data-screen="play"] .bench-mini.drop-zone::after{
    content:"";position:absolute;inset:-12px;border-radius:12px;
  }
  body[data-screen="play"] .side .char.drop-zone{position:relative}
  /* make the highlight unmistakable on a small screen */
  body.dragging-abc .drop-zone{outline:3px dashed rgba(230,184,92,.75)!important;outline-offset:3px}
  body.dragging-abc .drop-zone.dragover{outline:4px solid #E6B85C!important;box-shadow:0 0 22px rgba(230,184,92,.8)!important}
  /* the drag ghost should sit above the finger, not under it */
  .drag-ghost{transform:translate(-50%,-135%)!important;font-size:14px!important;padding:6px 10px!important}
  .drag-dot{position:fixed;z-index:9998;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;border:2px solid #E6B85C;background:rgba(230,184,92,.35);pointer-events:none;box-shadow:0 0 8px rgba(230,184,92,.7)}
}

/* ---------- deck stack + discard ---------- */
.piles{display:flex;flex-direction:column;gap:12px;align-items:center}
.deckstack{position:relative;width:64px;height:90px}
.deckstack .cardback{position:absolute;inset:0}
.cardback{border-radius:9px;background:repeating-linear-gradient(45deg,#14484b 0 7px,#0f3c3e 7px 14px);
  border:2px solid var(--ink);box-shadow:inset 0 0 0 3px var(--gold-dk),inset 0 0 0 5px #0e2c2e;display:grid;place-items:center;overflow:hidden}
.cb-rim{position:absolute;inset:7px;border:2px solid var(--gold);border-radius:7px;opacity:.65}
.cb-disc{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,#1c595b,#0e2c2e);border:3px solid var(--gold);
  display:grid;place-items:center;font-family:var(--disp);font-size:15px;color:var(--gold);box-shadow:0 0 0 2px var(--ink);line-height:1}
.cb-disc i{font-size:9px;color:var(--cream-hi);font-style:italic}
.cb-tag{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-family:var(--cond);font-size:7px;letter-spacing:1px;color:var(--gold);opacity:.85}
.cardback.empty{background:#0e2c2e;border:2px dashed #2a5a5c;box-shadow:none}
.deck-ct{position:absolute;bottom:-7px;right:-7px;z-index:30;background:var(--ink);color:var(--gold);border:2px solid var(--gold);
  font-family:var(--cond);font-size:13px;border-radius:8px;padding:1px 7px;box-shadow:0 2px 0 #000}
.discardpile{position:relative;width:84px;height:66px;border-radius:9px;background:#2a1414;border:2px solid var(--ink);
  box-shadow:0 3px 0 #0c2426;display:grid;place-items:center;cursor:pointer;color:var(--cream-hi)}
.discardpile:hover{box-shadow:0 3px 0 #0c2426,0 0 0 3px var(--gold)}
.dp-face{font-size:26px;opacity:.8}
.dp-ct{position:absolute;bottom:3px;right:6px;font-family:var(--cond);font-size:12px;color:var(--gold)}
.discardpile em{position:absolute;top:2px;left:5px;font-style:normal;font-family:var(--cond);font-size:10px;color:#ff8e7a}
.deckstack.shuffling{animation:shuffle .8s ease-in-out}
@keyframes shuffle{0%{transform:translateY(0) rotate(0)}15%{transform:translateY(-7px) rotate(-5deg)}30%{transform:translateX(6px) rotate(4deg)}45%{transform:translateY(-5px) rotate(-3deg)}60%{transform:translateX(-6px) rotate(4deg)}75%{transform:translateY(-3px) rotate(-2deg)}100%{transform:translateY(0) rotate(0)}}

/* ---------- card motion ---------- */
.hc.deal-in{animation:dealin .46s cubic-bezier(.2,.8,.3,1.15) both}
@keyframes dealin{0%{transform:translate(150px,-280px) rotate(20deg) scale(.7);opacity:0}55%{opacity:1}100%{transform:translate(0,0) rotate(0) scale(1);opacity:1}}
.fly-card{position:fixed;z-index:55;pointer-events:none;perspective:600px}
.fly-card .fc-inner{position:absolute;inset:0;animation:flycard .55s ease-out both}
@keyframes flycard{0%{transform:translateY(0) rotateZ(0) scale(1);opacity:1}100%{transform:translateY(-46px) translateX(10px) rotateZ(26deg) scale(.58);opacity:0}}

.ko-fx{position:fixed;z-index:60;pointer-events:none}
.ko-card{position:absolute;inset:0;border-radius:12px;border:3px solid var(--red);box-shadow:0 0 0 3px var(--gold),0 0 30px rgba(181,58,44,.6);animation:koshake .55s linear both}
@keyframes koshake{0%,100%{transform:translateX(0) rotate(0)}10%{transform:translateX(-8px) rotate(-3deg)}20%{transform:translateX(8px) rotate(3deg)}30%{transform:translateX(-7px) rotate(-2deg)}40%{transform:translateX(7px) rotate(2deg)}55%{transform:translateX(-4px);opacity:1}100%{opacity:0;transform:scale(.6)}}
.ko-stone{position:absolute;left:50%;top:54%;width:74%;padding:16px 8px 12px;border-radius:46px 46px 8px 8px;
  background:linear-gradient(#a4aab0,#717880);border:3px solid #3a3d42;box-shadow:0 7px 0 #2a2c30,inset 0 5px 9px rgba(255,255,255,.35);
  text-align:center;color:#2a2c30;font-family:var(--disp);animation:kostone 1.7s ease-out both}
.ko-stone b{display:block;font-size:20px;letter-spacing:2px}
.ko-stone span{display:block;font-family:var(--cond);font-size:11px;letter-spacing:.5px;margin-top:3px}
@keyframes kostone{0%,22%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}22.1%{opacity:1}38%{transform:translate(-50%,-50%) scale(1.14) rotate(4deg)}50%{transform:translate(-50%,-50%) scale(1) rotate(0)}82%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-62%) scale(.95);opacity:0}}

/* ---------- combat / status / heal fx ---------- */
.cfx{position:fixed;z-index:58;pointer-events:none}
.cfx-ring{position:absolute;inset:0;border-radius:12px;animation:cfxring .5s ease-out both}
.cfx-ring.atk{border:3px solid var(--red);box-shadow:0 0 20px rgba(181,58,44,.7),inset 0 0 14px rgba(181,58,44,.5)}
.cfx-ring.blk{border:3px solid var(--teal);box-shadow:0 0 20px rgba(31,106,106,.7),inset 0 0 14px rgba(31,106,106,.45)}
.cfx-ring.heal{border:3px solid #54b35e;box-shadow:0 0 20px rgba(84,179,94,.7),inset 0 0 14px rgba(84,179,94,.45)}
@keyframes cfxring{0%{transform:scale(.84);opacity:0}28%{opacity:1}100%{transform:scale(1.05);opacity:0}}
.cfx-slash{position:absolute;left:50%;top:50%;width:5px;height:130%;background:linear-gradient(var(--red),#fff);transform:translate(-50%,-50%) rotate(38deg);border-radius:3px;box-shadow:0 0 12px #fff;animation:cfxslash .42s ease-out both}
@keyframes cfxslash{0%{opacity:0;transform:translate(-50%,-50%) rotate(38deg) scaleY(.2)}30%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) rotate(38deg) scaleY(1.1)}}
.cfx-float{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);font-family:var(--disp);font-weight:800;font-size:23px;letter-spacing:1px;white-space:nowrap;text-shadow:0 2px 5px rgba(0,0,0,.6),0 0 3px #000;animation:cfxfloat 1s ease-out both}
.cfx-float.atk{color:#ffd6cd}
.cfx-float.blk{color:#c2e7dc}
.cfx-float.heal{color:#cdf0cc}
.cfx-float.status{font-size:14px;font-family:var(--cond);font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:11px;border:2px solid #C99B57;background:rgba(22,17,12,.86);color:#F0DFB3;text-shadow:none;animation:cfxbadge 1.05s ease-out both}
.cfx-float.status.neg{border-color:#d8714f;color:#ffd9c9}
.cfx-float.status.pos{border-color:#6bbf6b;color:#d6f0d0}
/* ---- battle juice: hp damage-trail, screen shake, hit-reaction, crit ---- */
.pc-hp u{position:absolute;left:0;top:0;bottom:0;width:100%;background:linear-gradient(#e0503a,#a8281a);z-index:0;transition:width .5s ease .12s;border-radius:5px 0 0 5px}
.pc-hp i{z-index:1;border-radius:5px 0 0 5px}
.board.cfx-shake{animation:cfxBoardShake .3s ease}
.board.cfx-shake-big{animation:cfxBoardShakeBig .44s ease}
@keyframes cfxBoardShake{15%{transform:translate(-4px,2px)}35%{transform:translate(4px,-2px)}55%{transform:translate(-3px,1px)}75%{transform:translate(2px,-1px)}100%{transform:none}}
@keyframes cfxBoardShakeBig{8%{transform:translate(-8px,4px) rotate(-.35deg)}22%{transform:translate(9px,-4px) rotate(.35deg)}40%{transform:translate(-6px,3px)}58%{transform:translate(6px,-2px)}76%{transform:translate(-3px,1px)}100%{transform:none}}
.char.cfx-hurt .pc-art{animation:cfxHurt .34s ease}
.char.cfx-crit .pc-art{animation:cfxCrit .4s ease}
@keyframes cfxHurt{0%{filter:none;transform:none}12%{filter:brightness(2.1) saturate(.6);transform:translateX(-7px)}28%{filter:brightness(1.4);transform:translateX(6px)}45%{transform:translateX(-4px)}65%{transform:translateX(3px)}100%{filter:none;transform:none}}
@keyframes cfxCrit{0%{filter:none;transform:none}10%{filter:brightness(1.3) sepia(1) hue-rotate(-35deg) saturate(5);transform:translateX(-11px) rotate(-1.2deg)}26%{filter:brightness(1.5);transform:translateX(9px) rotate(1deg)}44%{transform:translateX(-6px)}64%{transform:translateX(5px)}84%{transform:translateX(-2px)}100%{filter:none;transform:none}}
@keyframes cfxHurtRM{0%{filter:none}30%{filter:brightness(1.8)}100%{filter:none}}
.cfx-float.crit{font-size:40px;color:#ff6a4a;text-shadow:0 2px 0 #6a1000,0 0 12px rgba(255,80,40,.6)}
/* ---- Sensory Over-lord: oversized, imposing capstone tile ---- */
.char.sol-big{ transform:scale(1.16); transform-origin:center bottom; z-index:6; }
.char.sol-big .pc-art{ box-shadow:0 0 0 3px var(--gold,#E3A92B), 0 12px 30px rgba(0,0,0,.6); }
.char.sol-big .pc-plate{ border-top:2px solid var(--gold,#E3A92B); }
.char.sol-big .pc-name{ color:var(--gold,#E3A92B); letter-spacing:1.5px; }
.char.sol-big .port-img{ transition:opacity .2s ease; }
@media (prefers-reduced-motion: reduce){
  .board.cfx-shake,.board.cfx-shake-big{animation:none}
  .char.cfx-hurt .pc-art,.char.cfx-crit .pc-art{animation:cfxHurtRM .3s ease}
}
@keyframes cfxfloat{0%{transform:translate(-50%,-30%) scale(.7);opacity:0}24%{opacity:1;transform:translate(-50%,-58%) scale(1.06)}68%{opacity:1}100%{transform:translate(-50%,-118%) scale(1);opacity:0}}
@keyframes cfxbadge{0%{transform:translate(-50%,-20%) scale(.6);opacity:0}22%{opacity:1;transform:translate(-50%,-70%) scale(1.05)}70%{opacity:1}100%{transform:translate(-50%,-120%) scale(1);opacity:0}}

/* ---------- book-page theme overrides ---------- */
.title-screen{color:var(--ink)}
.title-logo{display:block;width:min(560px,92%);margin:6px auto 2px;border-radius:10px;
  box-shadow:0 6px 18px rgba(40,25,12,.35),0 0 0 2px rgba(40,25,12,.15)}
.title-crest{width:min(300px,64%);margin:2px auto 4px;border-radius:0;box-shadow:none}
.title-sub{color:var(--red-dk)}
.facing{color:#5e4a2c} .facing b{color:var(--teal-dk)}
.title-foot{color:#6a5736}
.deck-pick-wrap h2,.rules h2{color:var(--ink)}
.rules,.deck-opt{background:var(--cream-hi)}
.code-msg.ok{color:#3c7a26} .code-msg.bad{color:#a3331f}
.deck-ch{color:#5b4a2f}
/* board sits on the page */
.opp-side{background:linear-gradient(rgba(181,58,44,.10),rgba(140,42,32,.06));border:1px dashed #b53a2c88}
.you-side{background:linear-gradient(rgba(31,106,106,.12),rgba(15,58,61,.08));border:1px dashed #1f6a6a99}
.side-meta{color:#5e4a2c;opacity:.95}
.char,.hc,.bench-mini,.bd-chip,.bd-bm,.deck-opt{box-shadow:0 3px 0 rgba(40,25,12,.45),0 5px 12px rgba(40,25,12,.18)}
.char,.hc,.bench-mini{background:var(--cream-hi)}
/* builder on the page */
.builder{color:var(--ink)}
.bd-top h1{color:var(--ink)}
.bd-sec{background:rgba(251,243,221,.9);border:1px solid rgba(40,25,12,.22)}
.bd-sec h3{color:var(--red-dk)} .bd-sec h3 small{color:#6a5736}
.bd-crit{color:#5e4a2c;background:rgba(40,25,12,.05);border:1px dashed #b39a6a}
.bd-totals span{box-shadow:0 2px 0 rgba(40,25,12,.4)}
/* card back uses the logo emblem */
.cb-img{position:absolute;inset:5px;width:calc(100% - 10px);height:calc(100% - 10px);object-fit:cover;border-radius:6px;border:1.5px solid var(--ink)}
.cardback.top{display:grid;place-items:center}
.cb-medallion{width:60px;height:60px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);box-shadow:0 0 0 2px var(--ink),0 2px 7px rgba(0,0,0,.45);background:#f1e7ca}
.cb-medallion img{width:100%;height:100%;object-fit:cover;display:block}
/* topbar brand emblem */
.brand-logo{height:32px;width:32px;border-radius:7px;border:2px solid var(--gold);object-fit:cover;vertical-align:middle}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- title screen ---------- */
.title-screen{max-width:720px;margin:0 auto;padding:18px 16px 60px;text-align:center;color:var(--cream-hi)}
.title-emblem{display:flex;justify-content:center;gap:4px;margin-top:10px}

.title-main{font-family:var(--disp);font-size:clamp(30px,7vw,52px);line-height:1.02;margin:14px 0 4px;color:var(--cream-hi);text-shadow:3px 3px 0 #0c2426}
.title-sub{font-family:var(--cond);letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:0 0 18px;font-size:14px}

.deck-av{width:52px;height:52px;border-radius:50%;border:3px solid var(--ink);object-fit:cover;margin-left:-10px;box-shadow:0 2px 0 #0c2426;background:#1b1714}

.facing{font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:12px;color:#bfe3d8;margin-top:10px}
.bigbtn.start{margin-top:22px;font-size:20px;padding:14px 30px}

/* ---------- piles ---------- */
.piles{display:flex;flex-direction:column;gap:8px}
.pile{position:relative;width:46px;height:54px;border-radius:8px;display:grid;place-items:center;font-size:24px;
  border:2px solid var(--ink);box-shadow:0 3px 0 #0c2426;color:var(--cream-hi)}
.pile.deck{background:#0e2c2e} .pile.discard{background:#2a1414;cursor:pointer}

/* ---------- defend / picker / viewer modals ---------- */
.defend,.picker,.viewer{width:min(440px,94vw);background:var(--cream);border:4px solid var(--ink);border-radius:16px;overflow:hidden;box-shadow:0 14px 0 #0c2426}

.abm-tag{ display:block; font-size:.55rem; opacity:.72; }
/* turn-timer clock */
.turnclock{ font-weight:800; font-size:.95rem; color:#E8D49A; background:rgba(0,0,0,.25); border:1px solid #6b5a33; border-radius:8px; padding:3px 10px; min-width:56px; text-align:center; }
.turnclock.low{ color:#fff; background:var(--red,#B53A2C); border-color:#E0796E; animation:tcpulse .8s ease-in-out infinite; }
@keyframes tcpulse{ 0%,100%{ opacity:1 } 50%{ opacity:.55 } }
/* bookshelf deck picker */
.bookshelf{ margin:10px auto 6px; max-width:760px; }
.shelf-row{ display:flex; gap:16px; justify-content:center; align-items:flex-end; flex-wrap:wrap; padding:14px 12px 0; }
.deckbox{ position:relative; width:120px; padding:0; border:none; background:none; cursor:pointer; transition:transform .16s ease; filter:drop-shadow(0 9px 11px rgba(0,0,0,.5)); }
.deckbox .db-img{ border-radius:5px; overflow:hidden; border:1px solid rgba(0,0,0,.45); }
.deckbox .db-dice{ display:flex;align-items:center;justify-content:center;font-size:58px;width:118px;height:168px;background:radial-gradient(circle at 30% 20%,#3a3226,#171310 75%);color:#e8dcc0; }
.deckbox .db-img img{ display:block; width:100%; height:auto; }
.deckbox:hover{ transform:translateY(-12px) rotate(-1deg); }
.deckbox.sel{ transform:translateY(-14px); }
.deckbox.sel .db-img{ outline:3px solid #E6B85C; box-shadow:0 0 24px rgba(230,184,92,.6); }
.db-badge{ position:absolute; bottom:-11px; left:50%; transform:translateX(-50%); background:#2A211A; color:#E8D49A; border:1px solid #C99B57; font-weight:800; font-size:.6rem; padding:3px 9px; border-radius:11px; white-space:nowrap; transition:background .15s,color .15s; }
.deckbox.sel .db-badge{ background:#E6B85C; color:#241c10; }
.deckbox.soon{ cursor:not-allowed; filter:drop-shadow(0 9px 11px rgba(0,0,0,.5)) grayscale(.72) brightness(.66); }
.deckbox.soon:hover{ transform:none; }
.db-soon{ position:absolute; top:46%; left:50%; transform:translate(-50%,-50%) rotate(-8deg); background:rgba(20,16,12,.86); color:#F0DFB3; border:2px solid #C99B57; font-family:var(--disp); font-weight:800; font-size:.92rem; letter-spacing:.03em; padding:6px 12px; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,.55); white-space:nowrap; }
.shelf-plank{ height:20px; margin:0 6px; border-radius:3px; background:linear-gradient(180deg,#6b4a2c,#3d2917); box-shadow:0 7px 14px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.4); border:1px solid #2a1c10; }
/* ---------- opponent picker (title) ---------- */
.opp-pick{ margin-top:16px; }
.opp-pick-label{ display:block; font-family:var(--cond); letter-spacing:2px; text-transform:uppercase; font-size:11px; color:#bfe3d8; margin-bottom:8px; }
.opp-opts{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.opp-opt{ font-family:var(--cond); letter-spacing:.5px; font-size:13px; padding:7px 14px; border-radius:9px; border:2px solid var(--ink); background:var(--cream); color:var(--ink); cursor:pointer; box-shadow:0 2px 0 rgba(40,25,12,.4); transition:transform .12s; }
.opp-opt:hover{ transform:translateY(-2px); }
.opp-opt.on{ background:var(--gold); border-color:var(--gold-dk); box-shadow:0 0 0 2px var(--gold-dk); font-weight:700; }

/* ---------- responsive: battle fits the viewport (no scrolling) ---------- */
body[data-screen="play"]{ overflow:hidden; }
body[data-screen="play"] #game{
  height:100vh; height:100dvh; max-width:1080px; margin:0 auto;
  display:flex; flex-direction:column; gap:6px; padding:8px 12px; overflow:hidden;
}
body[data-screen="play"] .topbar{ flex:none; }
body[data-screen="play"] .board{
  flex:1 1 auto; min-height:0; display:flex; flex-direction:column;
  justify-content:safe center; gap:clamp(2px,1vh,8px); overflow:hidden;
}
body[data-screen="play"] .board-inner{ display:flex; flex-direction:column; justify-content:center; gap:clamp(2px,1vh,8px); }
body[data-screen="play"] .side{ min-height:0; }
body[data-screen="play"] .row{ min-height:0; }
body[data-screen="play"] .side{ padding:clamp(4px,1vh,8px); }
body[data-screen="play"] .side-meta{ font-size:clamp(9px,1.5vh,11px); }
body[data-screen="play"] .row{ gap:clamp(6px,2vw,12px); }
body[data-screen="play"] .char{ width:clamp(146px,40vw,236px); padding:clamp(4px,0.9vh,8px); }
body[data-screen="play"] .pc-name{ font-size:clamp(11px,2vh,15px); }
body[data-screen="play"] .pc-plate{ margin-bottom:clamp(2px,0.6vh,5px); }
body[data-screen="play"] .pc-hp b{ font-size:clamp(10px,1.6vh,12px); }
body[data-screen="play"] .pc-art{ height:clamp(50px,11vh,132px); }
body[data-screen="play"] .pips{ min-height:0; margin-bottom:clamp(2px,0.5vh,5px); }
body[data-screen="play"] .pc-moves{ gap:clamp(2px,0.6vh,5px); margin-top:clamp(2px,0.5vh,4px); }
body[data-screen="play"] .pc-move{ padding:clamp(3px,0.7vh,5px) 6px; }
body[data-screen="play"] .pc-mn{ font-size:clamp(11px,1.7vh,12.5px); }
body[data-screen="play"] .pc-mc{ font-size:clamp(8px,1.2vh,10px); }
body[data-screen="play"] .pc-chip{ font-size:clamp(11px,1.7vh,13px); padding:clamp(2px,0.5vh,4px) clamp(4px,1vw,7px); }
body[data-screen="play"] .lenschip{ padding:clamp(3px,0.7vh,6px); margin:clamp(2px,0.6vh,6px) 0; }
body[data-screen="play"] .lenschip.empty{ min-height:0; padding:clamp(2px,0.5vh,6px); }
body[data-screen="play"] .midline{ gap:clamp(3px,0.9vh,8px); padding:clamp(1px,0.4vh,4px) 0; }
body[data-screen="play"] .actions{ min-height:0; }
body[data-screen="play"] .bench{ width:clamp(54px,12vw,78px); gap:clamp(3px,0.8vh,6px); }
body[data-screen="play"] .deckstack{ width:clamp(52px,9vw,84px); height:clamp(70px,12vh,118px); }
body[data-screen="play"] .piles{ gap:clamp(4px,1vh,12px); }
body[data-screen="play"] .abm-zone{ max-width:clamp(70px,14vw,124px); }
body[data-screen="play"] .hand-wrap{ position:relative; flex:none; left:auto; right:auto; bottom:auto; padding:4px 10px 6px; }
body[data-screen="play"] .hand-label{ margin-bottom:1px; }
body[data-screen="play"] .hc{ flex-basis:clamp(104px,15vh,152px); height:clamp(92px,17vh,150px); }
body[data-screen="play"] .hc-q{ -webkit-line-clamp:4; font-size:clamp(10px,1.5vh,11.5px); }
@media (max-height:700px){
  body[data-screen="play"] .hand-hint{ display:none; }
  body[data-screen="play"] .hc-q{ -webkit-line-clamp:3; }
}
@media (max-height:560px){
  body[data-screen="play"] .side-meta{ display:none; }
  body[data-screen="play"] .lenschip.empty{ display:none; }
}
@media (max-width:560px){
  body[data-screen="play"] #game{ padding:6px 8px; gap:4px; }
  body[data-screen="play"] .hand-hint{ display:none; }
  body[data-screen="play"] .row{ gap:8px; }
  body[data-screen="play"] .topbar small{ display:none; }
  body[data-screen="play"] .lenschip{ max-width:none; }
  /* stack the two battlefields into a vertical swipe pager (opponent over you) */
  body[data-screen="play"] .board{
    flex-direction:column; overflow-y:auto; overflow-x:hidden;
    scroll-snap-type:y mandatory; justify-content:flex-start; gap:0;
    padding-bottom:82px; -webkit-overflow-scrolling:touch;
  }
  body[data-screen="play"] .board-inner{ display:contents; }
  body[data-screen="play"] .board .side{
    min-height:calc(100dvh - 132px); scroll-snap-align:center; scroll-snap-stop:always;
    display:flex; flex-direction:column; justify-content:center;
  }
  body[data-screen="play"] .char{ width:clamp(150px,60vw,220px); }
  body[data-screen="play"] .pc-art{ height:clamp(100px,20vh,150px); }
  body[data-screen="play"] .side-meta{ display:block !important; text-align:center; font-size:12px; opacity:.9; }
  body[data-screen="play"] .board::after{
    content:"\2195 swipe between boards"; position:fixed; top:50px; left:50%; transform:translateX(-50%);
    font-family:var(--cond); font-size:10px; letter-spacing:1px; color:#bfe3d8; opacity:.7; z-index:20; pointer-events:none;
  }
  /* pin the phase / turn / action strip so it stays reachable while swiping */
  body[data-screen="play"] .midline{
    position:fixed; left:0; right:0; bottom:40px; z-index:26;
    flex-direction:row; flex-wrap:wrap; justify-content:center; gap:6px;
    background:#0c2426f2; padding:4px 8px; box-shadow:0 -3px 10px rgba(0,0,0,.4);
  }
  /* hand collapses to a tap-to-open tray */
  body[data-screen="play"] .hand-wrap{
    position:fixed; left:0; right:0; bottom:0; top:auto; padding:0; z-index:32;
    display:flex; flex-direction:column-reverse; background:none;
  }
  body[data-screen="play"] .hand-toggle{ display:flex; }
  body[data-screen="play"] .hand-label{ display:none; }
  body[data-screen="play"] .hand-wrap .hand{ display:none; }
  body[data-screen="play"] .hand-wrap.open .hand{
    display:flex; max-height:48vh; overflow-x:auto; overflow-y:hidden;
    background:#0a2123f7; padding:10px; border-top:2px solid #1c4a4a; box-shadow:0 -6px 16px rgba(0,0,0,.5);
  }
}
/* topbar, crit-chip readability, and finer vertical fit */
body[data-screen="play"] .topbar{ flex-wrap:wrap; gap:6px 10px; }
body[data-screen="play"] .brand small{ font-size:clamp(10px,1.6vh,14px); }
body[data-screen="play"] .score{ font-size:clamp(10px,1.5vh,13px); gap:6px; }
body[data-screen="play"] .tb-btns button{ font-size:clamp(11px,1.5vh,13px); padding:5px 9px; }
body[data-screen="play"] .lenschip{ max-width:100%; font-size:clamp(10px,1.5vh,13px); }
body[data-screen="play"] .lenschip *{ min-width:0; }
body[data-screen="play"] .turnclock{ font-size:clamp(13px,2vh,16px); padding:2px 8px; }
@media (max-height:640px){
  body[data-screen="play"] .pc-art{ height:clamp(42px,9vh,132px); }
  body[data-screen="play"] .hand-label{ display:none; }
  body[data-screen="play"] .pc-mc{ font-size:clamp(8px,1.3vh,10px); }
  body[data-screen="play"] .hc{ height:clamp(84px,15vh,150px); flex-basis:clamp(96px,13vh,152px); }
  body[data-screen="play"] .deckstack{ height:clamp(60px,10vh,118px); }
}

/* ===== 1st Edition (Commander) holofoil + UI ===== */
.char.fe{ border-color:#caa53a; box-shadow:0 0 0 2px #caa53a, 0 3px 0 #0c2426, 0 6px 16px rgba(40,25,12,.28); }
.bench-mini.fe{ border-color:#caa53a; box-shadow:0 0 0 1.5px #caa53a, 0 3px 0 #0c2426; }
.char.fe .pc-art, .bench-mini.fe .bm-init{ position:relative; overflow:hidden; }
.char.fe .pc-art::after, .bench-mini.fe .bm-init::after{
  content:''; position:absolute; inset:0; pointer-events:none; z-index:3; mix-blend-mode:screen;
  background:linear-gradient(115deg, rgba(255,0,128,.16) 0%, rgba(255,214,0,.16) 25%, rgba(0,224,255,.16) 50%, rgba(140,60,255,.16) 75%, rgba(255,0,128,.16) 100%);
  background-size:300% 300%; animation:feHolo 6.5s linear infinite;
}
.char.fe .pc-art::before{
  content:''; position:absolute; inset:0; pointer-events:none; z-index:4;
  background:linear-gradient(115deg, transparent 38%, rgba(255,255,255,.30) 50%, transparent 62%);
  background-size:250% 250%; animation:feSheen 4.2s ease-in-out infinite;
}
@keyframes feHolo{ 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
@keyframes feSheen{ 0%{background-position:130% 0} 55%,100%{background-position:-45% 0} }
.fe-badge{ position:absolute; top:5px; left:5px; z-index:6; font-family:var(--cond); font-size:9px; line-height:1;
  letter-spacing:1px; padding:3px 6px; border-radius:5px; color:#3a2b06; font-weight:800;
  background:linear-gradient(90deg,#caa53a,#f5e08a,#caa53a); box-shadow:0 1px 3px rgba(0,0,0,.4); text-shadow:0 1px 0 rgba(255,255,255,.35); }
.bench-mini.fe .fe-mini{ position:absolute; top:2px; right:2px; z-index:6; font-size:9px; color:#caa53a; text-shadow:0 1px 1px #000; }
.bm-init{ position:relative; }
.bm-swap{ position:absolute; bottom:1px; right:1px; z-index:7; width:16px; height:16px; line-height:14px; padding:0;
  border:1.5px solid var(--ink); border-radius:5px; background:var(--gold); color:var(--ink); font-size:11px; cursor:pointer; box-shadow:0 1px 0 #0c2426; }
.bm-swap:hover{ background:#f5e08a; }
.fe-peekwrap{ display:flex; flex-direction:column; gap:3px; margin-top:5px; }
.fe-peek{ font-family:var(--cond); font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:#5a4a2a;
  background:var(--cream-hi); border:1.5px solid #caa53a; border-radius:6px; padding:2px 6px; text-align:center; }
.fe-peek b{ color:var(--ink); }
.bv-passive{ background:linear-gradient(90deg,#f2e4bf,#f7efd6); border-left:3px solid #caa53a; border-radius:6px; padding:7px 9px; margin:2px 0 4px; }
.bv-passive .bv-ph{ font-family:var(--cond); letter-spacing:1px; font-size:12px; color:#8a6a1a; text-transform:uppercase; }
.bv-passive p{ margin:3px 0 0; font-size:13px; color:#2a2016; }
.bd-chip.fe.on{ box-shadow:0 0 0 2px #caa53a; }
/* ---- Deck Builder: expansion edition augmentation ---- */
/* character chip: art | (name over toggle) | preview | mark  — nothing overflows */
.bd-chip.ch{position:relative;padding:8px 30px 8px 8px;align-items:center;gap:8px;min-height:58px}
.bd-chip.ch .bd-info{display:flex;flex-direction:column;align-items:flex-start;gap:4px;flex:1;min-width:0}
.bd-chip.ch .bd-nm{font-size:13px;line-height:1.15;white-space:normal;overflow-wrap:anywhere}
/* right gutter: check TOP, magnifier BOTTOM — never overlapping (top/bottom explicitly cleared) */
.bd-chip.ch .bd-mk{position:absolute;top:6px;bottom:auto;right:8px;font-size:14px;line-height:1}
.bd-chip.ch .bd-pv{position:absolute;bottom:6px;top:auto;right:6px;font-size:13px;line-height:1;opacity:.6;padding:0}
.bd-chip.ch .bd-pv:hover{opacity:1}
/* edition-themed cards (navy) — light text for contrast */
.bd-chip.bd-ed{background:var(--edp,#1b2540);border-color:var(--edf,#0a1020);color:#eaf0fa}
.bd-chip.bd-ed.on{box-shadow:0 3px 0 rgba(10,16,32,.5),0 0 0 3px var(--gold)}
.bd-chip.bd-ed .bd-nm{color:#f4ecd6}
.bd-chip.bd-ed .bd-q{color:#e4ecf8}
.bd-chip.bd-ed .bd-ty{color:#a9bcd8}
.bd-chip.bd-ed .bd-mk,.bd-chip.bd-ed .bd-pv{color:#dfe7f4}
.bd-chip.bd-ed .bd-av,.bd-chip.bd-ed .bd-cav{border-color:#f4ecd6}
.bd-chip.ab.bd-edcard{border-top-color:var(--edf,#0a1020)}
.bd-chip.ab.bd-edcard.attack{border-top-color:#c0392b}
.bd-chip.ab.bd-edcard.block{border-top-color:#3aa0a0}
/* Base|Mod toggle */
.bd-edtog{display:inline-flex;border:1.5px solid var(--edf,#0a1020);border-radius:6px;overflow:hidden;flex:none;background:#e7dcbf}
.bd-edtog .seg{font-family:var(--cond);font-size:10px;letter-spacing:.4px;padding:2px 7px;color:#5a4a2a;cursor:pointer;line-height:1.3}
.bd-edtog .seg.on{background:var(--edf,#1b2540);color:#f4ecd6;font-weight:bold}
.bd-chip.bd-ed .bd-edtog{background:#0f1729;border-color:#f4ecd6}
.bd-chip.bd-ed .bd-edtog .seg{color:#9fb0c8}
.bd-chip.bd-ed .bd-edtog .seg.on{background:#f4ecd6;color:#12203a}
/* edition bookmarks */
.bd-bm.bd-ed{background:var(--edp,#1b2540);border-color:var(--edf,#0a1020);color:#eaf0fa}
.bd-bm.bd-ed .bd-bmname{color:#f4ecd6}
.bd-bm.bd-ed .bd-bmtext{color:#c8d4e6}
/* navy skin for edition card previews (matches the Vault gallery card) */
.pv-card.ed-pv{background:#1b2540;border-color:#0a1020;color:#eaf0fa}
.pv-card.ed-pv .pv-nm,.pv-card.ed-pv .pv-abc-q{color:#f4ecd6}
.pv-card.ed-pv .pv-abc-top{background:#0f1729;color:#f4ecd6;border-color:#0a1020}
.pv-card.ed-pv .pv-mv-txt,.pv-card.ed-pv .pv-abc-foot{color:#c8d4e6}
.pv-card.ed-pv .pv-opt{background:#26324f;color:#e4ecf8;border-color:#0a1020}
.pv-card.ed-pv .pv-opt.correct{background:#2f6d4f;color:#fff}
.bd-edfilter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 4px;font-family:var(--cond)}
.bd-edfilter .lb{font-weight:bold;letter-spacing:1px;color:var(--navy,#1b2540)}
.bd-edfilter .seg{font-size:12px;letter-spacing:.5px;padding:5px 11px;border:2px solid var(--ink);border-radius:7px;background:var(--cream);cursor:pointer}
.bd-edfilter .seg.on{background:var(--gold);box-shadow:0 0 0 2px var(--gold-dk,#a97e1e)}
.builder.flt-base .bd-edcard{display:none}
.builder.flt-modern .bd-chip.ab:not(.bd-edcard),.builder.flt-modern .bd-chip.crt.fe:not(.bd-edcard){display:none}
.fe-tag{ display:block; font-family:var(--cond); font-size:9px; letter-spacing:.5px; color:#8a6a1a; text-transform:uppercase; opacity:.85; }
.pv-card.fe .pv-name .fe-badge{ position:static; display:inline-block; vertical-align:middle; margin-left:6px; }

/* ===== Literary Scrimmage (grainy ink / parchment) ===== */
body[data-screen="scrim"]{ background:#e9dcc0; }
.scrim-wrap{ min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:18px 12px 40px; }
.scrim-ink{ background:
   radial-gradient(circle at 20% 15%, rgba(0,0,0,.05), transparent 40%),
   radial-gradient(circle at 80% 85%, rgba(0,0,0,.06), transparent 45%),

/* ACADEMIC BATTLE CARDS — engine + UI (v2: title, deck pick, full bookmarks, defense, discard piles) */
(function(){

const $ = (s,r=document)=>r.querySelector(s);
const rnd = n => Math.floor(Math.random()*n);
const clone = o => JSON.parse(JSON.stringify(o));

/* ---------------- tunable settings ---------------- */

  c.hp = c.maxHp; c.atkCharge=[]; c.blkCharge=[]; c.turnsInPlay=0; c.status={};

  if(c.fe && !c.img && c.base){ const bd=DATA.characters[c.base[0]]; const bc=bd&&bd.find(x=>x.id===c.base[1]); if(bc&&bc.img){ c.img=bc.img; c.imgpos=bc.imgpos; } }
  return c;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
/* ---------- deck definitions ---------- */
const LIMITS = { ch:12, ab:24, bm:20, cr:4, fe:2, total:62 };
function feFor(k){ return (DATA.firsteds||[]).filter(f=>f.deck===k).map(f=>f.id).slice(0,LIMITS.fe); }
function firstedById(id){ var f=(DATA.firsteds||[]).find(x=>x.id===id); if(f) return f;
  var E=window.EXPANSIONS||{}; for(var k in E){ if(E[k].battle){ var m=(E[k].battle.commanders||[]).find(x=>x.id===id); if(m) return m; } if(E[k].boosterPool){ var m2=(E[k].boosterPool.commanders||[]).find(x=>x.id===id); if(m2) return m2; } } return null; }
/* ---- Expansion edition helpers (edition-driven; augment matching base deck only) ---- */
function editionsForDeck(k){ var E=window.EXPANSIONS||{}; return Object.keys(E).filter(function(id){return E[id].base===k&&E[id].battle;}).map(function(id){return E[id];}); }
function edHas(cid){ return sbx() || (META.editionCards||[]).indexOf(cid)>=0; }
function edCharFor(k,charId){ var eds=editionsForDeck(k); for(var i=0;i<eds.length;i++){ var c=(eds[i].battle.chars||[]).find(function(x){return x.id===charId;}); if(c&&edHas(c.cid)) return {ed:eds[i],c:c}; } return null; }
function edResolveChar(def,id){ if(def.ed&&def.ed[id]){ var m=edCharFor(def.d,id); if(m) return m.c; } return DATA.characters[def.d].find(function(c){return c.id===id;}); }
function edAbcByCid(k,cid){ var eds=editionsForDeck(k); for(var i=0;i<eds.length;i++){ var a=(eds[i].battle.abcs||[]).find(function(x){return x.cid===cid;}); if(a) return a; } return null; }
function edBmByCid(k,cid){ var eds=editionsForDeck(k); for(var i=0;i<eds.length;i++){ var b=(eds[i].battle.bookmarks||[]).find(function(x){return x.cid===cid;}); if(b) return b; } return null; }
function edAbcsCollected(k){ var out=[]; editionsForDeck(k).forEach(function(e){(e.battle.abcs||[]).forEach(function(a){ if(edHas(a.cid)) out.push({ed:e,a:a}); });}); return out; }
function edCmdsCollected(k){ var out=[]; editionsForDeck(k).forEach(function(e){(e.battle.commanders||[]).forEach(function(f){ if(edHas(f.cid)) out.push({ed:e,f:f}); });}); return out; }
function edBmsCollected(k){ var out=[]; editionsForDeck(k).forEach(function(e){(e.battle.bookmarks||[]).forEach(function(b){ if(edHas(b.cid)) out.push({ed:e,b:b}); });}); return out; }
function edThemeFor(k){ var e=editionsForDeck(k)[0]; return e?e.theme:null; }
function edCollectedCount(e){ var pre=e.id||''; var n=0; (META.editionCards||[]).forEach(function(c){ if(!pre||c.indexOf(pre)===0) n++; }); return n; }
function edAnyCollected(e){ var all=[].concat(e.battle.chars||[],e.battle.abcs||[],e.battle.bookmarks||[],e.battle.commanders||[]);
  for(var i=0;i<all.length;i++){ if(edHas(all[i].cid)) return true; } return false; }
function edCountFor(e){ var all=[].concat(e.battle.chars||[],e.battle.abcs||[],e.battle.bookmarks||[],e.battle.commanders||[]); var n=0;
  all.forEach(function(o){ if(edHas(o.cid)) n++; }); return n; }
function bdDeckBox(k,sel){ var img=(window.DECKBOX&&window.DECKBOX[k])||'';
  var eds=editionsForDeck(k); var dot=(eds.length&&edAnyCollected(eds[0]))?'<span class="bdx-dot">'+eds.length+'</span>':'';
  var lk=!deckUnlocked(k);
  return '<button class="bdx '+(sel?'sel':'')+(lk?' lk':'')+'" data-bld="set:'+k+'" title="'+setName(k)+(lk?' \u2014 locked (buy a Deck License in the Vault)':'')+'">'
    +'<span class="bdx-im"><img src="'+img+'" alt="'+setName(k)+'">'+(lk?'<span class="bdx-lock">\uD83D\uDD12</span>':'')+'</span>'
    +'<span class="bdx-bdg">'+(sel?'\u2713':'')+setName(k)+'</span>'+(lk?'':dot)+'</button>'; }
function bdExpansionShelf(k,open){ var eds=editionsForDeck(k); if(!eds.length) return '';
  var e=eds[0], flt=(APP.builder.edFilter||'all');
  var got=edAnyCollected(e), n=edCountFor(e), tot=(e.counts&&e.counts.total)||43;
  var lbl = flt==='modern' ? '\u2713 '+e.name : (flt==='base' ? 'Base only' : 'All (mixed)');
  var body = got
    ? '<button class="ebx '+(flt!=='base'?'on':'')+' flt-'+flt+'" data-bld="edcycle:'+k+'" title="Click to cycle: Base only \u2192 '+e.name+' \u2192 All">'
      +'<span class="ebx-im"><img src="'+(e.box||'')+'" alt="'+e.name+'"></span>'
      +'<span class="ebx-bdg">'+lbl+'</span></button>'
      +'<span class="ebx-note"><b>'+e.name+'</b> \u00b7 '+n+'/'+tot+' collected<br><small>Click the box to cycle: <b>Base only</b> \u2192 <b>'+e.name+'</b> \u2192 <b>All</b> (mixed).</small></span>'
    : '<span class="ebx locked"><span class="ebx-lk">?</span><span class="ebx-bdg lk">Locked</span></span>'
      +'<span class="ebx-note"><b>'+e.name+'</b><br><small>Pull your first card from a '+e.name+' Portfolio and the box appears here.</small></span>';
  return '<div class="bd-fan'+(open?' open':'')+'"><div class="bd-fan-in"><span class="bd-fan-lb">\u25C6 Expansions</span>'+body+'</div></div>'; }
/* one-time: give edition commanders a base:[deck,char] so feImg can inherit a portrait */
(function(){ var E=window.EXPANSIONS||{}; for(var k in E){ var ed=E[k]; if(!ed.battle) continue;
  var IM=ed.img||{}, IP=ed.imgpos||{};
  (ed.battle.chars||[]).forEach(function(c){ if(IM[c.id]){ c.img=IM[c.id]; c.imgpos=IP[c.id]||'50% 18%'; } });
  (ed.battle.commanders||[]).forEach(function(f){ var bc=f.baseChar;
    if(bc && IM[bc]){ f.img=IM[bc]; f.imgpos=IP[bc]||'50% 16%'; }
    if(!f.base && bc) f.base=[ed.base,bc]; });
} })();
function feImg(f){ if(!f) return null; if(f.img) return {img:f.img,pos:f.imgpos}; if(f.base){ const bd=DATA.characters[f.base[0]]; const bc=bd&&bd.find(x=>x.id===f.base[1]); if(bc&&bc.img) return {img:bc.img,pos:bc.imgpos}; } if(f.baseChar){ var EX=window.EXPANSIONS||{}; for(var k in EX){ var E=EX[k]; var inReg=(E.battle&&(E.battle.commanders||[]).some(function(c){return c.id===f.id;}))||(E.boosterPool&&(E.boosterPool.commanders||[]).some(function(c){return c.id===f.id;})); if(inReg && E.img && E.img[f.baseChar]){ return {img:E.img[f.baseChar], pos:(E.imgpos&&E.imgpos[f.baseChar])}; } } } return null; }
function cardTypeLabel(c){ if(!c) return '\u2014'; if(c.cat==='abc') return c.type==='ATTACK'?'\u2694 Attack':'\u26ca Block'; if(c.cat==='bookmark') return '\u2726 Bookmark'; if(c.cat==='crit') return '\u25c6 Lens'; return '?'; }
function fePeekChips(p,sideKey){ if(sideKey!=='you'||!S) return ''; let out='';
  if(pHasPassive(p,'peekOwnDeck') && p.deck.length){ out+=`<div class="fe-peek own" title="Cold Logic \u2014 top of your deck">\ud83d\udd0d Top: <b>${cardTypeLabel(p.deck[0])}</b></div>`; }
  if(pHasPassive(p,'peekFoeDraw') && S.opp && S.opp._lastDrawn){ out+=`<div class="fe-peek foe" title="Anticipatory Madness \u2014 opponent's last draw">\ud83d\udc41 Foe drew: <b>${cardTypeLabel(S.opp._lastDrawn)}</b></div>`; }
  return out?`<div class="fe-peekwrap">${out}</div>`:''; }
function defaultBookmarks(){ const base=DATA.bookmarks.map((_,i)=>i); return base.concat([0,1,3,5,10,9]).slice(0,LIMITS.bm); }
/* owned-aware pools (sandbox returns everything) */
function poolCh(k){ return DATA.characters[k].filter(c=>deckOwnCh(k,c.id)).map(c=>c.id); }
function poolAb(k){ return DATA.abcs[k].map((_,i)=>i).filter(i=>deckOwnAb(k,i)); }
function poolCr(){ return DATA.crits.map((_,i)=>i).filter(i=>ownCrit(i)); }
function poolBmSlots(){ const out=[]; DATA.bookmarks.forEach((_,i)=>{ const n=bmOwned(i); for(let c=0;c<n;c++) out.push(i); }); return out; }
function defaultDeck(k){
  // Full 62-card default: every category filled to its cap (ch 12 + ab 24 + bm 20 + cr 4 + fe 2).
  // Decks with only one published 1st Edition default to 61 until their second commander exists.
  const def={ d:k, ch:poolCh(k).slice(0,LIMITS.ch), ab:poolAb(k).slice(0,LIMITS.ab), bm:[], cr:poolCr().slice(0,LIMITS.cr), fe:feFor(k) };
  return fillGaps(def);
}
function pickN(arr,n){ const p=arr.slice(), o=[]; while(o.length<n && p.length) o.push(p.splice(rnd(p.length),1)[0]); return o; }
function randomBookmarks(){
  // Randomized loadout with rarity caps for balance: up to 1 Legendary, 2 Epic, 3 Rare;
  // everything else Common/Uncommon.
  const L=bmIdxByRarity(['L']), E=bmIdxByRarity(['E']), R=bmIdxByRarity(['R']), CU=bmIdxByRarity(['C','U']);
  const out=[];
  out.push(...pickN(L, rnd(2)));        // 0-1 Legendary
  out.push(...pickN(E, rnd(3)));        // 0-2 Epic
  out.push(...pickN(R, 1+rnd(3)));      // 1-3 Rare
  const fill=CU.length?CU:DATA.bookmarks.map((_,i)=>i);
  while(out.length<LIMITS.bm) out.push(fill[rnd(fill.length)]);
  // respect ownership + copy limits (sandbox: bmOwned() returns max)
  const used={}; const legal=[];
  out.forEach(i=>{ used[i]=(used[i]||0)+1; if(used[i]<=bmOwned(i)) legal.push(i); });
  const slots=poolBmSlots();
  while(legal.length<LIMITS.bm){
    const u={}; legal.forEach(i=>u[i]=(u[i]||0)+1);
    const avail=slots.filter(i=>(u[i]||0)<bmOwned(i));
    if(!avail.length) break;
    legal.push(avail[rnd(avail.length)]);
  }
  return legal.slice(0,LIMITS.bm);
}
function randomDeck(k){
  // Fresh composition each battle: random characters, trivia, crit lenses, and
  // rarity-capped bookmarks. Commanders unchanged (deck identity).
  const pc=poolCh(k), pa=poolAb(k), pr=poolCr();
  const d={ d:k,
    ch:pickN(pc, Math.min(LIMITS.ch, pc.length)),
    ab:pickN(pa, Math.min(LIMITS.ab, pa.length)),
    bm:randomBookmarks(),
    cr:pickN(pr, Math.min(LIMITS.cr, pr.length)),
    fe:feFor(k), ed:{}, edab:[], edbm:{} };
  // Quick Play: expansions are live — roll modern variants + vocab cards too
  if(sbx()){ const eds=editionsForDeck(k);
    if(eds.length && Math.random()<0.5){ const E=eds[0];
      (E.battle.chars||[]).forEach(function(c){ if(d.ch.indexOf(c.id)>=0 && Math.random()<0.6) d.ed[c.id]='modern'; });
      const va=(E.battle.abcs||[]).map(function(a){return a.cid;});
      d.edab=pickN(va, Math.min(6, va.length));
      d.ab=d.ab.slice(0, Math.max(0, LIMITS.ab-d.edab.length));
    } }

}
function deckCounts(def){

  return { ch:def.ch.length, ab:def.ab.length+eab, bm:def.bm.length+ebm, cr:def.cr.length, fe:(def.fe||[]).length,

  const k=def.d;
  def.ch=(def.ch||[]).filter(id=>DATA.characters[k].some(c=>c.id===id)).slice(0,LIMITS.ch);
  def.ab=(def.ab||[]).filter(i=>i>=0&&i<DATA.abcs[k].length).slice(0,LIMITS.ab);
  def.bm=(def.bm||[]).filter(i=>i>=0&&i<DATA.bookmarks.length).slice(0,LIMITS.bm);
  def.cr=(def.cr||[]).filter(i=>i>=0&&i<DATA.crits.length).slice(0,LIMITS.cr);
  def.fe=(def.fe||[]).filter(id=>firstedById(id)).filter((id,i,a)=>a.indexOf(id)===i).slice(0,LIMITS.fe);
  /* Ownership repair: strip what you don't own, then REPLACE it with cards you do own
     (never silently leave a deck short — that produced decks with 0 bookmarks). */
  const _was={ch:(def.ch||[]).length, ab:(def.ab||[]).length, cr:(def.cr||[]).length, bm:(def.bm||[]).length};
  def.ch=(def.ch||[]).filter(id=>deckOwnCh(k,id));
  def.ab=(def.ab||[]).filter(i=>deckOwnAb(k,i));
  def.cr=(def.cr||[]).filter(i=>ownCrit(i));
  (function(){ const cnt={}; def.bm=(def.bm||[]).filter(i=>{ cnt[i]=(cnt[i]||0)+1; return cnt[i]<=bmOwned(i); }); })();
  def._repaired=(def.ch.length<_was.ch)||(def.ab.length<_was.ab)||(def.cr.length<_was.cr)||(def.bm.length<_was.bm);
  if(def._repaired){
    const capTo=(n,lim)=>Math.min(n,lim);
    // characters
    (function(){ const pool=poolCh(k).filter(id=>!def.ch.includes(id));
      while(def.ch.length<capTo(_was.ch,LIMITS.ch) && pool.length) def.ch.push(pool.splice(rnd(pool.length),1)[0]); })();
    // trivia
    (function(){ const pool=poolAb(k).filter(i=>!def.ab.includes(i));
      while(def.ab.length<capTo(_was.ab,LIMITS.ab) && pool.length) def.ab.push(pool.splice(rnd(pool.length),1)[0]); })();
    // lenses
    (function(){ const pool=poolCr().filter(i=>!def.cr.includes(i));
      while(def.cr.length<capTo(_was.cr,LIMITS.cr) && pool.length) def.cr.push(pool.splice(rnd(pool.length),1)[0]); })();
    // bookmarks (respect copies owned)
    (function(){ const slots=poolBmSlots();
      while(def.bm.length<capTo(_was.bm,LIMITS.bm)){
        const u={}; def.bm.forEach(i=>u[i]=(u[i]||0)+1);
        const avail=slots.filter(i=>(u[i]||0)<bmOwned(i));
