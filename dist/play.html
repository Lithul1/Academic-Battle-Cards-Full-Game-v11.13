<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Battle Cards</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#1d1a14;overflow:hidden;
    font-family:"Arial Narrow",Arial,sans-serif}
  #wrap{position:relative;width:100%;height:100%}
  #game{width:100%;height:100%;border:0;display:block;background:#1d1a14}
  #bar{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:6px}
  .btn{font-family:"Arial Narrow",Arial,sans-serif;font-weight:bold;letter-spacing:1px;
    font-size:13px;text-transform:uppercase;background:#E3A92B;color:#241F1B;
    border:2px solid #241F1B;border-radius:8px;padding:7px 12px;cursor:pointer;
    box-shadow:0 3px 0 #a97e1e;text-decoration:none;display:inline-block;line-height:1}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #a97e1e}
  #load{position:absolute;inset:0;display:grid;place-items:center;background:#1d1a14;
    color:#E8D49A;z-index:5;text-align:center;padding:20px}
  #load b{display:block;font-size:20px;letter-spacing:2px;margin-bottom:8px}
  #load span{font-size:14px;color:#9d8f6a}
</style>
</head>
<body>
<div id="wrap">
  <div id="load"><div><b>ACADEMIC BATTLE CARDS</b><span>Loading… first load can take a moment.</span></div></div>
  <div id="bar">
    <button class="btn" id="fs" type="button">⛶ Fullscreen</button>
    <a class="btn" id="tab" href="academic_battle_cards.html" target="_blank" rel="noopener">↗ New Tab</a>
  </div>
  <iframe id="game"
    src="academic_battle_cards.html"
    title="Academic Battle Cards"
    allow="autoplay; fullscreen"
    allowfullscreen></iframe>
</div>
<script>
  var wrap = document.getElementById('wrap');
  var game = document.getElementById('game');
  var load = document.getElementById('load');

  game.addEventListener('load', function(){ load.style.display = 'none'; });
  setTimeout(function(){ load.style.display = 'none'; }, 20000); // safety net

  document.getElementById('fs').addEventListener('click', function(){
    var el = wrap;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) {
      var p = req.call(el);
      // If the host page blocks fullscreen, fall back to opening a new tab.
      if (p && p.catch) p.catch(function(){ window.open('academic_battle_cards.html','_blank'); });
    } else {
      window.open('academic_battle_cards.html','_blank');
    }
  });
</script>
</body>
</html>
